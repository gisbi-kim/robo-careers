* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {

  font-weight: 900; font-style: italic;

}

.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {

}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }

.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);

}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;

  margin-bottom: 40px;

}
.profile-name {

.profile-oneline {

.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;

  border-left: 2px solid var(--ink);

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);

.section-title {

  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;

}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;

  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;

}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {

.pullquote {

.pullquote::before {

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {

.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;

.lineage-grid {

.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;

.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);

.lineage-item .name {

.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;

.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

었다."}, {"years": "1994 — 1998", "id": "II", "title": "궤도의 안착 — Nonholonomic system · Robot", "body": "이어진 1994년대 전반, 1994–1998년의 기간 동안 <strong>25편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Nonholonomic system</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Controlling Formations of Multiple Mobile Robots\"</em>이다. ICRA 1998에 실린 이 글은 지금까지 687회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Milos Zefran</strong>, <strong>Jaydev P. Desai</strong>, <strong>Xiaoping Yun</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Milos Zefran, Jaydev P. Desai, Peter R. Kraus. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "1999 — 2003", "id": "III", "title": "Robot · Mobile robot의 시기", "body": "그 뒤 1999년부터 2003년까지, 총 <strong>34편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Mobile robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Robotic Grasping and Contact: A Review\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 1,056회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>James P. Ostrowski</strong>, <strong>Camillo J. Taylor</strong>, <strong>Aveek K. Das</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Calin Belta, Joel M. Esposito, Jongwoo Kim, Luiz Chaimowicz 외 11명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 68%가 이 venue에서 소화되었다."}, {"years": "2004 — 2008", "id": "IV", "title": "Robot · Mobile robot의 시기", "body": "2004년 무렵부터 2008년에 걸쳐, 총 <strong>42편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Mobile robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Leader-to-formation stability\"</em>이다. T-RO 2004에 실린 이 글은 지금까지 779회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Peng Cheng</strong>, <strong>Nathan Michael</strong>, <strong>Jonathan Fink</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jonathan Fink, Nathan Michael, Nora Ayanian, Spring Berman 외 5명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2009 — 2013", "id": "V", "title": "Robot · Mobile robot의 시기", "body": "2009–2013년으로 이어진 이 시기에, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>68편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Mobile robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Minimum snap trajectory generation and control for quadrotors\"</em>이다. ICRA 2011에 실린 이 글은 지금까지 2,237회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2012 IJRR의 <em>\"Trajectory generation and control for precise aggressive maneuvers with qu…\"</em>(865회)이다. 이 시기를 함께 끌어간 축은 <strong>Nathan Michael</strong>, <strong>Daniel Mellinger</strong>, <strong>Mahmut Selman Sakar</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Giuseppe Loianno, Yash Mulgaonkar, Shaojie Shen, Daniel Mellinger 외 16명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2014 — 2018", "id": "VI", "title": "Robot · Artificial intelligence의 시기", "body": "2014년을 기점으로 2018년까지의 흐름 속에서, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>94편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"The grand challenges of Science Robotics\"</em>이다. Sci-Rob 2018에 실린 이 글은 지금까지 1,122회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2018 T-RO의 <em>\"A Survey on Aerial Swarm Robotics\"</em>(621회)이다. 이 시기를 함께 끌어간 축은 <strong>Giuseppe Loianno</strong>, <strong>Yash Mulgaonkar</strong>, <strong>Kartik Mohta</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Michael Watterson, Xu Liu, Sikang Liu, Steven W. Chen 외 25명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2019 — 2023", "id": "VII", "title": "성숙기의 확장 — Robot · Artificial intelligence", "body": "2019년부터 2023년 사이의 5년간, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>71편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Alejandro Ribeiro</strong>, <strong>Camillo J. Taylor</strong>, <strong>James Paulos</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yuezhan Tao, Igor Spasojevic, Ian D. Miller, Fernando Cladera Ojeda 외 15명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2024 — 2025", "id": "VIII", "title": "최근의 지형 — Artificial intelligence · Robot", "body": "이어진 2024년대 전반, 2024–2025년의 기간 동안 총 <strong>32편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Yuezhan Tao</strong>, <strong>Igor Spasojevic</strong>, <strong>Pratik Chaudhari</strong>으로 요약된다. 바로 이 시기에 Kumar의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Spencer Folk, Fernando Cladera, Jiuzhou Lei. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "8개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.8명에서 후기 5.3명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 98명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 98명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Giuseppe Loianno, Jonathan Fink, Yash Mulgaonkar, Nathan Michael이 있다. 이 가운데 1명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 98명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2011, "venue": "ICRA", "title": " function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
