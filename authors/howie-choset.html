lic health and infectious diseas…\"</em> — published in Sci-Rob 2020, accumulating 564 citations and becoming a standard reference in the sub-field. Close behind: <em>\"PRIMAL: Pathfinding via Reinforcement and Imitation Multi-Agent Learning\"</em> (RA-L 2019, 390 cites). The era's working axis reads <strong>Guillaume Sartoretti</strong>, <strong>Matthew J. Travers</strong>, <strong>Daniel I. Goldman</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Choset — Geordan Gutow, Baxi Chong, Peng Yin, Akshaya Kesarimangalam Srinivasan, + 6 more. The transition from solo work to group supervision is visible here."}, {"years": "2023 — 2025", "id": "VII", "title": "Latest terrain — Artificial intelligence · Mathematical optimization", "body": "Between 2023 and 2025, <strong>48</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Artificial intelligence</span>, <span class='hl'>Mathematical optimization</span>, the axis that threads through most of the era's output. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Zhongqiang Ren</strong>, <strong>Sivakumar Rathinam</strong>, <strong>Bhaskar Vundurthy</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Choset — Ananya Rao, Ananya Bal, Allen George Philip, Shizhe Zhao, + 3 more. The transition from solo work to group supervision is visible here."}], "themes": [{"num": "01", "title": "The Robot anchor never moved", "text": "Robot appears among the top topics in most of the 7 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 3.1 early to 6.2 late — the canonical PI-  2006}, {"name": "Glenn Wagner", "student_first_year": 2011, "copubs_in_first_5yr": 6, "total_copubs": 7, "student_first_author_count": 5, "we_last_author_count": 5, "last_copub_year": 2019}], "students_rest": 42}, "archetype": "steady-producer"}, "ko": {"tagline": "Computer science → Robot", "oneLine": "1993년에 출판을 시작해 33년째 현장에 머물고 있는 연구자. 주제를 옮긴 적이 거의 없다. Robot 하나를 33년 내내 파고들었고, 그 결과 264편, h=51이라는 숫자가 남았다. 대표작은 2015년 T-RO에 실린 \"Continuum Robots for Medical Applications: A Survey\" (1,472회 인용). 공저 패턴으로 추정되는 제자만 54명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1993 — 2025</strong>"], ["논문 수", "264편 · 인용 11,320 · h=51"], ["핵심", "Robot"], ["대표작", "Continuum Robots for Medical Applications: A Su…"], ["스타일", "steady-producer · specialist"], ["전환", "Voronoi diagram → Artificial intelligence"]], "phases": [{"years": "1993 — 1997", "id": "I", "title": "출발점 — Voronoi diagram · Robot", "body": "1993년부터 1997년 사이의 5년간, 출판은 8편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Voronoi diagram</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Joel W. Burdick</strong>, <strong>Nobuaki Takanashi</strong>, <strong>E. Ilhan Konukseven</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 75%가 이 venue에서 소화되었다."}, {"years": "1998 — 2002", "id": "II", "title": "궤도의 안착 — Robot · Voronoi diagram", "body": "이어진 1998년대 전반, 1998–2002년의 기간 동안 <strong>25편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Voronoi diagram</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Morse Decompositions for Coverage Tasks\"</em>이다. IJRR 2002에 실린 이 글은 지금까지 305회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2000 IJRR의 <em>\"Sensor-Based Exploration: The Hierarchical Generalized Voronoi Graph\"</em>(284회)이다. 이 시기를 함께 끌어간 축은 <strong>Ercan U. Acar</strong>, <strong>Jonathan E. Luntz</strong>, <strong>William C. Messner</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ercan U. Acar, Ji Yeong Lee, Robert Grabowski, David C. Conner 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2003 — 2007", "id": "III", "title": "Robot · Artificial intelligence의 시기", "body": "그 뒤 2003년부터 2007년까지, 총 <strong>39편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Design of a modular snake robot\"</em>이다. IROS 2007에 실린 이 글은 지금까지 269회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2003 IJRR의 <em>\"Path Planning for Robotic Demining: Robust Sensor-based Coverage of Unstru…\"</em>(218회)이다. 이 시기를 함께 끌어간 축은 <strong>Alfred A. Rizzi</strong>, <strong>Elie A. Shammas</strong>, <strong>David C. Conner</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ross L. Hatton, Stephen Tully, Elie A. Shammas, Brad Lisien 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2008 — 2012", "id": "IV", "title": "Robot · Mobile robot의 시기", "body": "2008년 무렵부터 2012년에 걸쳐, 총 <strong>35편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Mobile robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Design and architecture of the unified modular snake robot\"</em>이다. ICRA 2012에 실린 이 글은 지금까지 257회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2011 IROS의 <em>\"M*: A complete multirobot path planning algorithm with performance bounds\"</em>(239회)이다. 이 시기를 함께 끌어간 축은 <strong>Stephen Tully</strong>, <strong>George Kantor</strong>, <strong>Ross L. Hatton</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Chaohui Gong, David Rollinson, Glenn Wagner, Matthew Tesch 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2013 — 2017", "id": "V", "title": "Robot · Artificial intelligence의 시기", "body": "2013–2017년으로 이어진 이 시기에, 총 <strong>49편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Continuum Robots for Medical Applications: A Survey\"</em>이다. T-RO 2015에 실린 이 글은 지금까지 1,472회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Chaohui Gong</strong>, <strong>Matthew J. Travers</strong>, <strong>Daniel I. Goldman</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Matthew J. Travers, Guillaume Sartoretti, Zhongqiang Ren, Rangaprasad Arun Srivatsan 외 10명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "VI", "title": "성숙기의 확장 — Robot · Artificial intelligence", "body": "2018년을 기점으로 2022년까지의 흐름 속에서, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>60편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Combating COVID-19 - The role of robotics in managing public health and infectious diseas…\"</em>이다. Sci-Rob 2020에 실린 이 글은 지금까지 564회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2019 RA-L의 <em>\"PRIMAL: Pathfinding via Reinforcement and Imitation Multi-Agent Learning\"</em>(390회)이다. 이 시기를 함께 끌어간 축은 <strong>Guillaume Sartoretti</strong>, <strong>Matthew J. Travers</strong>, <strong>Daniel I. Goldman</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Geordan Gutow, Baxi Chong, Peng Yin, Akshaya Kesarimangalam Srinivasan 외 6명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VII", "title": "최근의 지형 — Artificial intelligence · Mathematical optimization", "body": "2023년부터 2025년 사이의 5년간, 총 <strong>48편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Mathematical optimization</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Zhongqiang Ren</strong>, <strong>Sivakumar Rathinam</strong>, <strong>Bhaskar Vundurthy</strong>으로 요약된다. 바로 이 시기에 Choset의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ananya Rao, Ananya Bal, Allen George Philip, Shizhe Zhao 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.1명에서 후기 6.2명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 54명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": " 본인은 Joel W. Burdick의 네트워크 안에서 경력을 시작한 것으로 보이지만, 지금은 공저 패턴 기준으로 54명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Matthew J. Travers, Chaohui Gong, Guillaume Sartoretti, Zhongqiang Ren이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 54명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2015, "venue": "T-RO", "title": "Continuum Robots for Medical Applications: A Survey", "cites": 1472}, {"year": 2020, "venue": "Sci-Rob", "title": "Combating COVID-19 - The role of robotics in managing public health and infectious diseases", "cites": 564}, {"year": 2019, "venue": "RA-L", "title": "PRIMAL: Pathfinding via Reinforcement and Imitation Multi-Agent Learning", "cites": 390}, {"year": 2002, "venue": "IJRR", "title": "Morse Decompositions for Coverage Tasks", "cites": 305}, {"year": 2000, "venue": "IJRR", "title": "Sensor-Based Exploration: The Hierarchical Generalized Voronoi Graph", "cites": 284}, {"year": 2007, "venue": "IROS", "title": "Design of a modular snake robot", "cites": 269}, {"year": 2012, "venue": "ICRA", "title": "Design and architecture of the unified modular snake robot", "cites": 257}, {"year": 2011, "venue": "IROS", "title": "M*: A complete multirobot path planning algorithm with performance bounds", "cites": 239}], "lineage": {"advisors": [{"name": "Joel W. Burdick", "advisor_active_from": 1986, "early_copubs_as_our_first_author": 5, "advisor_last_author_coun function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
