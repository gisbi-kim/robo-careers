<style>
:root {
  --ink: #1a1614;
  --paper: #f5f1ea;
  --paper-2: #ebe4d7;
  --rule: #1a1614;
  --accent: #c1440e;
  --accent-2: #2d4a3e;
  --muted: #6b6259;
  --highlight: #f4d35e;
  --card: #fbf8f1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;
  font-size: 16px;
  line-height: 1.65;
  word-break: keep-all;
  -webkit-font-smoothing: antialiased;
}
body {
  background-image:

  padding: 40px 24px 96px;
}
.grain {

}
.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 24px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;
  font-size: clamp(2.4rem, 5vw, 4rem);
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin-bottom: 18px;
}
.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }
.profile-name .family { display: block; }
.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding-bottom: 8px;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  font-family: 'Pretendard', sans-serif;
}
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {
  background: linear-gradient(180deg, transparent 60%, var(--highlight) 60%);
  padding: 0 2px; font-weight: 500;
}
.phase-body em {
  font-style: italic;
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px; background: var(--ink); border: 1px solid var(--ink);
}
.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;
  line-height: 1.4; margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(1.2rem, 2.2vw, 1.6rem);
  line-height: 1.5; max-width: 52ch;
  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;
}
.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  margin-right: 8px; padding: 2px 6px;
  background: var(--paper-2);
  border: 1px solid rgba(26, 22, 20, 0.2);

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

/* lineage */
.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }
  .phase { grid-template-columns: 1fr; gap: 8px; }
  .phase-meta { display: flex; align-items: baseline; gap: 12px; }
  .lineage-grid { grid-template-columns: 1fr; gap: 24px; }
}

.foot {
  margin-top: 80px; padding-top: 24px;
  border-top: 1px solid var(--ink);
  display: flex; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;

  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted);

 대표작은 2003년 ICRA에 실린 \"Biped walking pattern generation by using preview control of zero-mom…\" (2,075회 인용).", "facts": [["시기", "<strong>1991 — 2009</strong>"], ["논문 수", "59편 · 인용 8,283 · h=40"], ["핵심", "Humanoid, Biped Walking"], ["대표작", "Biped walking pattern generation by using previ…"], ["스타일", "mid-career-peak-2 · pivoter"], ["전환", "Polyhedra Contact → Humanoid"]], "phases": [{"years": "1991 — 1995", "id": "I", "title": "출발점 — Polyhedra Contact · Planning Convex Polyhedra", "body": "1991년부터 1995년 사이의 5년간, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Polyhedra Contact</span>, <span class='hl'>Planning Convex Polyhedra</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Contact Translation Rotation가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Toshihiro Matsui</strong>, <strong>Kunikatsu Takase</strong>, <strong>Yves Papegay</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}, {"years": "1996 — 2000", "id": "II", "title": "궤도의 안착 — Prototypes Teleoperation Standard · Standard Protocol Standard", "body": "이어진 1996년대 전반, 1996–2000년의 기간 동안 출판은 6편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Prototypes Teleoperation Standard</span>, <span class='hl'>Standard Protocol Standard</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Standard Human Interface가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Hiromu Onda</strong>, <strong>Toshihiro Matsui</strong>, <strong>Kenji Konaka</strong>으로 요약된다."}, {"years": "2001 — 2005", "id": "III", "title": "성숙기의 확장 — Humanoid · Biped Walking", "body": "그 뒤 2001년부터 2005년까지, 총 <strong>31편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Humanoid</span>, <span class='hl'>Biped Walking</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Open Architecture Humanoid가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Biped walking pattern generation by using preview control of zero-moment point\"</em>이다. ICRA 2003에 실린 이 글은 지금까지 2,075회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2001 IROS의 <em>\"The 3D linear inverted pendulum mode: a simple modeling for a biped walkin…\"</em>(1,034회)이다. 이 시기를 함께 끌어간 축은 <strong>Fumio Kanehiro</strong>, <strong>Shuuji Kajita</strong>, <strong>Kenji Kaneko</strong>으로 요약된다. 바로 이 시기에 Hirukawa의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Kiyoshi Fujiwara, Mitsuharu Morisawa, Shinichiro Nakaoka. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2006 — 2009", "id": "IV", "title": "최근의 지형 — Humanoid · Humanoid Walking Rough", "body": "2006년 무렵부터 2009년에 걸쳐, <strong>17편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Humanoid</span>, <span class='hl'>Humanoid Walking Rough</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Pattern Generator가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A Universal Stability Criterion of the Foot Contact of Legged Robots - Adios ZMP\"</em>이다. ICRA 2006에 실린 이 글은 지금까지 188회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2006 IROS의 <em>\"Biped Walking Pattern Generator allowing Auxiliary ZMP Control\"</em>(178회)이다. 이 시기를 함께 끌어간 축은 <strong>Shuuji Kajita</strong>, <strong>Mitsuharu Morisawa</strong>, <strong>Kensuke Harada</strong>으로 요약된다."}], "themes": [{"num": "01", "title": "Polyhedra Contact에서 Humanoid까지 — 10년마다 무대를 바꾼다", "text": "피벗 점수 0.41는 본 조사 상위권에 해당한다. 같은 이름으로 서명이 이어졌을 뿐, 실제로 다루는 문제는 몇 번이나 통째로 갈렸다. 초기에는 Polyhedra Contact, 지금은 Humanoid — 그 사이에 도구, 평가 방법, 함께 일하는 사람까지 이동한다. 재창조의 연쇄가 이 사람의 경력을 지탱하는 엔진이다."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.9명에서 후기 6.5명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 3명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "자체 궤도 — 학파로 환원되지 않는 경력", "text": "공저 패턴에서 뚜렷한 멘토나 제자 클러스터가 포착되지 않는다. 초기부터 독립적으로 출판한 유형이거나, 관련 사제 관계가 본 데이터 범위 밖에서 진행되었을 수 있다. 어느 쪽이든, 이 경력은 학파의 시간표가 아니라 개인의 선택으로 쓰여왔다."}], "pullquote": "도구를 갈아엎어라. 질문은 남겨둬라.", "highlights": [{"year": 2003, "venue": "ICRA", "title": "Biped walking pattern generation by using preview control of zero-moment point", "cites": 2075}, {"year": 2001, "venue": "IROS", "title": "The 3D linear inve function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
