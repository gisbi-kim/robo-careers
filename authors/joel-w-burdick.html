.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }

.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;

.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

const DATA = {"meta": {"name": "Joel W. Burdick", "given": "Joel W.", "family": "Burdick", "slug": "joel-w-burdick", "rank": 52, "natural_rank": 52, "force_included": false, "composite": 6.994757331820965}, "en": {"tagline": "Nymph Multiprocessor Manipulation → Probabilistic Search → Sensory Coverage", "oneLine": "Began publishing in 1986 and is still active 40 years on. Early work sat in <em>Nymph Multiprocessor Manipulation</em>; recent work centers on <em>Sensory Coverage</em>. More of an incremental broadening than a sharp pivot. The coauthor signal suggests 38 likely students — at this scale, read them as a group leader running a school, not a solo producer.", "facts": [["Period", "<strong>1986 — 2025</strong>"], ["Papers", "166 · 7,253 cites · h=48"], ["Core", "Generalized Voronoi Graph, Mobility Bodies Contact"], ["Landmark", "The Geometric Mechanics of Undulatory Robotic L…"], ["Style", "steady-producer"], ["Shift", "Nymph Multiprocessor Manipulation → Sensory Coverage"]], "phases": [{"years": "1986 — 1990", "id": "I", "title": "Opening bet — Nymph Multiprocessor Manipulation · Redundant Manipulators Characterization", "body": "Between 1986 and 1990, 5 papers — an accumulation period rather than a burst. Most of this stretch's work orbits <span class='hl'>Nymph Multiprocessor Manipulation</span>, <span class='hl'>Redundant Manipulators Characterization</span>. Characterization Self-Motion Manifolds runs alongside as a parallel track. The era's signature work, <em>\"On the inverse kinematics of redundant manipulators: characterization of the self-motion…\"</em>, was published in ICRA 1989 and has accumulated 233 citations. A second anchor, <em>\"An obstacle avoidance algorithm for hyper-redundant manipulators\"</em>, sits alongside (ICRA 1990, 183). The primary co-working axis ran through <strong>J. Bradley Chen</strong>, <strong>Ronald S. Fearing</strong>, <strong>Brian S. R. Armstrong</strong>. 100% of this period's output goes to <span class='hl'>ICRA</spa "}, {"years": "2001 — 2005", "id": "IV", "title": "Era of Distributed Manipulation · Planar Carangiform Fish", "body": "Then, from 2001 through 2005, a steady <strong>26</strong> papers mark this period. The working axis sits on <span class='hl'>Distributed Manipulation</span>, <span class='hl'>Planar Carangiform Fish</span>. Feedback Control Distributed runs alongside as a parallel track. The anchor paper is <em>\"Weighted line fitting algorithms for mobile robot map building and efficient data represe…\"</em> (ICRA 2003, 200 cites). Close behind: <em>\"Stochastic Cloning: A Generalized Framework for Processing Relative State…\"</em> (ICRA 2002, 166). The primary co-working axis ran through <strong>Todd D. Murphey</strong>, <strong>Elon Rimon</strong>, <strong>Stergios I. Roumeliotis</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Burdick — Todd D. Murphey, Samuel T. Pfister, Sota Shimizu, Timothy H. Chung, + 3 more. The transition from solo work to group supervision is visible here. <span class='hl'>ICRA</span> dominates the venue mix in this window (81%)."}, {"years": "2006 — 2010", "id": "V", "title": "Era of Probabilistic Search · Assist-As-Needed Training Paradigms", "body": "In the 2006–2010 window, a steady <strong>21</strong> papers mark this period. The research frame for this period is <span class='hl'>Probabilistic Search</span>, <span class='hl'>Assist-As-Needed Training Paradigms</span>. Paradigms Rehabilitation Spinal emerges as a secondary strand. The face of the period is <em>\"Artificial potential functions for highway driving with collision avoidance\"</em> — ICRA 2008, 236 cites, now a standard reference. The era's working axis reads <strong>Michael T. Wolf</strong>, <strong>Timothy H. Chung</strong>, <strong>Elon Rimon</strong>. New junior coauthors surface in this window — Jeremy Ma, Michael T. Wolf, Noel E. Du Toit, Matanya B. Horowitz, + 2 more. The group around Burdick starts taking shape here. <span class='hl'>ICRA</span> dominates the venue mix in this window (76%)."}, {"years": "2011 — 2015", "id": "VI", "title": "Era of Contact Space Search · Kinematics Combined Quasi-Static", "body": "The 2011–2015 years saw a steady <strong>28</strong> papers mark this period. The center of gravity rests on <span class='hl'>Contact Space Search</span>, <span class='hl'>Kinematics Combined Quasi-Static</span>, threading through most of the era's output. A secondary thread — Two-Finger Caging — appears here. The anchor paper is <em>\"Robot Motion Planning in Dynamic, Uncertain Environments\"</em> (T-RO 2012, 274 cites). Core collaborators: <strong>Jeremy Ma</strong>, <strong>Paul Hebert</strong>, <strong>Nicolas Hudson</strong>. New junior coauthors surface in this window — Paul Hebert, Nicolas Hudson, Krishna Shankar, Thomas F. Allen, + 4 more. The group around Burdick starts taking shape here. <span class='hl'>ICRA</span> dominates the venue mix in this window (75%)."}, {"years": "2016 — 2020", "id": "VII", "title": "Mature expansion — Preference-Based Learning · Inverse Reinforcement Learning", "body": "Between 2016 and 2020, a steady <strong>16</strong> papers mark this period. The working axis sits on <span class='hl'>Preference-Based Learning</span>, <span class='hl'>Inverse Reinforcement Learning</span>. A secondary thread — Wrench Resistant Multi-Finger — appears here. The primary co-working axis ran through <strong>Kun Li</strong>, <strong>Yanan Sui</strong>, <strong>Richard Cheng</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Burdick — Carl Folkestad, Yanan Sui, Yidan Qin, Maegan Tucker. The transition from solo work to group supervision is visible here. <span class='hl'>ICRA</span> dominates the venue mix in this window (56%)."}, {"years": "2021 — 2025", "id": "VIII", "title": "Latest terrain — Sensory Coverage · Surgical State Estimation", "body": "Across the 2021–2025 stretch, a steady <strong>15</strong> papers mark this period. The center of gravity rests on <span class='hl'>Sensory Coverage</span>, <span class='hl'>Surgical State Estimation</span>, threading through most of the era's output. Kinematic Calibration emerges as a secondary strand. The era's working axis reads <strong>Skylar X. Wei</strong>, <strong>Ersin Das</strong>, <strong>Yidan Qin</strong>. This period is when Burdick's cohort begins to form on paper: Ersin Das, Malcolm G. A. Tisdale. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 73% of the period's output."}], "themes": [{"num": "01", "title": "The Generalized Voronoi Graph anchor never moved", "text": "Generalized Voronoi Graph appears among the top topics in most of the 8 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 2.3 early to 5.4 late — the canonical PI-scaling arc. 38 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 38 likely students by coauthor pattern. Names on that list include Jeremy Ma, Todd D. Murphey, Howie Choset, Paul Hebert. 2 of them have re-entered this ranking themselves — dynasty reproduction is already underway. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "A career best read in students, not in papers.", "highlights": [{"year": 1998, "venue": "IJRR", "title": "The Geometric Mechanics of Undulatory Robotic Locomotion", "cites": 333}, {"year": 2000, "venue": "IJRR", "title": "Sensor-Based Exploration: The Hierarchical Generalized Voronoi Graph", "cites": 284} ast_copub_year": 1996}, {"name": "Samuel T. Pfister", "student_first_year": 2002, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2006}], "students_rest": 26}, "archetype": "steady-producer"}, "ko": {"tagline": "Nymph Multiprocessor Manipulation → Probabilistic Search → Sensory Coverage", "oneLine": "1986년에 출판을 시작해 40년째 현장에 머물고 있는 연구자. 초기에는 <em>Nymph Multiprocessor Manipulation</em>를 다루었고, 최근에는 <em>Sensory Coverage</em>가 중심으로 올라왔다. 급격한 단절이라기보다는 인접 영역을 꾸준히 밀고 나간 점진적 확장에 가깝다. 공저 패턴으로 추정되는 제자만 38명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1986 — 2025</strong>"], ["논문 수", "166편 · 인용 7,253 · h=48"], ["핵심", "Generalized Voronoi Graph, Mobility Bodies Contact"], ["대표작", "The Geometric Mechanics of Undulatory Robotic L…"], ["스타일", "steady-producer"], ["전환", "Nymph Multiprocessor Manipulation → Sensory Coverage"]], "phases": [{"years": "1986 — 1990", "id": "I", "title": "출발점 — Nymph Multiprocessor Manipulation · Redundant Manipulators Characterization", "body": "1986년부터 1990년 사이의 5년간, 출판은 5편에 그친다 — 축적기에 가깝다. 연구의 무게 중심은 <span class='hl'>Nymph Multiprocessor Manipulation</span>, <span class='hl'>Redundant Manipulators Characterization</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. Characterization Self-Motion Manifolds 또한 인접 줄기로 관찰된다. ICRA 1989의 <em>\"On the inverse kinematics of redundant manipulators: characterization of the self-motion…\"</em>이 이 시기를 대표한다 — 233회 인용된 작업이다. 그 뒤를 잇는 것이 1990 ICRA의 <em>\"An obstacle avoidance algorithm for hyper-redundant manipulators\"</em>(183회)이다. 이 시기를 함께 끌어간 축은 <strong>J. Bradley Chen</strong>, <strong>Ronald S. Fearing</strong>, <strong>Brian S. R. Armstrong</strong>으로 요약된다. 이 시기 출판물의 100%가 <span class='hl'>ICRA</span>에 집중된다."}, {"years": "1991 — 1995", "id": "II", "title": "궤도의 안착 — Mobility Bodies Contact · Hopping Vertical Forward", "body": "이어진 1991년대 전반, 1991–1995년의 기간 동안 <strong>29편</strong>이 이 기간의 출력물로 남는다. <span class='hl'>Mobility Bodies Contact</span>, <span class='hl'>Hopping Vertical Forward</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. 거기에 Hyper-Redundant가 보조 줄기로 올라온다. ICRA 1994의 <em>\"Nonholonomic Mechanics and Locomotion: The Snakeboard Example\"</em>이 이 시기를 대표한다 — 157회 인용된 작업이다. 이 시기의 실질적 작업 축은 <strong>Gregory S. Chirikjian</strong>, <strong>Elon Rimon</strong>, <strong>I-Ming Chen</strong>와의 협업이었다. 바로 이 시기에 Burdick의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Howie Choset, Richard Mason, I-Ming Chen, James P. Ostrowski 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 이 시기 출판물의 79%가 <span class='hl'>ICRA</span>에 집중된다."}, {"years": "1996 — 2000", "id": "III", "title": "Sensor Planning Planar · Kinematic Metric Functions의 시기", "body": "그 뒤 1996년부터 2000년까지, 이 5년은 <strong>26편</strong>으로 기록된다. 연구의 무게 중심은 <span class='hl'>Sensor Planning Planar</span>, <span class='hl'>Kinematic Metric Functions</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. Hierarchical Generalized Voronoi 또한 인접 줄기로 관찰된다. IJRR 1998의 <em>\"The Geometric Mechanics of Undulatory Robotic Locomotion\"</em>이 이 시기를 대표한다 — 333회 인용된 작업이다. 그 뒤를 잇는 것이 2000 IJRR의 <em>\"Sensor-Based Exploration: The Hierarchical Generalized Voronoi Graph\"</em>(284회)이다. 이 시기의 실질적 작업 축은 <strong>Qiao Lin</strong>, <strong>Elon Rimon</strong>, <strong>Howie Choset</strong>와의 협업이었다. 이 기간에 새로 합류한 후배로 Qiao Lin, Stergios I. Roumeliotis, Bill Goodwine, Amir Shapiro 외 1명이 보인다. Burdick 연구실의 다음 세대가 이 시기에 형성된다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (77%)."}, {"years": "2001 — 2005", "id": "IV", "title": "Distributed Manipulation · Planar Carangiform Fish의 시기", "body": "2001년 무렵부터 2005년에 걸쳐, <strong>26편</strong>이 이 기간의 출력물로 남는다. 주된 연구축은 <span class='hl'>Distributed Manipulation</span>, <span class='hl'>Planar Carangiform Fish</span>에 있었다. Feedback Control Distributed 또한 인접 줄기로 관찰된다. 이 시기의 앵커 페이퍼는 <em>\"Weighted line fitting algorithms for mobile robot map building and efficient data represe…\"</em>이다. ICRA 2003, 누적 200회 인용. 그 뒤를 잇는 것이 2002 ICRA의 <em>\"Stochastic Cloning: A Generalized Framework for Processing Relative State…\"</em>(166회)이다. 이 기간의 핵심 협력자: <strong>Todd D. Murphey</strong>, <strong>Elon Rimon</strong>, <strong>Stergios I. Roumeliotis</strong>. 바로 이 시기에 Burdick의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Todd D. Murphey, Samuel T. Pfister, Sota Shimizu, Timothy H. Chung 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (81%)."}, {"years": "2006 — 2010", "id": "V", "title": "Probabilistic Search · Assist-As-Needed Training Paradigms의 시기", "body": "2006–2010년으로 이어진 이 시기에, 이 5년은 <strong>21편</strong>으로 기록된다. 연구의 무게 중심은 <span class='hl'>Probabilistic Search</span>, <span class='hl'>Assist-As-Needed Training Paradigms</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Paradigms Rehabilitation Spinal가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Artificial potential functions for highway driving with collision avoidance\"</em>이다. ICRA 2008에 실린 이 글은 지금까지 236회 인용되며 이 분야의 표준 참조로 자리 잡았다. 주된 공동 연구축은 <strong>Michael T. Wolf</strong>, <strong>Timothy H. Chung</strong>, <strong>Elon Rimon</strong>에 있다. Burdick와 처음 공저를 시작한 후배 연구자들이 이 시기에 등장한다 — Jeremy Ma, Michael T. Wolf, Noel E. Du Toit, Matanya B. Horowitz 외 2명. 랩 규모가 본격적으로 커지는 신호다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (76%)."}, {"years": "2011 — 2015", "id": "VI", "title": "Contact Space Search · Kinematics Combined Quasi-Static의 시기", "body": "2011년을 기점으로 2015년까지의 흐름 속에서, <strong>28편</strong>이 이 기간에 완성된다. <span class='hl'>Contact Space Search</span>, <span class='hl'>Kinematics Combined Quasi-Static</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. Two-Finger Caging가 옆에서 병렬로 진행된다. 이 시기의 앵커 페이퍼는 <em>\"Robot Motion Planning in Dynamic, Uncertain Environments\"</em>이다. T-RO 2012, 누적 274회 인용. 주된 공동 연구축은 <strong>Jeremy Ma</strong>, <strong>Paul Hebert</strong>, <strong>Nicolas Hudson</strong>에 있다. Burdick와 처음 공저를 시작한 후배 연구자들이 이 시기에 등장한다 — Paul Hebert, Nicolas Hudson, Krishna Shankar, Thomas F. Allen 외 4명. 랩 규모가 본격적으로 커지는 신호다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (75%)."}, {"years": "2016 — 2020", "id": "VII", "title": "성숙기의 확장 — Preference-Based Learning · Inverse Reinforcement Learning", "body": "2016년부터 2020년 사이의 5년간, <strong>16편</strong>이 이 기간에 완성된다. 주된 연구축은 <span class='hl'>Preference-Based Learning</span>, <span class='hl'>Inverse Reinforcement Learning</span>에 있었다. Wrench Resistant Multi-Finger가 옆에서 병렬로 진행된다. 이 시기의 실질적 작업 축은 <strong>Kun Li</strong>, <strong>Yanan Sui</strong>, <strong>Richard Cheng</strong>와의 협업이었다. 바로 이 시기에 Burdick의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Carl Folkestad, Yanan Sui, Yidan Qin, Maegan Tucker. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (56%)."}, {"years": "2021 — 2025", "id": "VIII", "title": "최근의 지형 — Sensory Coverage · Surgical State Estimation", "body": "이어진 2021년대 전반, 2021–2025년의 기간 동안 꾸준한 15편이다 — 과하지도 부족하지도 않은 리듬. <span class='hl'>Sensory Coverage</span>, <span class='hl'>Surgical State Estimation</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. 거기에 Kinematic Calibration가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Skylar X. Wei</strong>, <strong>Ersin Das</strong>, <strong>Yidan Qin</strong>으로 요약된다. 이 기간에 새로 합류한 후배로 Ersin Das, Malcolm G. A. Tisdale이 보인다. Burdick 연구실의 다음 세대가 이 시기에 형성된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 73%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Generalized Voronoi Graph라는 축은 한 번도 흔들리지 않았다", "text": "8개 5년 구간 중 대부분에서 Generalized Voronoi Graph가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.3명에서 후기 5.4명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 38명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 38명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Jeremy Ma, Todd D. Murphey, Howie Choset, Paul Hebert이 있다. 이 가운데 2명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "논문 숫자가 흐려져도, 지도한 연구자 목록은 남는다.", "highlights": [{"year": 1998, "venue": "IJRR", "title": "The Geometric Mechanics of Undulatory Robotic Locomotion", "cites": 333}, {"year": 2000, "venue": "IJRR", "title": "Sensor-Based Exploration: The Hierarchical Generalized Voronoi Graph", "cites": 284}, {"year": 2012, "venue": "T-RO", "title": "Robot Motion Planning in Dynamic, Uncertain Environments", "cites": 274}, {"year": 2008, "venue": "ICRA", "title": "Artificial potential functions for highway driving with collision avoidance", "cites": 236}, {"year": 1989, "venue": "ICRA", "title": "On the inverse kinematics of redundant manipulators: characterization of the self-motion manifolds", "cites": 233}, {"year": 2003, "venue": "ICRA", "title": "Weighted line fitting algorithms for mobile robot map building and efficient data representation", "cites": 200}, {"year": 1990, "venue": "ICRA", "title": "An obstacle avoidance algorithm for hyper-redundant manipulators", "cites": 183}, {"year": 2002, "venue": "ICRA", "title": "Stochastic Cloning: A Generalized Framework for Processing Relative State Measurements", "cites": 166}], "lineage": {"advisors": [], "students": [{"name": "Jeremy Ma", "student_first_year": 2010, "copubs_in_first_5yr": 9, "total_copubs": 9, "student_first_author_count": 3, "we_last_author_count": 9, "last_copub_year": 2015}, {"name": "Todd D. Murphey", "student_first_year": 2001, "copubs_in_first_5yr": 8, "total_copubs": 8, "student_first_author_count": 8, "we_last_author_count": 7, "last_copub_year": 2006}, {"name": "Howie Choset", "student_first_year": 1993, "copubs_in_first_5yr": 6, "total_copubs": 9, "student_first_author_count": 5, "we_last_author_count": 6, "last_copub_year": 2024}, {"name": "Paul Hebert", "student_first_year": 2011, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 5, "we_last_author_count": 6, "last_copub_year": 2015}, {"name": "Nicolas Hudson", function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

    mL.href = '../methodology.html' + (LANG === 'ko' ? '#ko' : '');
  }
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
