asured pace. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span>, the axis that threads through most of the era's output. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Kenji Hashimoto</strong>, <strong>Hiroyuki Ishii</strong>, <strong>Takuya Otani</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Takanishi — Takashi Matsuzawa, Xiao Sun, Katsuaki Tanaka, Jia-Yeu Lin, + 1 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 56% of the period's output."}, {"years": "2019 — 2023", "id": "VII", "title": "Mature expansion — Robot · Trajectory", "body": "Between 2019 and 2023, <strong>12</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Trajectory</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Kenji Hashimoto</strong>, <strong>Hiroyuki Ishii</strong>, <strong>Takuya Otani</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Takanishi — Juri Shimizu, Hiroki Mineshita. The transition from solo work to group supervision is visible here."}, {"years": "2024 — 2025", "id": "VIII", "title": "Latest terrain — Humanoid robot · Teleoperation", "body": "Across the 2024–2025 stretch, the window is a quieter one — 2 papers in total. The center of gravity rests on <span class='hl'>Humanoid robot</span>, <span class='hl'>Teleoperation</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Yuri Nakazawa</strong>, <strong>Takuya Otani</strong>, <strong>Yang Shen</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Takanishi — Yuri Nakazawa. The transition from solo work to group supervision is visible here."}], "themes": [{"num": "01", "title": "The Robot anchor never moved", "text": "Robot appears among the top topics in most of the 8 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 3.9 early to 7.9 late — the canonical PI-scaling arc. 38 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 38 likely students by coauthor pattern. Names on that list include Jorge Solis, Yusuke Sugahara, Kenji Hashimoto, Kazufumi Nishikawa. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "38 students — that's the real body of work.", "highlights": [{"year": 2006, "venue": "ICRA", "title": "Development of a New Humanoid Robot WABIAN-2", "cites": 369}, {"year": 1999, "venue": "ICRA", "title": "Development of a Bipedal Humanoid Robot: Control Method of Whole Body Cooperative Dynamic Biped Walking", "cites": 358}, {"year": 2006, "venue": "IROS", "title": "Human-like Walking with Knee Stretched, Heel-contact and Toe-off Motion by a Humanoid Robot", "cites": 196}, {"year": 2004, "venue": "IROS", "title": "Effective emotional expressions with expression humanoid robot WE-4RII: integration of humanoid robot hand RCH-1", "cites": 136}, {"year": 1990, "venue": "IROS", "title": "Realization of dynamic biped walking stabilized by trunk motion on a sagittally uneven surface", "cites": 130}, {"year": 1993, "venue 을 꾸준히 넓혀온 유형에 가깝다. 공저 패턴으로 추정되는 제자만 38명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1989 — 2025</strong>"], ["논문 수", "199편 · 인용 5,710 · h=40"], ["핵심", "Robot, Humanoid robot"], ["대표작", "Development of a New Humanoid Robot WABIAN-2"], ["스타일", "steady-producer"], ["전환", "Robot → Humanoid robot"]], "phases": [{"years": "1989 — 1993", "id": "I", "title": "출발점 — Robot · Control theory (sociology)", "body": "1989년부터 1993년 사이의 5년간, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Realization of dynamic biped walking stabilized by trunk motion on a sagittally uneven su…\"</em>이다. IROS 1990에 실린 이 글은 지금까지 130회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1993 IROS의 <em>\"Development of a biped walking robot compensating for three-axis moment by…\"</em>(130회)이다. 이 시기를 함께 끌어간 축은 <strong>Ichiro Kato</strong>, <strong>Qinghua Li</strong>, <strong>Hideyuki Karaki</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1994 — 1998", "id": "II", "title": "궤도의 안착 — Robot · Humanoid robot", "body": "이어진 1994년대 전반, 1994–1998년의 기간 동안 <strong>18편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Development of a dynamic biped walking system for humanoid development of a biped walking…\"</em>이다. ICRA 1996에 실린 이 글은 지금까지 100회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Jin&apos</strong>, <strong>ichi Yamaguchi</strong>, <strong>Hideaki Takanobu</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Tomohide Aoki. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 61%가 이 venue에서 소화되었다."}, {"years": "1999 — 2003", "id": "III", "title": "Robot · Humanoid robot의 시기", "body": "그 뒤 1999년부터 2003년까지, 총 <strong>39편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Development of a Bipedal Humanoid Robot: Control Method of Whole Body Cooperative Dynamic…\"</em>이다. ICRA 1999에 실린 이 글은 지금까지 358회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2002 ICRA의 <em>\"Online Walking Pattern Generation for Biped Humanoid Robot with Trunk\"</em>(108회)이다. 이 시기를 함께 끌어간 축은 <strong>Hideaki Takanobu</strong>, <strong>Hun-ok Lim</strong>, <strong>Hiroyasu Miwa</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yusuke Sugahara, Kazufumi Nishikawa, Hiroyasu Miwa, Yu Ogura 외 4명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2004 — 2008", "id": "IV", "title": "Robot · Humanoid robot의 시기", "body": "2004년 무렵부터 2008년에 걸쳐, 총 <strong>51편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Development of a New Humanoid Robot WABIAN-2\"</em>이다. ICRA 2006에 실린 이 글은 지금까지 369회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2006 IROS의 <em>\"Human-like Walking with Knee Stretched, Heel-contact and Toe-off Motion by…\"</em>(196회)이다. 이 시기를 함께 끌어간 축은 <strong>Hun-ok Lim</strong>, <strong>Jorge Solis</strong>, <strong>Yusuke Sugahara</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jorge Solis, Kenji Hashimoto, Nobutsuna Endo, Kotaro Fukui 외 5명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2009 — 2013", "id": "V", "title": "Robot · Humanoid robot의 시기", "body": "2009–2013년으로 이어진 이 시기에, 총 <strong>43편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Jorge Solis</strong>, <strong>Kenji Hashimoto</strong>, <strong>Hiroyuki Ishii</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Tatsuhiro Kishi, Takuya Otani, Sarah Cosentino, Przemyslaw Kryczka 외 8명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2014 — 2018", "id": "VI", "title": "Robot · Humanoid robot의 시기", "body": "2014년을 기점으로 2018년까지의 흐름 속에서, <strong>25편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Kenji Hashimoto</strong>, <strong>Hiroyuki Ishii</strong>, <strong>Takuya Otani</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Takashi Matsuzawa, Xiao Sun, Katsuaki Tanaka, Jia-Yeu Lin 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2019 — 2023", "id": "VII", "title": "성숙기의 확장 — Robot · Trajectory", "body": "2019년부터 2023년 사이의 5년간, <strong>12편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Trajectory</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Kenji Hashimoto</strong>, <strong>Hiroyuki Ishii</strong>, <strong>Takuya Otani</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Juri Shimizu, Hiroki Mineshita. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2024 — 2025", "id": "VIII", "title": "최근의 지형 — Humanoid robot · Teleoperation", "body": "이어진 2024년대 전반, 2024–2025년의 기간 동안 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Humanoid robot</span>, <span class='hl'>Teleoperation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Yuri Nakazawa</strong>, <strong>Takuya Otani</strong>, <strong>Yang Shen</strong>으로 요약된다. 바로 이 시기에 Takanishi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yuri Nakazawa. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "8개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.9명에서 후기 7.9명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 38명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 38명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Jorge Solis, Yusuke Sugahara, Kenji Hashimoto, Kazufumi Nishikawa이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 38명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2006, "venue": "ICRA", "title": "Development of a New Humanoid Robot WABIAN-2", "cites": 369}, {"year": 1999, "venue": "ICRA", "title": "Development of a Bipedal Humanoid Robot: Control Method of Whole Body Cooperative Dynamic Biped Walking", "cites": 358}, {"year": 2006, "venue": "IROS", "title": "Human-like Walking with Knee Stretched, Heel-contact and Toe-off Motion by a Humanoid Robot", "cites": 196}, {"year": 2004, "venue": "IROS", "title": "Effective emotional expressions with expression humanoid robot WE-4RII: integration of humanoid robot hand RCH-1", "cites": 136}, {"year": 1990, "venue": "IROS", "title": "Realization of dynamic biped walking stabilized by trunk motion on a sagittally uneven surface", "cites": 130}, {"year": 1993, "venue": "IROS", "title": "Development of a biped walking robot compensating for three-axis moment by trunk motion", "cites": 130}, {"year": 1990, "venue": "IROS", "title": "A control method for dynamic biped walking under unknown external force", "cites": 120}, {"year": 2002, "venue": "ICRA", "title": "Online Walking Pattern Generation for Biped Humanoid Robot with Trunk", "cites": 108}], "lineage": {"advisors": [], "students": [{"name": "Jorge Solis", "student_first_year": 2004, "copubs_in_first_5yr": 21, "total_copubs": 31, "stud function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
