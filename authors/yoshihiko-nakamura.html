}, {"years": "2012 — 2016", "id": "VI", "title": "Era of Humanoid robot · Artificial intelligence", "body": "The 2012–2016 years saw <strong>28</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Humanoid robot</span>, <span class='hl'>Artificial intelligence</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Incremental learning of full body motion primitives and their sequencing through human mo…\"</em> — published in IJRR 2012, accumulating 221 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Quang-Cuong Pham</strong>, <strong>Wataru Takano</strong>, <strong>Hiroshi Kaminaga</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Nakamura — Stéphane Caron, Carlos Santacruz, Yusuke Goutsu. The transition from solo work to group supervision is visible here."}, {"years": "2017 — 2021", "id": "VII", "title": "Mature expansion — Computer vision · Humanoid robot", "body": "Between 2017 and 2021, <strong>12</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Computer vision</span>, <span class='hl'>Humanoid robot</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Yosuke Ikegami</strong>, <strong>Quang-Cuong Pham</strong>, <strong>Stéphane Caron</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Nakamura — Tianyi Ko, Satoshi Oota. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 58% of the period's output."}, {"years": "2022 — 2025", "id": "VIII", "title": "Latest terrain — Controllability · Robot", "body": "Across the 2022–2025 stretch, the window is a quieter one — 3 papers in total. The center of gravity rests on <span class='hl'>Controllability</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Ko Yamamoto</strong>, <strong>Mitsuo Komagata</strong>, <strong>Yutaro Imashiro</strong>. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 67% of the period's output."}], "themes": [{"num": "01", "title": "The Humanoid robot anchor never moved", "text": "Humanoid robot appears among the top topics in most of the 8 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 2.5 early to 4.9 late — the canonical PI-scaling arc. 29 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 29 likely students by coauthor pattern. Names on that list include Wataru Takano, Ko Ayusawa, Katsu Yamane, Dana Kulic. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "29 students — that's the real body of work.", "highlights": [{"year": 2002, "venue": "ICRA", "title": "Realtime Humanoid Motion Generation through ZMP Manipulation Based on Inverted Pendulum Control", "cites": 460}, {"year": 1989, "venue": "IJRR", "title": "Dynamics and Stability in Coordination of Multiple Robotic Mechanisms", "cites": 335}, {"year": 2010, "venue": "ICRA", "title": "Unified Impedance and Admittance Control", "cites": 330}, {"year": 2004, "venue": "IJRR", "title": "Embodied Symbol Emergence Based on Mimesis Theory", "cites": 328}, {"year": 1990, "venue": "ICRA", "  2009}, {"name": "Takahiro Suzuki", "student_first_year": 1996, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 4, "we_last_author_count": 4, "last_copub_year": 2000}], "students_rest": 17}, "archetype": "mid-career-peak"}, "ko": {"tagline": "Computer science → Artificial intelligence", "oneLine": "1987년에 출판을 시작해 39년째 현장에 머물고 있는 연구자. Computer science를 중심축으로 삼아 일관되게 연구를 이어온 유형. 공저 패턴으로 추정되는 제자만 29명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1987 — 2025</strong>"], ["논문 수", "191편 · 인용 8,336 · h=47"], ["핵심", "Humanoid robot"], ["대표작", "Realtime Humanoid Motion Generation through ZMP…"], ["스타일", "mid-career-peak"], ["전환", "Control theory (sociology) → Controllability"]], "phases": [{"years": "1987 — 1991", "id": "I", "title": "출발점 — Control theory (sociology) · Nonholonomic system", "body": "1987년부터 1991년 사이의 5년간, <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Nonholonomic system</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Dynamics and Stability in Coordination of Multiple Robotic Mechanisms\"</em>이다. IJRR 1989에 실린 이 글은 지금까지 335회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1990 ICRA의 <em>\"Nonholonomic path planning of space robots via bi-directional approach\"</em>(315회)이다. 이 시기를 함께 끌어간 축은 <strong>Kiyoshi Nagai</strong>, <strong>Tsuneo Yoshikawa</strong>, <strong>Modjtaba Ghodoussi</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 73%가 이 venue에서 소화되었다."}, {"years": "1992 — 1996", "id": "II", "title": "궤도의 안착 — Nonholonomic system · Control theory (sociology)", "body": "이어진 1992년대 전반, 1992–1996년의 기간 동안 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Nonholonomic system</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Ole Jakob Sørdalen</strong>, <strong>Woojin Chung</strong>, <strong>K. Yoshimoto</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Takahiro Suzuki, Woojin Chung, Ole Jakob Sørdalen. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 89%가 이 venue에서 소화되었다."}, {"years": "1997 — 2001", "id": "III", "title": "Robot · Humanoid robot의 시기", "body": "그 뒤 1997년부터 2001년까지, 총 <strong>31편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Heartbeat Synchronization for Robotic Cardiac Surgery\"</em>이다. ICRA 2001에 실린 이 글은 지금까지 246회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1999 ICRA의 <em>\"Making Feasible Walking Motion of Humanoid Robots from Human Motion Captur…\"</em>(230회)이다. 이 시기를 함께 끌어간 축은 <strong>Katsu Yamane</strong>, <strong>Masafumi Okada</strong>, <strong>Woojin Chung</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Katsu Yamane, Masafumi Okada, Tomomichi Sugihara, Koji Tatani 외 5명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 58%가 이 venue에서 소화되었다."}, {"years": "2002 — 2006", "id": "IV", "title": "Humanoid robot · Motion (physics)의 시기", "body": "2002년 무렵부터 2006년에 걸쳐, 총 <strong>39편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Humanoid robot</span>, <span class='hl'>Motion (physics)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Realtime Humanoid Motion Generation through ZMP Manipulation Based on Inverted Pendulum C…\"</em>이다. ICRA 2002에 실린 이 글은 지금까지 460회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2004 IJRR의 <em>\"Embodied Symbol Emergence Based on Mimesis Theory\"</em>(328회)이다. 이 시기를 함께 끌어간 축은 <strong>Katsu Yamane</strong>, <strong>Masafumi Okada</strong>, <strong>Tomomichi Sugihara</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Wataru Takano, Dana Kulic, Dongheui Lee, Gentiane Venture 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 62%가 이 venue에서 소화되었다."}, {"years": "2007 — 2011", "id": "V", "title": "Artificial intelligence · Motion (physics)의 시기", "body": "2007–2011년으로 이어진 이 시기에, 총 <strong>58편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Motion (physics)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Unified Impedance and Admittance Control\"</em>이다. ICRA 2010에 실린 이 글은 지금까지 330회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2008 IJRR의 <em>\"Incremental Learning, Clustering and Hierarchy Formation of Whole Body Mot…\"</em>(211회)이다. 이 시기를 함께 끌어간 축은 <strong>Wataru Takano</strong>, <strong>Katsu Yamane</strong>, <strong>Dana Kulic</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ko Ayusawa, Hiroshi Kaminaga, Quang-Cuong Pham, Thomas Nierhoff 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2012 — 2016", "id": "VI", "title": "Humanoid robot · Artificial intelligence의 시기", "body": "2012년을 기점으로 2016년까지의 흐름 속에서, <strong>28편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Humanoid robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Incremental learning of full body motion primitives and their sequencing through human mo…\"</em>이다. IJRR 2012에 실린 이 글은 지금까지 221회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Quang-Cuong Pham</strong>, <strong>Wataru Takano</strong>, <strong>Hiroshi Kaminaga</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Stéphane Caron, Carlos Santacruz, Yusuke Goutsu. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2017 — 2021", "id": "VII", "title": "성숙기의 확장 — Computer vision · Humanoid robot", "body": "2017년부터 2021년 사이의 5년간, <strong>12편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Computer vision</span>, <span class='hl'>Humanoid robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Yosuke Ikegami</strong>, <strong>Quang-Cuong Pham</strong>, <strong>Stéphane Caron</strong>으로 요약된다. 바로 이 시기에 Nakamura의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Tianyi Ko, Satoshi Oota. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 58%가 이 venue에서 소화되었다."}, {"years": "2022 — 2025", "id": "VIII", "title": "최근의 지형 — Controllability · Robot", "body": "이어진 2022년대 전반, 2022–2025년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Controllability</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Ko Yamamoto</strong>, <strong>Mitsuo Komagata</strong>, <strong>Yutaro Imashiro</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Humanoid robot라는 축은 한 번도 흔들리지 않았다", "text": "8개 5년 구간 중 대부분에서 Humanoid robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.5명에서 후기 4.9명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 29명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 29명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Wataru Takano, Ko Ayusawa, Katsu Yamane, Dana Kulic이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 29명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2002, "venue": "ICRA", "title": "Realtime Humanoid Motion Generation through ZMP Manipulation Based on Inverted Pendulum Control", "cites": 460}, {"year": 1989, "venue": "IJRR", "title": "Dynamics and Stability in Coordination of Multiple Robotic Mechanisms", "cites": 335}, {"year": 2010, "venue": "ICRA", "title": "Unified Impedance and Admittance Control", "cites": 330}, {"year": 2004, "venue": "IJRR", "title": "Embodied Symbol Emergence Based on Mimesis Theory", "cites": 328} function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
