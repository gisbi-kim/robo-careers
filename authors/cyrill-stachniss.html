<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;
  font-size: 16px;

}
body {

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;

  gap: 24px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;

  letter-spacing: -0.03em;

.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }

.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding-bottom: 8px;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  font-family: 'Pretendard', sans-serif;
}
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {

}
.phase-body em {

  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;

.pullquote {

  letter-spacing: -0.01em;

.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;

.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {

ame": "Lucas Nunes", "student_first_year": 2022, "copubs_in_first_5yr": 12, "total_copubs": 12, "student_first_author_count": 2, "we_last_author_count": 11, "last_copub_year": 2025}, {"name": "Philipp Lottes", "student_first_year": 2016, "copubs_in_first_5yr": 11, "total_copubs": 13, "student_first_author_count": 5, "we_last_author_count": 10, "last_copub_year": 2023}, {"name": "Nived Chebrolu", "student_first_year": 2017, "copubs_in_first_5yr": 10, "total_copubs": 13, "student_first_author_count": 5, "we_last_author_count": 10, "last_copub_year": 2025}, {"name": "Rodrigo Marcuzzi", "student_first_year": 2022, "copubs_in_first_5yr": 12, "total_copubs": 12, "student_first_author_count": 4, "we_last_author_count": 10, "last_copub_year": 2025}], "students_rest": 41}, "archetype": "steady-producer"}, "ko": {"tagline": "Rao-Blackwellized Particle → User Preferences → Segmentation", "oneLine": "2002년에 출판을 시작해 24년째 현장에 머물고 있는 연구자. 주제를 크게 옮긴 적이 없다. <em>Segmentation</em>라는 축 하나를 24년 내내 파고든 결과가 221편, h=55이라는 숫자다. 대표작은 2007년 T-RO에 실린 \"Improved Techniques for Grid Mapping With Rao-Blackwellized Particle…\" (2,397회 인용). 공저 패턴으로 추정되는 제자만 53명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>2002 — 2025</strong>"], ["논문 수", "221편 · 인용 16,710 · h=55"], ["핵심", "Segmentation, 3D"], ["대표작", "Improved Techniques for Grid Mapping With Rao-B…"], ["스타일", "steady-producer · specialist"], ["전환", "Rao-Blackwellized Particle → Segmentation"]], "phases": [{"years": "2002 — 2006", "id": "I", "title": "출발점 — Rao-Blackwellized Particle · Particle Filters", "body": "2002년부터 2006년 사이의 5년간, <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Rao-Blackwellized Particle</span>, <span class='hl'>Particle Filters</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Multi-Robot Exploration가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Coordinated multi-robot exploration\"</em>이다. T-RO 2005에 실린 이 글은 지금까지 1,143회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2005 ICRA의 <em>\"Improving Grid-based SLAM with Rao-Blackwellized Particle Filters by Adapt…\"</em>(732회)이다. 이 시기를 함께 끌어간 축은 <strong>Wolfram Burgard</strong>, <strong>Giorgio Grisetti</strong>, <strong>Óscar Martínez Mozos</strong>으로 요약된다."}, {"years": "2007 — 2011", "id": "II", "title": "궤도의 안착 — Environments Deformable Objects · Maximum Likelihood Maps", "body": "이어진 2007년대 전반, 2007–2011년의 기간 동안 총 <strong>35편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Environments Deformable Objects</span>, <span class='hl'>Maximum Likelihood Maps</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Mapping Rao-Blackwellized Particle가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Improved Techniques for Grid Mapping With Rao-Blackwellized Particle Filters\"</em>이다. T-RO 2007에 실린 이 글은 지금까지 2,397회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Wolfram Burgard</strong>, <strong>Giorgio Grisetti</strong>, <strong>Kai M. Wurm</strong>으로 요약된다. 바로 이 시기에 Stachniss의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Nichola Abdo, Henrik Kretzschmar, Barbara Frank, Kai M. Wurm 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2012 — 2016", "id": "III", "title": "User Preferences · Dynamic Covariance Scaling의 시기", "body": "그 뒤 2012년부터 2016년까지, 총 <strong>30편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>User Preferences</span>, <span class='hl'>Dynamic Covariance Scaling</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Objects Predicting User가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Wolfram Burgard</strong>, <strong>Luciano Spinello</strong>, <strong>Gian Diego Tipaldi</strong>으로 요약된다. 바로 이 시기에 Stachniss의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Philipp Lottes, Lorenzo Nardi, Olga Vysotska, Igor Bogoslavskyi 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2017 — 2021", "id": "IV", "title": "성숙기의 확장 — Crop Weed · Semantic Segmentation", "body": "2017년 무렵부터 2021년에 걸쳐, 총 <strong>55편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Crop Weed</span>, <span class='hl'>Semantic Segmentation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Precision Farming가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"RangeNet ++: Fast and Accurate LiDAR Semantic Segmentation\"</em>이다. IROS 2019에 실린 이 글은 지금까지 1,184회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2018 RSS의 <em>\"Efficient Surfel-Based SLAM using 3D Laser Range Data in Urban Environments\"</em>(483회)이다. 이 시기를 함께 끌어간 축은 <strong>Jens Behley</strong>, <strong>Andres Milioto</strong>, <strong>Nived Chebrolu</strong>으로 요약된다. 바로 이 시기에 Stachniss의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Federico Magistri, Louis Wiesmann, Xieyuanli Chen, Tiziano Guadagnino 외 16명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2022 — 2025", "id": "V", "title": "최근의 지형 — Segmentation · Moving Object Segmentation", "body": "2022–2025년으로 이어진 이 시기에, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>90편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Segmentation</span>, <span class='hl'>Moving Object Segmentation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Leaf Instance Segmentation가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"KISS-ICP: In Defense of Point-to-Point ICP - Simple, Accurate, and Robust Registration If…\"</em>이다. RA-L 2023에 실린 이 글은 지금까지 418회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Jens Behley</strong>, <strong>Tiziano Guadagnino</strong>, <strong>Federico Magistri</strong>으로 요약된다. 바로 이 시기에 Stachniss의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Elias Marks, Lucas Nunes, Rodrigo Marcuzzi, Matthias Zeller 외 11명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Segmentation라는 축은 한 번도 흔들리지 않았다", "text": "5개 5년 구간 중 대부분에서 Segmentation가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "24년 동안 총 221편, h=55. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": " 본인은 Wolfram Burgard의 네트워크 안에서 경력을 시작한 것으로 보이지만, 지금은 공저 패턴 기준으로 53명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Federico Magistri, Louis Wiesmann, Xieyuanli Chen, Tiziano Guadagnino이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 53명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2007, "venue": "T-RO", "title": "Improved Techniques for Grid Mapping With Rao-Blackwellized Particle Filters", "cites": 2397}, {"year": 2019, "venue": "IROS", "title": "RangeNet ++: Fast and Accurate LiDAR Semantic Segmentation", "cites": 1184}, {"year": 2005, "venue": "T-RO", "title": "Coordinated multi-robot exploration", "cites": 1143}, {"year": 2005, "venue": "ICRA", "title": "Improving Grid-based SLAM with Rao-Blackwellized Particle Filters by Adaptive Proposals and Selective Resampling", "cites": 732}, {"year": 2005, "venue": "RSS", "title": "Information Gain-based Exploration Using Rao-Blackwellized Particle Filters", "cites": 535}, {"year": 2018, "venue": "RSS", "title": "Efficient Surfel-Based SLAM using 3D Laser Range Data in Urban Environments", "cites": 483}, {"year": 2019, "venue": "IROS", "title": "SuMa++: Efficient LiDAR-based Semantic SLAM", "cites": 471}, {"year": 2023, "venue": "RA-L", "title": "KISS-ICP: In Defense of Point-to-Point ICP - Simple, Accurate, and Robust Registration If Done the Right Way", "cites": 418}], "lineage": {"advisors": [{"name": "Wolfram Burgard", "advisor_active_from": 1996, "early_copubs_as_our_first_author": 7, "advisor_last_author_count": 6, "total_copubs": 62}], "students": [{"name": "Federico Magistri", "student_first_year": 2020, "copubs_in_first_5yr": 24, "total_copubs": 24, "student_first_author_count": 6, "we_last_author_count": 18, "last_copub_year": 2025}, {"name": "Louis Wiesmann", "student_first_year": 2021, "copubs_in_first_5yr": 21, "total_copubs": 21, "student_first_author_count": 6, "we_last_author_count": 18, "last_copub_year": 2025}, {"name": "Xieyuanli Chen", "student_first_year": 2019, "copubs_in_first_5yr" function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
