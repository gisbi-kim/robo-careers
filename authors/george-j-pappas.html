<style>

  --accent-2: #2d4a3e;
  --muted: #6b6259;
  --highlight: #f4d35e;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;

}
body {

}

}
.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 24px; flex-wrap: wrap;

  text-transform: uppercase; color: var(--muted);
}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;

  letter-spacing: -0.03em;
  margin-bottom: 18px;
}
.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }
.profile-name .family { display: block; }
.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 0 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 16px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding: 8px 0 0;
  white-space: nowrap;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding: 8px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  font-family: 'Pretendard', sans-serif;
}
.profile-facts dt { border-bottom: 1px dotted rgba(26, 22, 20, 0.2); padding-bottom: 8px; }
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);

.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {

}
.phase-body em {
  font-style: italic;
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px; background: var(--ink); border: 1px solid var(--ink);

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;

  letter-spacing: -0.01em;
}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

.pullquote {

  font-size: clamp(1.2rem, 2.2vw, 1.6rem);

  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;
}
.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);

  background: var(--paper-2);
  border: 1px solid rgba(26, 22, 20, 0.2);

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

/* lineage */
.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }

  .lineage-grid { grid-template-columns: 1fr; gap: 24px; }
}

.foot {
  margin-top: 80px; padding-top: 24px;
  border-top: 1px solid var(--ink);

}

trong>Yiannis Kantaros</strong>. This period is when Pappas's cohort begins to form on paper: Nikolaos Bousias, Lars Lindemann, Kong Yao Chee, Samarth Kalluraya, + 1 more."}], "themes": [{"num": "01", "title": "The Active Information anchor never moved", "text": "Active Information appears among the top topics in most of the 6 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "What time accumulates, one paper at a time", "text": "81 papers, h=35, across 29 years. The headline blockbusters matter, but the real engine under the h-index is the sustained mid-tier output — a long compounding curve rather than a single hit."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 25 likely students by coauthor pattern. Names on that list include Nikolay Atanasov, Brent Schlotfeldt, Hadas Kress-Gazit, Michael M. Zavlanos. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "Becoming part of the structure by outlasting it.", "highlights": [{"year": 2004, "venue": "T-RO", "title": "Leader-to-formation stability", "cites": 779}, {"year": 2009, "venue": "T-RO", "title": "Temporal-Logic-Based Reactive Mission and Motion Planning", "cites": 749}, {"year": 2017, "venue": "ICRA", "title": "Probabilistic data association for semantic SLAM", "cites": 473}, {"year": 2008, "venue": "T-RO", "title": "Distributed Connectivity Control of Mobile Networks", "cites": 346}, {"year": 2007, "venue": "T-RO", "title": "Potential Fields for Maintaining Connectivity of Mobile Networks", "cites": 344}, {"year": 2005, "venue": "T-RO", "title": "Discrete abstractions for robot motion planning and control in ear": 2012, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 1, "we_last_author_count": 4, "last_copub_year": 2015}, {"name": "Georgios E. Fainekos", "student_first_year": 2005, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 1, "we_last_author_count": 4, "last_copub_year": 2009}, {"name": "Mariliza Tzes", "student_first_year": 2021, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2025}, {"name": "A. Agung Julius", "student_first_year": 2009, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 1, "we_last_author_count": 3, "last_copub_year": 2011}, {"name": "Yiannis Kantaros", "student_first_year": 2014, "copubs_in_first_5yr": 2, "total_copubs": 9, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2023}, {"name": "Nader Motee", "student_first_year": 2009, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2010}, {"name": "Nikolaos Bousias", "student_first_year": 2023, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2025}], "students_rest": 13}, "archetype": "steady-producer"}, "ko": {"tagline": "Generation Conflict Resolution → Matrix Permanent → Heterogeneous Teams", "oneLine": "1997년에 출판을 시작해 29년째 현장에 머물고 있는 연구자. 초기에는 <em>Generation Conflict Resolution</em>를 다루었고, 최근에는 <em>Heterogeneous Teams</em>가 중심으로 올라왔다. 급격한 단절이라기보다는 인접 영역을 꾸준히 밀고 나간 점진적 확장에 가깝다. 대표작은 2004년 T-RO에 실린 \"Leader-to-formation stability\" (779회 인용). 공저 패턴으로 추정되는 제자만 25명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1997 — 2025</strong>"], ["논문 수", "81편 · 인용 6,613 · h=35"], ["핵심", "Active Information, Information Acquisition"], ["대표작", "Leader-to-formation stability"], ["스타일", "steady-producer"], ["전환", "Generation Conflict Resolution → Heterogeneous Teams"]], "phases": [{"years": "1997 — 2001", "id": "I", "title": "출발점 — Generation Conflict Resolution · Resolution Manoeuvres Air", "body": "1997년부터 2001년 사이의 5년간, 1편 — 다음 국면을 준비하는 성격이 강하다. 주된 연구축은 <span class='hl'>Generation Conflict Resolution</span>, <span class='hl'>Resolution Manoeuvres Air</span>에 있었다. 거기에 Air Traffic Management가 보조 줄기로 올라온다. 이 시기의 실질적 작업 축은 <strong>Jana Kosecka</strong>, <strong>Claire J. Tomlin</strong>, <strong>Shankar Sastry</strong>와의 협업이었다. 이 시기 출판물의 100%가 <span class='hl'>IROS</span>에 집중된다."}, {"years": "2002 — 2006", "id": "II", "title": "궤도의 안착 — Effect Feedback Feedforward · Feedforward Formation Iss", "body": "이어진 2002년대 전반, 2002–2006년의 기간 동안 8편만이 이 시기의 출판물로 남는다. 연구의 무게 중심은 <span class='hl'>Effect Feedback Feedforward</span>, <span class='hl'>Feedforward Formation Iss</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. Information Driven Coordinated 또한 인접 줄기로 관찰된다. T-RO 2004의 <em>\"Leader-to-formation stability\"</em>이 이 시기를 대표한다 — 779회 인용된 작업이다. 그 뒤를 잇는 것이 2005 T-RO의 <em>\"Discrete abstractions for robot motion planning and control in polygonal e…\"</em>(244회)이다. 주된 공동 연구축은 <strong>Vijay Kumar</strong>, <strong>Herbert G. Tanner</strong>, <strong>Volkan Isler</strong>에 있다. 바로 이 시기에 Pappas의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Hadas Kress-Gazit, Georgios E. Fainekos, Volkan Isler, Nathan Michael 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2007 — 2011", "id": "III", "title": "Dynamic Assignment Distributed · Distributed Motion Planning의 시기", "body": "그 뒤 2007년부터 2011년까지, <strong>19편</strong>이 이 기간에 완성된다. <span class='hl'>Dynamic Assignment Distributed</span>, <span class='hl'>Distributed Motion Planning</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. Mobile Networks가 옆에서 병렬로 진행된다. 이 시기의 앵커 페이퍼는 <em>\"Temporal-Logic-Based Reactive Mission and Motion Planning\"</em>이다. T-RO 2009, 누적 749회 인용. 두 번째 앵커는 <em>\"Distributed Connectivity Control of Mobile Networks\"</em>(T-RO 2008, 346회). 이 기간의 핵심 협력자: <strong>Vijay Kumar</strong>, <strong>Hadas Kress-Gazit</strong>, <strong>Michael M. Zavlanos</strong>. 이 기간에 새로 합류한 후배로 Michael M. Zavlanos, Mahmut Selman Sakar, A. Agung Julius, Nader Motee이 보인다. Pappas 연구실의 다음 세대가 이 시기에 형성된다. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (58%)."}, {"years": "2012 — 2016", "id": "IV", "title": "Matrix Permanent · Information Acquisition의 시기", "body": "2012년 무렵부터 2016년에 걸쳐, <strong>12편</strong>이 이 기간의 출력물로 남는다. 이 기간 작업의 골조는 <span class='hl'>Matrix Permanent</span>, <span class='hl'>Information Acquisition</span>에 놓인다. Active Object가 옆에서 병렬로 진행된다. 이 시기를 함께 끌어간 축은 <strong>Nikolay Atanasov</strong>, <strong>Jerome Le Ny</strong>, <strong>Kostas Daniilidis</strong>으로 요약된다. 바로 이 시기에 Pappas의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Nikolay Atanasov, Jerome Le Ny, Yiannis Kantaros, Nicola Bezzo. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2017 — 2021", "id": "V", "title": "성숙기의 확장 — Active Information · Information Gathering", "body": "2017–2021년으로 이어진 이 시기에, <strong>22편</strong>이 이 기간에 완성된다. 이 시기 연구는 <span class='hl'>Active Information</span>, <span class='hl'>Information Gathering</span>을 중심으로 전개되었다. Unexplored Semantic Environments가 옆에서 병렬로 진행된다. 이 시기의 앵커 페이퍼는 <em>\"Probabilistic data association for semantic SLAM\"</em>이다. ICRA 2017, 누적 473회 인용. 두 번째 앵커는 <em>\"Resilient Flocking for Mobile Robot Teams\"</em>(RA-L 2017, 192회). 주된 공동 연구축은 <strong>Vijay Kumar</strong>, <strong>Brent Schlotfeldt</strong>, <strong>Nikolay Atanasov</strong>에 있다. 이 기간에 새로 합류한 후배로 Brent Schlotfeldt, Mariliza Tzes, Matthew Malencia, Lifeng Zhou 외 3명이 보인다. Pappas 연구실의 다음 세대가 이 시기에 형성된다."}, {"years": "2022 — 2025", "id": "VI", "title": "최근의 지형 — Heterogeneous Teams · Active Information Acquisition", "body": "2022년을 기점으로 2025년까지의 흐름 속에서, 꾸준한 19편이다 — 과하지도 부족하지도 않은 리듬. 주된 연구축은 <span class='hl'>Heterogeneous Teams</span>, <span class='hl'>Active Information Acquisition</span>에 있었다. Learning-Based Predictive Control 또한 인접 줄기로 관찰된다. 이 시기의 실질적 작업 축은 <strong>Vijay Kumar</strong>, <strong>M. Ani Hsieh</strong>, <strong>Yiannis Kantaros</strong>와의 협업이었다. 이 기간에 새로 합류한 후배로 Nikolaos Bousias, Lars Lindemann, Kong Yao Chee, Samarth Kalluraya 외 1명이 보인다. Pappas 연구실의 다음 세대가 이 시기에 형성된다."}], "themes": [{"num": "01", "title": "Active Information라는 축은 한 번도 흔들리지 않았다", "text": "6개 5년 구간 중 대부분에서 Active Information가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "29년 동안 총 81편, h=35. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 25명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Nikolay Atanasov, Brent Schlotfeldt, Hadas Kress-Gazit, Michael M. Zavlanos이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "빠르게 가지 않아도 멀리 간다.", "highlights": [{"year": 2004, "venue": "T-RO", "title": "Leader-to-formation stability", "cites": 779}, {"year": 2009, "venue": "T-RO", "title": "Temporal-Logic-Based Reactive Mission and Motion Planning", "cites": 749}, {"year": 2017, "venue": "ICRA", "title": "Probabilistic data association for semantic SLAM", "cites": 473}, {"year": 2008, "venue": "T-RO", "title": "Distributed Connectivity Control of Mobile Networks", "cites": 346}, {"year": 2007, "venue": "T-RO", "title": "Potential Fields for Maintaining Connectivity of Mobile Networks", "cites": 344}, {"year": 2005, "venue": "T-RO", "title": "Discrete abstractions for robot motion planning and control in polygonal environments", "cites": 244}, {"year": 2005, "venue": "ICRA", "title": "Temporal Logic Motion Planning for Mobile Robots", "cites": 232}, {"year": 2007, "venue": "ICRA", "title": "Where's Waldo? Sensor-Based Temporal Logic Motion Planning", "cites": 222}], "lineage": {"advisors": [], "students": [{"name": "Nikolay Atanasov", "student_first_year": 2012, "copubs_in_first_5yr": 9, "total_copu     noStudent: "제자 후보 신호 없음",
    advisorMeta: a => `${a.advisor_active_from}~ · 본인 초기 1저자 ${a.early_copubs_as_our_first_author}편 중 멘토 마지막저자 ${a.advisor_last_author_count}편`,
    studentMeta: s => `${s.student_first_year}~${s.last_copub_year} · 본인 마지막저자 ${s.we_last_author_count}편 / 학생 1저자 ${s.student_first_author_count}편 중`,
    moreStudents: n => `+ ${n}명 더`,
    rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · 합성점수 순위 #${natural}` : '';
      const forcePart = force ? ` · ★ 큐레이션 포함 (합성점수 기준 컷 아래지만 분야 대표성 확보 위해 포함)` : '';
      return `#${rank}${natPart} · 합성점수 ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "회 인용",
    footData: '데이터: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← 홈으로",
  }
};

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').innerHTML = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').innerHTML = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  const mL = document.getElementById('methodologyLink');
  if (mL) {
    mL.textContent = (LANG === 'ko' ? '방법론 ↗' : 'methodology ↗');
    mL.href = '../methodology.html' + (LANG === 'ko' ? '#ko' : '');
  }
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
