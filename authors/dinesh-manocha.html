first_5yr": 6, "total_copubs": 6, "student_first_author_count": 6, "we_last_author_count": 6, "last_copub_year": 2009}], "students_rest": 35}, "archetype": "mid-career-peak-3"}, "ko": {"tagline": "Computer science → Robot", "oneLine": "1992년에 출판을 시작해 34년째 현장에 머물고 있는 연구자. Computer science를 중심축으로 삼아 일관되게 연구를 이어온 유형. 대표작은 2008년 ICRA에 실린 \"Reciprocal Velocity Obstacles for real-time multi-agent navigation\" (1,682회 인용). 공저 패턴으로 추정되는 제자만 47명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1992 — 2025</strong>"], ["논문 수", "184편 · 인용 8,801 · h=45"], ["핵심", "Robot, Computation"], ["대표작", "Reciprocal Velocity Obstacles for real-time mul…"], ["스타일", "mid-career-peak-3"], ["전환", "Inverse kinematics → Artificial intelligence"]], "phases": [{"years": "1992 — 1996", "id": "I", "title": "출발점 — Inverse kinematics · Kinematics", "body": "1992년부터 1996년 사이의 5년간, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Inverse kinematics</span>, <span class='hl'>Kinematics</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>John F. Canny</strong>, <strong>Ming C. Lin</strong>, <strong>Aaron S. Wallack</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1997 — 2001", "id": "II", "title": "궤도의 안착 — Computation · Voronoi diagram", "body": "이어진 1997년대 전반, 1997–2001년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Computation</span>, <span class='hl'>Voronoi diagram</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Fast Distance Queries with Rectangular Swept Sphere Volumes\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 275회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Ming C. Lin</strong>, <strong>Eric Larsen</strong>, <strong>Stefan Gottschalk</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2002 — 2006", "id": "III", "title": "Motion planning · Robot의 시기", "body": "그 뒤 2002년부터 2006년까지, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Motion planning</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Gokul Varadhan</strong>, <strong>Ming C. Lin</strong>, <strong>Young J. Kim</strong>으로 요약된다. 바로 이 시기에 Manocha의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Liangjun Zhang, Russell Gayle, Gokul Varadhan, Young J. Kim 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2007 — 2011", "id": "IV", "title": "Robot · Computation의 시기", "body": "2007년 무렵부터 2011년에 걸쳐, <strong>23편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Computation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Reciprocal Velocity Obstacles for real-time multi-agent navigation\"</em>이다. ICRA 2008에 실린 이 글은 지금까지 1,682회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2011 T-RO의 <em>\"The Hybrid Reciprocal Velocity Obstacle\"</em>(445회)이다. 이 시기를 함께 끌어간 축은 <strong>Liangjun Zhang</strong>, <strong>Ming C. Lin</strong>, <strong>Young J. Kim</strong>으로 요약된다. 바로 이 시기에 Manocha의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jia Pan, Jamie Snape, Jur van den Berg, Min Tang 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2012 — 2016", "id": "V", "title": "Computation · Trajectory의 시기", "body": "2012–2016년으로 이어진 이 시기에, <strong>19편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Computation</span>, <span class='hl'>Trajectory</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"FCL: A general purpose library for collision and proximity queries\"</em>이다. ICRA 2012에 실린 이 글은 지금까지 532회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Jia Pan</strong>, <strong>Aniket Bera</strong>, <strong>Sachin Chitta</strong>으로 요약된다. 바로 이 시기에 Manocha의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Zherong Pan, Aniket Bera, Chonhyon Park, Tanmay Randhavane 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 58%가 이 venue에서 소화되었다."}, {"years": "2017 — 2021", "id": "VI", "title": "성숙기의 확장 — Artificial intelligence · Robot", "body": "2017년을 기점으로 2021년까지의 흐름 속에서, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>60편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"PORCA: Modeling and Planning for Autonomous Driving Among Many Pedestrians\"</em>이다. RA-L 2018에 실린 이 글은 지금까지 207회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2019 Sci-Rob의 <em>\"AADS: Augmented autonomous driving simulation using data-driven algorithms\"</em>(207회)이다. 이 시기를 함께 끌어간 축은 <strong>Aniket Bera</strong>, <strong>Zherong Pan</strong>, <strong>Jia Pan</strong>으로 요약된다. 바로 이 시기에 Manocha의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Adarsh Jagan Sathyamoorthy, Tianrui Guan, Jing Liang, Rohan Chandra 외 14명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2022 — 2025", "id": "VII", "title": "최근의 지형 — Artificial intelligence · Robot", "body": "2022년부터 2025년 사이의 5년간, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>65편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Kasun Weerakoon</strong>, <strong>Jing Liang</strong>, <strong>Tianrui Guan</strong>으로 요약된다. 바로 이 시기에 Manocha의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Kasun Weerakoon, Mohamed Elnoor, Xijun Wang, Gershom Seneviratne 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.2명에서 후기 5.0명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 47명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 47명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Adarsh Jagan Sathyamoorthy, Tianrui Guan, Kasun Weerakoon, Jing Liang이 있다. 이 가운데 1명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 47명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2008, "venue": "ICRA", "title": "Reciprocal Velocity Obstacles for real-time multi-agent navigation", "cites": 1682}, {"year": 2012, "venue": "ICRA", "title": "FCL: A general purpose library for collision and proximity queries", "cites": 532}, {"year": 2011, "venue": "T-RO", "title": "The Hybrid Reciprocal Velocity Obstacle", "cites": 445}, {"year": 2011, "venue": "ICRA", "title": "Reciprocal collision avoidance with acceleration-velocity obstacles", "cites": 286}, {"year": 2000, "venue": "ICRA", "title": "Fast Distance Queries with Rectangular Swept Sphere Volumes", "cites": 275}, {"year": 2009, "venue": "IROS", "title": "Generalized velocity obstacles", "cites": 243}, {"year": 2018, "venue": "RA-L", "title": "PORCA: Modeling and Planning for Autonomous Driving Among Many Pedestrians", "cites": 207}, {"year": 2019, "venue": "Sci-Rob", "title": "AADS: Augmented autonomous driving simulation using data-driven algorithms", "cites": 207}], "lineage": {"advisors": [], "students": [{"name": "Adarsh Jagan Sathyamoorthy", "student_first_year": 2019, "copubs_in_first_5yr": 16, "total_copubs": 16, "student_first_author_count": 7, "we_last_author_count": 16, "last_copub_year": 2024}, {"name": "Tianrui Guan", "student_first_year": 2020, "copubs_in_first_5yr": 17, "total_copubs": 17, "student_first_author_count": 4, "we_last_author_count": 15, "last_copub_year": 2025}, {"name": "Kasun Weerakoon", "student_first_year": 2022, "copubs_in_first_5yr": 16, "total_copubs": 16, "student_first_author_count": 4, "we_last_author_count": 15, "last_copub_year": 2025}, {"name": "Jing Liang", "student_first_year": 2020, "copubs_in_first_5yr": 19, "total_copubs": 19, "student_first_author_count": 8, "we_last_author_count": 14 function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
