], ["핵심", "Compliantly Actuated, Flexible Joint"], ["대표작", "A Unified Passivity-based Control Framework for…"], ["스타일", "steady-producer · specialist"], ["전환", "Torque Controlled Light-Weight → Shared Control Assistive"]], "phases": [{"years": "1998 — 2002", "id": "I", "title": "출발점 — Torque Controlled Light-Weight · Light Weight", "body": "1998년부터 2002년 사이의 5년간, 7편만이 이 시기의 출판물로 남는다. 주된 연구축은 <span class='hl'>Torque Controlled Light-Weight</span>, <span class='hl'>Light Weight</span>에 있었다. Flexible Joint가 옆에서 병렬로 진행된다. ICRA 2001의 <em>\"On a New Generation of Torque Controlled Light-Weight Robots\"</em>이 이 시기를 대표한다 — 302회 인용된 작업이다. 이 기간의 핵심 협력자: <strong>Gerd Hirzinger</strong>, <strong>Matthias Hähnle</strong>, <strong>Norbert Sporer</strong>. <span class='hl'>ICRA</span>가 이 시기 주된 발표 창구로 기능했다 (71%)."}, {"years": "2003 — 2007", "id": "II", "title": "궤도의 안착 — Flexible Joint · Cartesian Impedance", "body": "이어진 2003년대 전반, 2003–2007년의 기간 동안 이 5년은 <strong>18편</strong>으로 기록된다. 주된 연구축은 <span class='hl'>Flexible Joint</span>, <span class='hl'>Cartesian Impedance</span>에 있었다. 거기에 Controller Flexible가 보조 줄기로 올라온다. 이 시기의 앵커 페이퍼는 <em>\"A Unified Passivity-based Control Framework for Position, Torque and Impedance Control of…\"</em>이다. IJRR 2007, 누적 802회 인용. 두 번째 앵커는 <em>\"Collision Detection and Safe Reaction with the DLR-III Lightweight Manipul…\"</em>(IROS 2006, 761회). 주된 공동 연구축은 <strong>Gerd Hirzinger</strong>, <strong>Christian Ott</strong>, <strong>Sami Haddadin</strong>에 있다. Albu-Schäffer와 처음 공저를 시작한 후배 연구자들이 이 시기에 등장한다 — Sami Haddadin, Thomas Wimböck, Andreas Stemmer, Luc Le Tien 외 2명. 랩 규모가 본격적으로 커지는 신호다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2008 — 2012", "id": "III", "title": "Variable Stiffness · Role Mass Velocity의 시기", "body": "그 뒤 2008년부터 2012년까지, <strong>53편</strong>을 남긴다. <span class='hl'>Variable Stiffness</span>, <span class='hl'>Role Mass Velocity</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. Velocity Physical Human-Robot 또한 인접 줄기로 관찰된다. 이 기간의 얼굴이 된 논문은 <em>\"Collision detection and reaction: A contribution to safe physical Human-Robot Interaction\"</em>이다. IROS 2008에 실린 이 글은 지금까지 559회 인용되며 이 분야의 표준 참조로 자리 잡았다. 두 번째 앵커는 <em>\"The DLR hand arm system\"</em>(ICRA 2011, 430회). 이 시기의 실질적 작업 축은 <strong>Sami Haddadin</strong>, <strong>Gerd Hirzinger</strong>, <strong>Thomas Wimböck</strong>와의 협업이었다. 이 기간에 새로 합류한 후배로 Alexander Dietrich, Dominic Lakatos, Florian Petit, Sven Parusel 외 11명이 보인다. Albu-Schäffer 연구실의 다음 세대가 이 시기에 형성된다."}, {"years": "2013 — 2017", "id": "IV", "title": "Compliantly Actuated · Divergent Component Motion의 시기", "body": "2013년 무렵부터 2017년에 걸쳐, 총 <strong>42편</strong>의 논문이 나온다. 주된 연구축은 <span class='hl'>Compliantly Actuated</span>, <span class='hl'>Divergent Component Motion</span>에 있었다. 거기에 Nonlinear Oscillations Cyclic가 보조 줄기로 올라온다. 이 시기의 앵커 페이퍼는 <em>\"Robot Collisions: A Survey on Detection, Isolation, and Identification\"</em>이다. T-RO 2017, 누적 747회 인용. 그 뒤를 잇는 것이 2015 T-RO의 <em>\"Three-Dimensional Bipedal Walking Control Based on Divergent Component of…\"</em>(362회)이다. 이 시기의 실질적 작업 축은 <strong>Christian Ott</strong>, <strong>Dominic Lakatos</strong>, <strong>Alexander Dietrich</strong>와의 협업이었다. 바로 이 시기에 Albu-Schäffer의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ribin Balachandran, Manuel Keppler, Daniel Seidel, Peter Lehner 외 4명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "V", "title": "성숙기의 확장 — Compliantly Actuated · Control Compliantly", "body": "2018–2022년으로 이어진 이 시기에, 총 <strong>45편</strong>의 논문이 나온다. <span class='hl'>Compliantly Actuated</span>, <span class='hl'>Control Compliantly</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. Nonlinear Normal Modes가 옆에서 병렬로 진행된다. 단 한 편에 의존하지 않는 시기다. 여러 중량급 논문이 분산되어 인용을 채운다. 이 시기를 함께 끌어간 축은 <strong>Christian Ott</strong>, <strong>Dominic Lakatos</strong>, <strong>Freek Stulp</strong>으로 요약된다. 바로 이 시기에 Albu-Schäffer의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Davide Calzolari, Alessandro M. Giordano, Alessandro Massimo Giordano, Ismael Rodríguez 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VI", "title": "최근의 지형 — Shared Control Assistive · Singularity-Robust Prioritized Whole-Body", "body": "2023년을 기점으로 2025년까지의 흐름 속에서, 이 5년은 <strong>18편</strong>으로 기록된다. 연구의 무게 중심은 <span class='hl'>Shared Control Assistive</span>, <span class='hl'>Singularity-Robust Prioritized Whole-Body</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Whole-Body Tracking Interaction가 보조 줄기로 올라온다. 이 시기의 실질적 작업 축은 <strong>Maged Iskandar</strong>, <strong>Freek Stulp</strong>, <strong>Alexander Dietrich</strong>와의 협업이었다."}], "themes": [{"num": "01", "title": "Compliantly Actuated라는 축은 한 번도 흔들리지 않았다", "text": "6개 5년 구간 중 대부분에서 Compliantly Actuated가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "컨퍼런스 중심에서 저널 중심으로 이동", "text": "초기 논문 중 저널(T-RO/IJRR/RA-L 등) 비중은 3%에 불과했지만, 최근 시기에는 68%까지 올라왔다. 후반기 출판 전략이 '회의장에서의 속도'에서 '저널을 통한 정제'로 전환된 전형적 궤적. 신진 연구자에게 자연스러운 순서로 보일 수 있지만, 실제로는 모든 사람이 이 방향을 택하는 건 아니라는 점이 중요하다."}, {"num": "03", "title": "배출한 제자가 다시 top 순위로 진입 — 학파가 재생산되는 중", "text": "공저 패턴으로 추정되는 제자 40명 중 1명이 본 랭킹 안에 다시 들어와 있다 (예: Alexander Dietrich, Dominic Lakatos, Florian Petit, Sven Parusel). '대가가 대가를 기른다'는 드문 실증 케이스. 개인 커리어를 넘어 학맥 자체가 성립해가는 구간이다."}], "pullquote": "커리어를 사람으로 읽어야 하는 경우.", "highlights": [{"year": 2007, "venue": "IJRR", "title": "A Unified Passivity-based Control Framework for Position, Torque and Impedance Control of Flexible Joint Robots", "cites": 802}, {"year": 2006, "venue": "IROS", "title": "Collision Detection and Safe Reaction with the DLR-III Lightweight Manipulator Arm", "cites": 761}, {"year": 2017, "venue": "T-RO", "title": "Robot Collisions: A Survey on Detection, Isolation, and Identification", "cites": 747}, {"year": 2008, "venue": "IROS", "title": "Collision detection and reaction: A contribution to safe physical Human-Robot Interaction", "cites": 559}, {"year": 2011, "venue": function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  const mL = document.getElementById('methodologyLink');
  if (mL) {
    mL.textContent = (LANG === 'ko' ? '방법론 ↗' : 'methodology ↗');
    mL.href = '../methodology.html' + (LANG === 'ko' ? '#ko' : '');
  }
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
