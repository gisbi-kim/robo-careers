.rank-badge {

.lineage-item .sig {

const DATA = {"meta": {"name": "Paolo Dario", "given": "Paolo", "family": "Dario", "slug": "paolo-dario", "rank": 27, "natural_rank": 27, "force_included": false, "composite": 10.995479277593866}, "en": {"tagline": "Computer science → Kinematics → Fish locomotion", "oneLine": "Began publishing in 1985 and is still active 41 years on. Gradual expansion — starting in Computer science and reaching Fish locomotion without ever making a sharp break. More of an incremental broadening than a pivot. The landmark is the 2020 Sci-Rob paper \"Combating COVID-19 - The role of robotics in managing public health a…\" (564 cites). The coauthor signal suggests 49 likely students — at this scale, read them as a group leader running a school, not a solo producer.", "facts": [["Period", "<strong>1985 — 2025</strong>"], ["Papers", "172 · 7,459 cites · h=47"], ["Core", "Robot"], ["Landmark", "Combating COVID-19 - The role of robotics in ma…"], ["Style", "mid-career-peak-3"], ["Shift", "Artificial intelligence → Fish locomotion"]], "phases": [{"years": "1985 — 1989", "id": "I", "title": "Opening bet — Artificial intelligence · Tactile sensor", "body": "Between 1985 and 1989, the window is a quieter one — 6 papers in total. The center of gravity rests on <span class='hl'>Artificial intelligence</span>, <span class='hl'>Tactile sensor</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Antonio Bicchi</strong>, <strong>Massimo Bergamasco</strong>, <strong>Pier Carlo Pinotti</strong>. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 67% of the period's output."}, {"years": "1990 — 1994", "id": "II", "title": "Finding the orbit — Artificial intelligence · Robot", "body": "Across the 1990–1994 stretch, <strong>17</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Benedetto Allotta</strong>, <strong>Michele Rucci</strong>, <strong>Giorgio C. Buttazzo</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Dario — Eugenio Guglielmelli, Michele Rucci, Vincenzo Genovese, Benedetto Allotta. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 88% of the period's output."}, {"years": "1995 — 1999", "id": "III", "title": "Era of Artificial intelligence · Tactile sensor", "body": "Over the five years from 1995 to 1999, <strong>17</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Artificial intelligence</span>, <span class='hl'>Tactile sensor</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Maria Chiara Carrozza</strong>, <strong>Davide Taddeucci</strong>, <strong>Roberto Lazzarini</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Dario — Arianna Menciassi, Maria Chiara Carrozza, Simona D&apos, Carlo Colombo, + 3 more. The transition from solo work to group supervision is visible here."}, {"years": "2000 — 2004", "id": "IV", "title": "Era of Robot · Artificial intelligence", "body": "Then, from 2000 through 2004, <strong>36</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Design and Development of an Underactuated Prosthetic Hand\"</em> — published in ICRA 2002, accumulating 332 citations and becoming a standard reference in the sub-field. Close behind: <em>\"A SMA Actuated Artificial Earthworm\"</em> (ICRA 2004, 159 cites). The era's working axis reads <strong>Cecilia Laschi</strong>, <strong>Arianna Menciassi</strong>, <strong>Eugenio Guglielmelli</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Dario — Loredana Zollo, Giancarlo Teti, Silvestro Micera, Luca Ascari, + 12 more. The transition from solo work to group supervision is visible here."}, {"years": "2005 — 2009", "id": "V", "title": "Era of Kinematics · Robot", "body": "In the 2005–2009 window, <strong>43</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Kinematics</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Biomechatronic Design and Control of an Anthropomorphic Artificial Hand for Prosthetic an…\"</em> — published in T-Mech 2007, accumulating 330 citations and becoming a standard reference in the sub-field. Close behind: <em>\"A New Mechanism for Mesoscale Legged Locomotion in Compliant Tubular Envir…\"</em> (T-RO 2009, 269 cites). The era's working axis reads <strong>Arianna Menciassi</strong>, <strong>Maria Chiara Carrozza</strong>, <strong>Eugenio Guglielmelli</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Dario — Barbara Mazzolai, Gabriele Ferri, Virgilio Mattoli, Umberto Scarfogliero, + 9 more. The transition from solo work to group supervision is visible here."}, {"years": "2010 — 2014", "id": "VI", "title": "Era of Robot · Artificial intelligence", "body": "The 2010–2014 years saw <strong>30</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Design of a Novel Bimanual Robotic System for Single-Port Laparoscopy\"</em> — published in T-Mech 2010, accumulating 173 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Design, Fabrication, and Testing of a Capsule With Hybrid >Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Benedetto Allotta</strong>, <strong>Michele Rucci</strong>, <strong>Giorgio C. Buttazzo</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Eugenio Guglielmelli, Michele Rucci, Vincenzo Genovese, Benedetto Allotta. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 88%가 이 venue에서 소화되었다."}, {"years": "1995 — 1999", "id": "III", "title": "Artificial intelligence · Tactile sensor의 시기", "body": "그 뒤 1995년부터 1999년까지, <strong>17편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Tactile sensor</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Maria Chiara Carrozza</strong>, <strong>Davide Taddeucci</strong>, <strong>Roberto Lazzarini</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Arianna Menciassi, Maria Chiara Carrozza, Simona D&apos, Carlo Colombo 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2000 — 2004", "id": "IV", "title": "Robot · Artificial intelligence의 시기", "body": "2000년 무렵부터 2004년에 걸쳐, 총 <strong>36편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Design and Development of an Underactuated Prosthetic Hand\"</em>이다. ICRA 2002에 실린 이 글은 지금까지 332회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2004 ICRA의 <em>\"A SMA Actuated Artificial Earthworm\"</em>(159회)이다. 이 시기를 함께 끌어간 축은 <strong>Cecilia Laschi</strong>, <strong>Arianna Menciassi</strong>, <strong>Eugenio Guglielmelli</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Loredana Zollo, Giancarlo Teti, Silvestro Micera, Luca Ascari 외 12명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2005 — 2009", "id": "V", "title": "Kinematics · Robot의 시기", "body": "2005–2009년으로 이어진 이 시기에, 총 <strong>43편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Kinematics</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Biomechatronic Design and Control of an Anthropomorphic Artificial Hand for Prosthetic an…\"</em>이다. T-Mech 2007에 실린 이 글은 지금까지 330회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2009 T-RO의 <em>\"A New Mechanism for Mesoscale Legged Locomotion in Compliant Tubular Envir…\"</em>(269회)이다. 이 시기를 함께 끌어간 축은 <strong>Arianna Menciassi</strong>, <strong>Maria Chiara Carrozza</strong>, <strong>Eugenio Guglielmelli</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Barbara Mazzolai, Gabriele Ferri, Virgilio Mattoli, Umberto Scarfogliero 외 9명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2010 — 2014", "id": "VI", "title": "Robot · Artificial intelligence의 시기", "body": "2010년을 기점으로 2014년까지의 흐름 속에서, 총 <strong>30편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Design of a Novel Bimanual Robotic System for Single-Port Laparoscopy\"</em>이다. T-Mech 2010에 실린 이 글은 지금까지 173회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2010 T-Mech의 <em>\"Design, Fabrication, and Testing of a Capsule With Hybrid Locomotion for G…\"</em>(160회)이다. 이 시기를 함께 끌어간 축은 <strong>Arianna Menciassi</strong>, <strong>Cecilia Laschi</strong>, <strong>Barbara Mazzolai</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Massimiliano Simi, Giuseppe Tortora, Marco Salerno, Matteo Cianchetti 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2015 — 2019", "id": "VII", "title": "Artificial intelligence · Stiffness의 시기", "body": "2015년부터 2019년 사이의 5년간, <strong>14편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Stiffness</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Biohybrid actuators for robotics: A review of devices actuated by living cells\"</em>이다. Sci-Rob 2017에 실린 이 글은 지금까지 511회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Toshio Fukuda</strong>, <strong>Cecilia Laschi</strong>, <strong>Filippo Cavallo</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Taimoor Hassan. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2020 — 2024", "id": "VIII", "title": "성숙기의 확장 — Robot · Robotics", "body": "이어진 2020년대 전반, 2020–2024년의 기간 동안 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Robotics</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Combating COVID-19 - The role of robotics in managing public health and infectious diseas…\"</em>이다. Sci-Rob 2020에 실린 이 글은 지금까지 564회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Guang-Zhong Yang</strong>, <strong>Steven H. Collins</strong>, <strong>Ken Goldberg</strong>으로 요약된다. 바로 이 시기에 Dario의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Gianluca Manduca, Xuyang Ren. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2025 — 2025", "id": "IX", "title": "최근의 지형 — Fish locomotion · Traveling wave", "body": "그 뒤 2025년부터 2025년까지, 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Fish locomotion</span>, <span class='hl'>Traveling wave</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Robot가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Gianluca Manduca</strong>, <strong>Luca Padovani</strong>, <strong>Gaspare Santaera</strong>으로 요약된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "9개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.8명에서 후기 6.7명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 49명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 49명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Barbara Mazzolai, Arianna Menciassi, Loredana Zollo, Giancarlo Teti이 있다. 이 가운데 1명은 본 집계 안 };

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
