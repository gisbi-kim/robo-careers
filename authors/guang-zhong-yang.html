* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {

  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }

}

.rank-badge {
  font-family: 'JetBrains Mono', monospace;

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;

.profile-facts {
  display: grid;

  gap: 0 16px;

  border-left: 2px solid var(--ink);
  padding-left: 16px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);

.profile-facts dd {

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);

  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);

.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;

.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;

.phase-id {

.phase-body p {

.phase-body strong { color: var(--accent); font-weight: 700; }

.themes {

  content: '"';

  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {

  font-family: 'JetBrains Mono', monospace;

.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

r_count": 7, "last_copub_year": 2025}, {"name": "Xiao-Yun Zhou", "student_first_year": 2016, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 4, "we_last_author_count": 6, "last_copub_year": 2020}, {"name": "Wenqiang Chi", "student_first_year": 2017, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 3, "we_last_author_count": 6, "last_copub_year": 2020}, {"name": "Mohamed E. M. K. Abdelaziz", "student_first_year": 2017, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 1, "we_last_author_count": 6, "last_copub_year": 2020}], "students_rest": 28}, "archetype": "late-bloomer"}, "ko": {"tagline": "Minimally Invasive Surgery → Active Constraints → Photoacoustic Microscopy", "oneLine": "2008년에 출판을 시작해 18년째 현장에 머물고 있는 연구자. 주제를 크게 옮긴 적이 없다. <em>Active Constraints</em>라는 축 하나를 18년 내내 파고든 결과가 165편, h=35이라는 숫자다. 대표작은 2019년 Sci-Rob에 실린 \"XAI - Explainable artificial intelligence\" (1,827회 인용). 공저 패턴으로 추정되는 제자만 40명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>2008 — 2025</strong>"], ["논문 수", "165편 · 인용 6,898 · h=35"], ["핵심", "Active Constraints, Minimally Invasive Surgery"], ["대표작", "XAI - Explainable artificial intelligence"], ["스타일", "late-bloomer · specialist"], ["전환", "Minimally Invasive Surgery → Photoacoustic Microscopy"]], "phases": [{"years": "2008 — 2012", "id": "I", "title": "출발점 — Minimally Invasive Surgery · Joint Flexible Access", "body": "2008년부터 2012년 사이의 5년간, <strong>20편</strong>이 이 기간에 완성된다. 연구의 무게 중심은 <span class='hl'>Minimally Invasive Surgery</span>, <span class='hl'>Joint Flexible Access</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. Invasive 또한 인접 줄기로 관찰된다. 이 기간의 얼굴이 된 논문은 <em>\"An articulated universal joint based flexible access robot for minimally invasive surgery\"</em>이다. ICRA 2011에 실린 이 글은 지금까지 153회 인용되며 이 분야의 표준 참조로 자리 잡았다. 나란히 놓이는 것이 2012 IROS의 <em>\"A force feedback system for endovascular catheterisation\"</em>(102회)이다. 이 시기를 함께 끌어간 축은 <strong>Ara Darzi</strong>, <strong>Christopher J. Payne</strong>, <strong>David P. Noonan</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 75%가 이 venue에서 소화되었다."}, {"years": "2013 — 2017", "id": "II", "title": "궤도의 안착 — Active Constraints · Implicit Active", "body": "이어진 2013년대 전반, 2013–2017년의 기간 동안 출판 강도가 확연히 높아진다. <strong>61편</strong>이 이 기간의 성과물이다. 주된 연구축은 <span class='hl'>Active Constraints</span>, <span class='hl'>Implicit Active</span>에 있었다. Concentric Tube가 옆에서 병렬로 진행된다. 단 한 편에 의존하지 않는 시기다. 여러 중량급 논문이 분산되어 인용을 채운다. 이 시기의 실질적 작업 축은 <strong>Konrad Leibrandt</strong>, <strong>Petros Giataganas</strong>, <strong>Valentina Vitiello</strong>와의 협업이었다. 바로 이 시기에 Yang의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Konrad Leibrandt, Petros Giataganas, Gauthier Gras, Piyamate Wisanuvej 외 18명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "III", "title": "성숙기의 확장 — Robot-Assisted Endovascular · Shape Instantiation", "body": "그 뒤 2018년부터 2022년까지, 이 5년은 다작의 정점이다. 총 <strong>71편</strong>이 쌓인다. 이 시기 연구는 <span class='hl'>Robot-Assisted Endovascular</span>, <span class='hl'>Shape Instantiation</span>을 중심으로 전개되었다. Endovascular Catheterization가 옆에서 병렬로 진행된다. 이 시기의 앵커 페이퍼는 <em>\"XAI - Explainable artificial intelligence\"</em>이다. Sci-Rob 2019, 누적 1,827회 인용. 그 뒤를 잇는 것이 2020 Sci-Rob의 <em>\"Combating COVID-19 - The role of robotics in managing public health and in…\"</em>(564회)이다. 이 시기의 실질적 작업 축은 <strong>Celia V. Riga</strong>, <strong>Dandan Zhang</strong>, <strong>Jindong Liu</strong>와의 협업이었다. Yang와 처음 공저를 시작한 후배 연구자들이 이 시기에 등장한다 — Zicong Wu, Yun Gu, Jianxin Yang, Mali Shen 외 10명. 랩 규모가 본격적으로 커지는 신호다."}, {"years": "2023 — 2025", "id": "IV", "title": "최근의 지형 — Photoacoustic Microscopy · Generalizable Movement Intention", "body": "2023년 무렵부터 2025년에 걸쳐, <strong>13편</strong>이 이 기간에 완성된다. <span class='hl'>Photoacoustic Microscopy</span>, <span class='hl'>Generalizable Movement Intention</span> — 이 시기 그의 출판물을 묶는 주된 틀이다. Intention Recognition Heterogeneous가 옆에서 병렬로 진행된다. 이 시기의 앵커 페이퍼는 <em>\"Magnetic soft microfiberbots for robotic embolization\"</em>이다. Sci-Rob 2024, 누적 157회 인용. 주된 공동 연구축은 <strong>Yao Guo</strong>, <strong>Yuxuan Liu</strong>, <strong>Jianxin Yang</strong>에 있다. Yang와 처음 공저를 시작한 후배 연구자들이 이 시기에 등장한다 — Junyang Wu, Jinkai Li, Yating Luo, Xinyao Zhou. 랩 규모가 본격적으로 커지는 신호다."}], "themes": [{"num": "01", "title": "Active Constraints라는 축은 한 번도 흔들리지 않았다", "text": "4개 5년 구간 중 대부분에서 Active Constraints가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "18년 동안 총 165편, h=35. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 40명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Konrad Leibrandt, Petros Giataganas, Gauthier Gras, Piyamate Wisanuvej이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "40명을 내보낸 것이, 진짜 결과물이다.", "highlights": [{"year": 2019, "venue": "Sci-Rob", "title": "XAI - Explainable artificial intelligence", "cites": 1827}, {"year": 2020, "venue": "Sci-Rob", "title": "Combating COVID-19 - The role of robotics in managing public health and infectious diseases", "cites": 564}, {"year": 2021, "venue": "Sci-Rob", "title": "A decade retrospective of medical robotics research from 2010 to 2020", "cites": 465}, {"year": 2024, "venue": "Sci-Rob", "title": "Magnetic soft microfiberbots for robotic embolization", "cites": 157}, {"year": 2011, "venue": "ICRA", "title": "An articulated universal joint based flexible access robot for minimally invasive surgery", "cites": 153}, {"year": 2021, "venue": "Sci-Rob", "title": "Progress in robotics for combating infectious diseases", "cites": 114}, {"year": 2019, "venue": "RA-L", "title": "Normalization in Training U-Net for 2-D Biomedical Semantic Segmentation", "cit function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').innerHTML = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').innerHTML = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  const mL = document.getElementById('methodologyLink');
  if (mL) {
    mL.textContent = (LANG === 'ko' ? '방법론 ↗' : 'methodology ↗');
    mL.href = '../methodology.html' + (LANG === 'ko' ? '#ko' : '');
  }
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
