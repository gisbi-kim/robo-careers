.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;

on\"</em> — published in IJRR 2013, accumulating 594 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>J. Andrew Bagnell</strong>, <strong>David Silver</strong>, <strong>Dov Katz</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Stentz — Bradford Neuman, Jean Oh, G. Ayorkor Korsah. The transition from solo work to group supervision is visible here."}, {"years": "2021 — 2021", "id": "VII", "title": "Latest terrain — Terrain · Artificial intelligence", "body": "Between 2021 and 2021, the window is a quieter one — 1 papers in total. The center of gravity rests on <span class='hl'>Terrain</span>, <span class='hl'>Artificial intelligence</span>, the axis that threads through most of the era's output. The key working partner of this era is <strong>Jacqueline Libby</strong>. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 100% of the period's output."}], "themes": [{"num": "01", "title": "The Robot anchor never moved", "text": "Robot appears among the top topics in most of the 7 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 2.1 early to 3.9 late — the canonical PI-scaling arc. 19 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 19 likely students by coauthor pattern. Names on that list include Dave Ferguson, M. Bernardine Dias, Alonzo Kelly, Juan Pablo Gonzalez. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientis : 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2009}, {"name": "Dov Katz", "student_first_year": 2008, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2013}, {"name": "Boris Sofman", "student_first_year": 2006, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2011}, {"name": "Nidhi Kalra", "student_first_year": 2005, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2007}, {"name": "David Silver", "student_first_year": 2003, "copubs_in_first_5yr": 2, "total_copubs": 6, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2015}], "students_rest": 7}, "archetype": "mid-career-peak-3"}, "ko": {"tagline": "Computer science → Robot → Terrain", "oneLine": "1986년에 출판을 시작해 36년째 현장에 머물고 있는 연구자. Computer science에서 출발한 연구 관심이 서서히 Terrain까지 확장되어온 점진적 궤적. 급격한 피벗이라기보다는 인접 영역을 꾸준히 넓혀온 유형에 가깝다. 대표작은 1994년 ICRA에 실린 \"Optimal and Efficient Path Planning for Partially-Known Environments\" (875회 인용). 이 시기 19명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1986 — 2021</strong>"], ["논문 수", "80편 · 인용 6,632 · h=43"], ["핵심", "Robot"], ["대표작", "Optimal and Efficient Path Planning for Partial…"], ["스타일", "mid-career-peak-3"], ["전환", "Mobile robot → Terrain"]], "phases": [{"years": "1986 — 1990", "id": "I", "title": "출발점 — Mobile robot · Blackboard system", "body": "1986년부터 1990년 사이의 5년간, 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Mobile robot</span>, <span class='hl'>Blackboard system</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"An architecture for sensor fusion in a mobile robot\"</em>이다. ICRA 1986에 실린 이 글은 지금까지 192회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Steven A. Shafer</strong>, <strong>Charles E. Thorpe</strong>, <strong>Yoshimasa Goto</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1991 — 1995", "id": "II", "title": "궤도의 안착 — Robot · Computer vision", "body": "이어진 1991년대 전반, 1991–1995년의 기간 동안 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Computer vision</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Optimal and Efficient Path Planning for Partially-Known Environments\"</em>이다. ICRA 1994에 실린 이 글은 지금까지 875회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Gary Shaffer</strong>, <strong>Javier Gonzalez</strong>, <strong>Aníbal Ollero</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}, {"years": "1996 — 2000", "id": "III", "title": "Motion planning · Terrain의 시기", "body": "그 뒤 1996년부터 2000년까지, <strong>12편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Motion planning</span>, <span class='hl'>Terrain</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Recent Progress in Local and Global Traversability for Planetary Rovers\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 246회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Alonzo Kelly</strong>, <strong>Barry Brumitt</strong>, <strong>Sanjiv Singh</strong>으로 요약된다. 바로 이 시기에 Stentz의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Alonzo Kelly, Barry Brumitt, Mark Ollis, Patrick Rowe 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2001 — 2005", "id": "IV", "title": "Robot · Task (project management)의 시기", "body": "2001년 무렵부터 2005년에 걸쳐, <strong>16편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Task (project management)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Multi-Robot Exploration Controlled by a Market Economy\"</em>이다. ICRA 2002에 실린 이 글은 지금까지 493회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>M. Bernardine Dias</strong>, <strong>Dave Ferguson</strong>, <strong>Robert Zlot</strong>으로 요약된다. 바로 이 시기에 Stentz의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Dave Ferguson, M. Bernardine Dias, Juan Pablo Gonzalez, Robert Zlot 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2006 — 2010", "id": "V", "title": "Robot · Motion planning의 시기", "body": "2006–2010년으로 이어진 이 시기에, <strong>25편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Motion planning</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Replanning with RRTs\"</em>이다. ICRA 2006에 실린 이 글은 지금까지 272회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2006 IJRR의 <em>\"Toward Reliable Off Road Autonomous Vehicles Operating in Challenging Envi…\"</em>(238회)이다. 이 시기를 함께 끌어간 축은 <strong>Dave Ferguson</strong>, <strong>Edward Gil Jones</strong>, <strong>M. Bernardine Dias</strong>으로 요약된다. 바로 이 시기에 Stentz의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ling Xu, Edward Gil Jones, Dov Katz, Boris Sofman. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2011 — 2015", "id": "VI", "title": "성숙기의 확장 — Robot · Artificial intelligence", "body": "2011년을 기점으로 2015년까지의 흐름 속에서, <strong>19편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"A comprehensive taxonomy for multi-robot task allocation\"</em>이다. IJRR 2013에 실린 이 글은 지금까지 594회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>J. Andrew Bagnell</strong>, <strong>David Silver</strong>, <strong>Dov Katz</strong>으로 요약된다. 바로 이 시기에 Stentz의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Bradford Neuman, Jean Oh, G. Ayorkor Korsah. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2021 — 2021", "id": "VII", "title": "최근의 지형 — Terrain · Artificial intelligence", "body": "2021년부터 2021년 사이의 5년간, 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Terrain</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 실질적으로 함께 끌고 간 파트너는 <strong>Jacqueline Libby</strong>이다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.1명에서 후기 3.9명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 19명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 19명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Dave Ferguson, M. Bernardine Dias, Alonzo Kelly, Juan Pablo Gonzalez이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "도구가 바뀌어도 살아남는 질문을 고르라.", "highlights": [{"year": 1994, "venue": "ICRA", "title": "Optimal and Efficient Path Planning for Partially-Known Environments", "cites": 875}, {"year": 2013, "venue": "IJRR", "title": "A comprehensive taxonomy for multi-robot task allocation", "cites": 594}, {"year": 2002, "venue": "ICRA", "title": "Multi-Robot Exploration Controlled by a Market Economy", "cites": 493}, {"year": 2006, "venue": "ICRA", "title": "Replanning with RRTs", "cites": 272}, {"year": 2000, "venue": "ICRA", "title": "Recent Progress in Local and Global Traversability for Planetary Rovers", "cites": 246}, {"year": 2006, "venue": "IJRR", "title": "Toward Reliable Off Road Autonomous Vehicles Operating in Challenging Environments", "cites": 238}, {"year": 2006, "venue": "IROS", "title": "Anytime RRTs", "cites": 235}, {"year": 2006, "venue": "IJRR", "title": "Market-based Multirobot Coordination for Complex Tasks", "cites": 224}], "lineage": {"advisors": [], "students": [{"name": "Dave Ferguson", "student_first_year": 2004, "copubs_in_first_5     hlLabel: "KEY WORKS",

    lineageLabel: "LINEAGE",

    advisorMeta: a => `${a.advisor_active_from}~ · last-author on ${a.advisor_last_author_count}/${a.early_copubs_as_our_first_author} of our early 1st-author`,

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
