.rank-badge {

.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }

  display: grid;

.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {

.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {

.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;

o work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 55% of the period's output."}, {"years": "2008 — 2012", "id": "IV", "title": "Era of Autonomous Underwater · Ocean", "body": "Then, from 2008 through 2012, <strong>42</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Autonomous Underwater</span>, <span class='hl'>Ocean</span>, the axis that threads through most of the era's output. Autonomous Surface emerges as a secondary strand. The face of the period is <em>\"Visual-Inertial Sensor Fusion: Localization, Mapping and Sensor-to-Sensor Self-calibration\"</em> — published in IJRR 2011, accumulating 529 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Maxim A. Batalin</strong>, <strong>William J. Kaiser</strong>, <strong>Jnaneshwar Das</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Sukhatme — Ryan K. Williams, Jnaneshwar Das, Ryan N. Smith, Jonathan Binney, + 6 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 57% of the period's output."}, {"years": "2013 — 2017", "id": "V", "title": "Era of Trajectory Optimization Self-Calibration · Topological Cables Separate", "body": "In the 2013–2017 window, <strong>47</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Trajectory Optimization Self-Calibration</span>, <span class='hl'>Topological Cables Separate</span>, the axis that threads through most of the era's output. Separate Manipulate Sets emerges as a secondary strand. The face of the period is <em>\"Crazyswarm: A large nano-quadcopter swarm\"</em> — published in ICRA 2017, accumulating 412 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Sampling-based robotic information gathering algorithms\"< · h=62"], ["핵심", "Sensor Network, Adaptive Sampling"], ["대표작", "Constrained Coverage for Mobile Sensor Networks"], ["스타일", "steady-producer · specialist"], ["전환", "Development Emg Control → Open X-Embodiment"]], "phases": [{"years": "1993 — 1997", "id": "I", "title": "출발점 — Development Emg Control · Control Prosthesis Hand", "body": "1993년부터 1997년 사이의 5년간, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Development Emg Control</span>, <span class='hl'>Control Prosthesis Hand</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Mission Reachability Extraterrestrial가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>George A. Bekey</strong>, <strong>Thea Iberall</strong>, <strong>Denise Beattie</strong>으로 요약된다."}, {"years": "1998 — 2002", "id": "II", "title": "궤도의 안착 — Detection Identification Mobile · Fault Detection", "body": "이어진 1998년대 전반, 1998–2002년의 기간 동안 <strong>27편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Detection Identification Mobile</span>, <span class='hl'>Fault Detection</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Multi-Robot Task Allocation가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Most valuable player: a robot device server for distributed control\"</em>이다. IROS 2001에 실린 이 글은 지금까지 414회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2002 ICRA의 <em>\"Robomote: A Tiny Mobile Robot Platform for Large-Scale Ad-Hoc Sensor Netwo…\"</em>(362회)이다. 이 시기를 함께 끌어간 축은 <strong>Maja J. Mataric</strong>, <strong>Stergios I. Roumeliotis</strong>, <strong>George A. Bekey</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Andrew Howard, Srikanth Saripalli, Stergios I. Roumeliotis, Puneet Goel 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2003 — 2007", "id": "III", "title": "Sensor Network · Adaptive Sampling의 시기", "body": "그 뒤 2003년부터 2007년까지, 총 <strong>47편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Sensor Network</span>, <span class='hl'>Adaptive Sampling</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Sampling Environmental가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Constrained Coverage for Mobile Sensor Networks\"</em>이다. ICRA 2004에 실린 이 글은 지금까지 547회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2003 ICRA의 <em>\"Studying the Feasibility of Energy Harvesting in a Mobile Sensor Network\"</em>(338회)이다. 이 시기를 함께 끌어간 축은 <strong>Maxim A. Batalin</strong>, <strong>Maja J. Mataric</strong>, <strong>Srikanth Saripalli</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Maxim A. Batalin, Stefan Hrabar, Marin Kobilarov, Denis F. Wolf 외 8명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 55%가 이 venue에서 소화되었다."}, {"years": "2008 — 2012", "id": "IV", "title": "Autonomous Underwater · Ocean의 시기", "body": "2008년 무렵부터 2012년에 걸쳐, 총 <strong>42편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Autonomous Underwater</span>, <span class='hl'>Ocean</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Autonomous Surface가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Visual-Inertial Sensor Fusion: Localization, Mapping and Sensor-to-Sensor Self-calibration\"</em>이다. IJRR 2011에 실린 이 글은 지금까지 529회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Maxim A. Batalin</strong>, <strong>William J. Kaiser</strong>, <strong>Jnaneshwar Das</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ryan K. Williams, Jnaneshwar Das, Ryan N. Smith, Jonathan Binney 외 6명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 57%가 이 venue에서 소화되었다."}, {"years": "2013 — 2017", "id": "V", "title": "Trajectory Optimization Self-Calibration · Topological Cables Separate의 시기", "body": "2013–2017년으로 이어진 이 시기에, 총 <strong>47편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Trajectory Optimization Self-Calibration</span>, <span class='hl'>Topological Cables Separate</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Separate Manipulate Sets가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Crazyswarm: A large nano-quadcopter swarm\"</em>이다. ICRA 2017에 실린 이 글은 지금까지 412회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2014 IJRR의 <em>\"Sampling-based robotic information gathering algorithms\"</em>(329회)이다. 이 시기를 함께 끌어간 축은 <strong>Ryan K. Williams</strong>, <strong>Karol Hausman</strong>, <strong>Geoffrey A. Hollinger</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Eric Heiden, James A. Preiss, Karol Hausman, Ragesh K. Ramachandran 외 6명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "VI", "title": "성숙기의 확장 — Adaptive Informative Sampling · Markov Decision Processes", "body": "2018년을 기점으로 2022년까지의 흐름 속에서, 총 <strong>40편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Adaptive Informative Sampling</span>, <span class='hl'>Markov Decision Processes</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Deformable Object가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Trajectory Planning for Quadrotor Swarms\"</em>이다. T-RO 2018에 실린 이 글은 지금까지 305회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Eric Heiden</strong>, <strong>James A. Preiss</strong>, <strong>Ragesh K. Ramachandran</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Christopher E. Denniston, David Millard, Baskin Senbaslar, Gautam Salhotra 외 7명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VII", "title": "최근의 지형 — Open X-Embodiment · Small Policies", "body": "2023년부터 2025년 사이의 5년간, <strong>20편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Open X-Embodiment</span>, <span class='hl'>Small Policies</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Scalable Signal Inference가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Christopher E. Denniston</strong>, <strong>Baskin Senbaslar</strong>, <strong>Shashank Hegde</strong>으로 요약된다. 바로 이 시기에 Sukhatme의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Shashank Hegde, Zhehui Huang. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Sensor Network라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Sensor Network가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.2명에서 후기 8.1명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 56명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": " 본인은 George A. Bekey의 네트워크 안에서 경력을 시작한 것으로 보이지만, 지금은 공저 패턴 기준으로 56명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Ryan K. Williams, Andrew Howard, Maxim A. Batalin, Eric Heiden이 있다. 이 가운데 1명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 56명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2004, "venue": "ICRA", "title": "Constrained Coverage for Mobile Sensor Networks", "cites": 547}, {"year": 2011, "venue": "IJRR", "title": "Visual-Inertial Sensor Fusion: Localization, Mapping and Sensor-to-Sensor Self-calibration", "cites": 529}, {"year": 2001, "venue": "IROS", "title": "Most valuable player: a robot device server for distributed control", "cites": 414}, {"year": 2017, "venue": "ICRA", "title": "Crazyswarm: A large nano-quadcopter swarm", "cites": 412}, {"year": 2002, "venue": "ICRA", "title": "Robomote: A Tiny Mobile Robot Platform for Large-Scale Ad-Hoc Sensor Networks", "cites": 362}, {"year": 2003, "venue": "ICRA", "title": "Studying the Feasibility of Energy Harvesting in a Mobile Sensor Network", "cites": 338}, {"year": 2014, "venue": "IJRR", "title": "Sampling-based robotic information gathering algorithms", "cites": 329}, {"year": 2002, "venue": "ICRA", "title": "Vision-Based Autonomous Landing of an Unmanned Aerial Vehicle", "cites": 322}], "lineage": {"advisors": [{"name": "George A. Bekey", "advisor_active_from": 1985, "early_copubs_as_our_first_author": 2, "advisor_last_author_count": 2, "total_copubs": 8}], "students": [{"nam       const natPart = (natural && natural !== rank) ? ` · 합성점수 순위 #${natural}` : '';
      const forcePart = force ? ` · ★ 큐레이션 포함 (합성점수 기준 컷 아래지만 분야 대표성 확보 위해 포함)` : '';
      return `#${rank}${natPart} · 합성점수 ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "회 인용",
    footData: '데이터: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← 홈으로",
  }
};

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
