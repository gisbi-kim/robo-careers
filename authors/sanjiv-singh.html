* { box-sizing: border-box; margin: 0; padding: 0; }

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {

}

  font-weight: 900; font-style: italic;

}

.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {

}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;

  align-items: start;
}
.profile-name {

.profile-tag {

}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;

  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;

.phase-body em {

  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;

}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;

  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;

.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;

}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);

.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;

.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }

}

.foot {

  font-size: 0.68rem; text-transform: uppercase;

b-field. The era's working axis reads <strong>Dennis Strelow</strong>, <strong>Parag H. Batavia</strong>, <strong>George Kantor</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Singh — Geoffrey A. Hollinger, Dennis Strelow, George Kantor, Frederik W. Heger, + 1 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>IROS</span> absorbed 64% of the period's output."}, {"years": "2006 — 2010", "id": "V", "title": "Era of Flying Among Obstacles · Multi-Agent Teams", "body": "In the 2006–2010 window, <strong>19</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Flying Among Obstacles</span>, <span class='hl'>Multi-Agent Teams</span>, the axis that threads through most of the era's output. Moving Target emerges as a secondary strand. The face of the period is <em>\"Flying Fast and Low Among Obstacles: Methodology and Experiments\"</em> — published in IJRR 2008, accumulating 187 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Range-only SLAM for Robots Operating Cooperatively with Sensor Networks\"</em> (ICRA 2006, 157 cites). The era's working axis reads <strong>Geoffrey A. Hollinger</strong>, <strong>Joseph Djugash</strong>, <strong>Sebastian A. Scherer</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Singh — Sebastian A. Scherer, Stephen Nuske, Supreeth Achar, Joseph Djugash. The transition from solo work to group supervision is visible here."}, {"years": "2011 — 2015", "id": "VI", "title": "Mature expansion — Autonomous Landing · Odometry Mapping", "body": "The 2011–2015 years saw <strong>22</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Autonomous Landing</span>, <span class='hl'>Odometry Mapping</span>, the axis that threads through most of the era's outpu : 1, "we_last_author_count": 2, "last_copub_year": 2013}, {"name": "Andrew Chambers", "student_first_year": 2011, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2013}, {"name": "Joseph Djugash", "student_first_year": 2006, "copubs_in_first_5yr": 5, "total_copubs": 6, "student_first_author_count": 3, "we_last_author_count": 1, "last_copub_year": 2012}, {"name": "Bradley Hamner", "student_first_year": 2003, "copubs_in_first_5yr": 2, "total_copubs": 5, "student_first_author_count": 1, "we_last_author_count": 1, "last_copub_year": 2012}], "students_rest": 1}, "archetype": "late-bloomer-2"}, "ko": {"tagline": "Path Planning Intersecting → Range-Only Localization → Aerial Maneuvers", "oneLine": "1986년에 출판을 시작해 34년째 현장에 머물고 있는 연구자. 그의 궤적은 <em>Path Planning Intersecting</em>에서 <em>Aerial Maneuvers</em>에 이르는 긴 재창조의 연쇄였다 — 같은 이름으로 서명했지만 실제로 다뤘던 질문은 10년에 한 번씩 크게 갈아엎혔다. 대표작은 2014년 RSS에 실린 \"LOAM: Lidar Odometry and Mapping in Real-time\" (3,033회 인용). 이 시기 13명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1986 — 2019</strong>"], ["논문 수", "69편 · 인용 7,492 · h=36"], ["핵심", "Flying Among Obstacles, Coordination Periodic Connectivity"], ["대표작", "LOAM: Lidar Odometry and Mapping in Real-time"], ["스타일", "late-bloomer-2 · pivoter"], ["전환", "Path Planning Intersecting → Aerial Maneuvers"]], "phases": [{"years": "1986 — 1990", "id": "I", "title": "출발점 — Path Planning Intersecting · Intersecting Convex Shapes", "body": "1986년부터 1990년 사이의 5년간, 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Path Planning Intersecting</span>, <span class='hl'>Intersecting Convex Shapes</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Position Path Tracking가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Meghanad D. Wagh</strong>, <strong>Dong Hun Shin</strong>으로 요약된다."}, {"years": "1991 — 1995", "id": "II", "title": "궤도의 안착 — Autonomous Retrieval Buried · Learning Predict Resistive", "body": "이어진 1991년대 전반, 1991–1995년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Autonomous Retrieval Buried</span>, <span class='hl'>Learning Predict Resistive</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Resistive Forces Excavation가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Reid G. Simmons</strong>, <strong>Herman Herman</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "1996 — 2000", "id": "III", "title": "Planning Space Feasible · Feasible Actions Examples의 시기", "body": "그 뒤 1996년부터 2000년까지, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Planning Space Feasible</span>, <span class='hl'>Feasible Actions Examples</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Multi-Resolution Planning Earthmoving가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Recent Progress in Local and Global Traversability for Planetary Rovers\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 246회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Anthony Stentz</strong>, <strong>Alex Yahja</strong>, <strong>Howard Cannon</strong>으로 요약된다. 바로 이 시기에 Singh의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Alex Yahja. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 57%가 이 venue에서 소화되었다."}, {"years": "2001 — 2005", "id": "IV", "title": "Range-Only Localization · Obstacle Detection의 시기", "body": "2001년 무렵부터 2005년에 걸쳐, <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Range-Only Localization</span>, <span class='hl'>Obstacle Detection</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Detection Adaptive Color가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Motion Estimation from Image and Inertial Measurements\"</em>이다. IJRR 2004에 실린 이 글은 지금까지 152회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Dennis Strelow</strong>, <strong>Parag H. Batavia</strong>, <strong>George Kantor</strong>으로 요약된다. 바로 이 시기에 Singh의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Geoffrey A. Hollinger, Dennis Strelow, George Kantor, Frederik W. Heger 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 64%가 이 venue에서 소화되었다."}, {"years": "2006 — 2010", "id": "V", "title": "Flying Among Obstacles · Multi-Agent Teams의 시기", "body": "2006–2010년으로 이어진 이 시기에, <strong>19편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Flying Among Obstacles</span>, <span class='hl'>Multi-Agent Teams</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Moving Target가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Flying Fast and Low Among Obstacles: Methodology and Experiments\"</em>이다. IJRR 2008에 실린 이 글은 지금까지 187회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2006 ICRA의 <em>\"Range-only SLAM for Robots Operating Cooperatively with Sensor Networks\"</em>(157회)이다. 이 시기를 함께 끌어간 축은 <strong>Geoffrey A. Hollinger</strong>, <strong>Joseph Djugash</strong>, <strong>Sebastian A. Scherer</strong>으로 요약된다. 바로 이 시기에 Singh의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Sebastian A. Scherer, Stephen Nuske, Supreeth Achar, Joseph Djugash. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2011 — 2015", "id": "VI", "title": "성숙기의 확장 — Autonomous Landing · Odometry Mapping", "body": "2011년을 기점으로 2015년까지의 흐름 속에서, <strong>22편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Autonomous Landing</span>, <span class='hl'>Odometry Mapping</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Self-Supervised Segmentation River가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"LOAM: Lidar Odometry and Mapping in Real-time\"</em>이다. RSS 2014에 실린 이 글은 지금까지 3,033회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2015 ICRA의 <em>\"Visual-lidar odometry and mapping: low-drift, robust, and fast\"</em>(745회)이다. 이 시기를 함께 끌어간 축은 <strong>Sebastian A. Scherer</strong>, <strong>Stephen Nuske</strong>, <strong>Ji Zhang</strong>으로 요약된다. 바로 이 시기에 Singh의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jörn Rehder, Sanjiban Choudhury, Andrew Chambers. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2016 — 2019", "id": "VII", "title": "최근의 지형 — Aerial Maneuvers · Degeneracy Optimization-Based State", "body": "2016년부터 2019년 사이의 5년간, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Aerial Maneuvers</span>, <span class='hl'>Degeneracy Optimization-Based State</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 State Estimation Problems가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"On degeneracy of optimization-based state estimation problems\"</em>이다. ICRA 2016에 실린 이 글은 지금까지 244회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Ji Zhang</strong>, <strong>Michael Kaess</strong>, <strong>Rushat Gupta Chadha</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Path Planning Intersecting에서 Aerial Maneuvers까지 — 10년마다 무대를 바꾼다", "text": "피벗 점수 0.44는 본 조사 상위권에 해당한다. 같은 이름으로 서명이 이어졌을 뿐, 실제로 다루는 문제는 몇 번이나 통째로 갈렸다. 초기에는 Path Planning Intersecting, 지금은 Aerial Maneuvers — 그 사이에 도구, 평가 방법, 함께 일하는 사람까지 이동한다. 재창조의 연쇄가 이 사람의 경력을 지탱하는 엔진이다."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 1.8명에서 후기 3.6명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 13명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 13명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Geoffrey A. Hollinger, Sebastian A. Scherer, Stephen Nuske, Supreeth Achar이 있다. 이 가운데 1명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "도구를 갈아엎어라. 질문은 남겨둬라.", "highlights": [{"year": 2014, "venue": "RSS", "title": "LOAM: Lidar Odometry and Mapping in Real-time", "cites": 3033}, {"year": 2015, "venue": "ICRA", "title": "Visual-lidar odometry and mapping: low-drift, robust, and fast", "cites": 745}, {"year": 2000, "venue": "ICRA", "title": "Recent Progress in Local and Global Traversability for Planetary Rovers", "cites": 246}, {"year": 2016, "venue": "ICRA", "title": "On degeneracy of optimization-based state estimation problems", "cites": 244}, {"year": 2008, "venue": "IJRR", "titl     },
    citesSuffix: "회 인용",
    footData: '데이터: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← 홈으로",
  }
};

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
