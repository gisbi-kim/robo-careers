99 — 2003", "id": "IV", "title": "Era of Robot · Materials science", "body": "Then, from 1999 through 2003, the output surges — <strong>76</strong> papers in just five years. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Materials science</span>, the axis that threads through most of the era's output. The face of the period is <em>\"A new type of fish-like underwater microrobot\"</em> — published in T-Mech 2003, accumulating 381 citations and becoming a standard reference in the sub-field. Close behind: <em>\"An exoskeletal robot for human shoulder joint motion assist\"</em> (T-Mech 2003, 191 cites). The era's working axis reads <strong>Fumihito Arai</strong>, <strong>Yasuhisa Hasegawa</strong>, <strong>Kazuo Kiguchi</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Fukuda — Yasuhisa Hasegawa, Lixin Dong, Masahiro Doi, Imad H. Elhajj, + 8 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 64% of the period's output."}, {"years": "2004 — 2008", "id": "V", "title": "Era of Materials science · Robot", "body": "In the 2004–2008 window, <strong>56</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Materials science</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Fumihito Arai</strong>, <strong>Yasuhisa Hasegawa</strong>, <strong>Takayuki Matsuno</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Fukuda — Tadayoshi Aoyama, Jian Huang, Junji Takahashi, Mohd Ridzuan Ahmad, + 3 more. The transition from solo work to group supervision is visible here."}, {"years": "2009 — 2013", "id": "VI", "title": "Era of Materials science · Robot", "body": "The 2009–2013 years saw the output surges — <strong>65</strong> papers in just five years. The center of gravity rests on <span class='hl'>Materials science</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Sliding-Mode Velocity Control of Mobile-Wheeled Inverted-Pendulum Systems\"</em> — published in T-RO 2010, accumulating 240 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Human-Walking-Intention-Based Motion Control of an Omnidirectional-Type Ca…\"</em> (T-Mech 2011, 188 cites). The era's working axis reads <strong>Masahiro Nakajima</strong>, <strong>Masaru Kojima</strong>, <strong>Kosuke Sekiyama</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Fukuda — Masaru Kojima, Huaping Wang, Masaru Takeuchi, Tao Yue, + 17 more. The transition from solo work to group supervision is visible here."}, {"years": "2014 — 2018", "id": "VII", "title": "Era of Materials science · Robot", "body": "Between 2014 and 2018, <strong>45</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Materials science</span>, <span class='hl'>Robot</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Reinforcement Learning of Manipulation and Grasping Using Dynamical Movement Primitives f…\"</em> — published in T-Mech 2017, accumulating 195 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Qiang Huang</strong>, <strong>Masahiro Nakajima</strong>, <strong>Yasuhisa Hasegawa</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Fukuda — Xiaoming Liu, Chang Li, Eunhye Kim, Yana Guo, + 4 more. The transition from solo work to group supervision is visible here."}, {"years": "2019 — 2023", "id": "VIII", "title": "Mature expansion — Robot _author_count": 7, "last_copub_year": 2007}, {"name": "Imad H. Elhajj", "student_first_year": 2000, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 5, "we_last_author_count": 6, "last_copub_year": 2004}, {"name": "Xiaoming Liu", "student_first_year": 2015, "copubs_in_first_5yr": 6, "total_copubs": 7, "student_first_author_count": 4, "we_last_author_count": 6, "last_copub_year": 2022}], "students_rest": 67}, "archetype": "steady-producer"}, "ko": {"tagline": "Computer science → Materials science", "oneLine": "1984년에 출판을 시작해 42년째 현장에 머물고 있는 연구자. 주제를 옮긴 적이 거의 없다. Robot 하나를 42년 내내 파고들었고, 그 결과 426편, h=46이라는 숫자가 남았다. 공저 패턴으로 추정되는 제자만 79명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1984 — 2025</strong>"], ["논문 수", "426편 · 인용 9,602 · h=46"], ["핵심", "Robot, Materials science"], ["대표작", "A new type of fish-like underwater microrobot"], ["스타일", "steady-producer · specialist"], ["전환", "Robot (꾸준)"]], "phases": [{"years": "1984 — 1988", "id": "I", "title": "출발점 — Robot · Control theory (sociology)", "body": "1984년부터 1988년 사이의 5년간, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Dynamically reconfigurable robotic system\"</em>이다. ICRA 1988에 실린 이 글은 지금까지 240회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Kazuo Tanie</strong>, <strong>Hidemi Hosokai</strong>, <strong>N. Kitamura</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "1989 — 1993", "id": "II", "title": "궤도의 안착 — Control theory (sociology) · Robot", "body": "이어진 1989년대 전반, 1989–1993년의 기간 동안 총 <strong>53편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Cellular robotic system (CEBOT) as one of the realization of self-organizing intelligent…\"</em>이다. ICRA 1990에 실린 이 글은 지금까지 244회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1989 ICRA의 <em>\"Structure decision method for self organising robots based on cell structu…\"</em>(146회)이다. 이 시기를 함께 끌어간 축은 <strong>Fumihito Arai</strong>, <strong>Yoshio Kawauchi</strong>, <strong>Kazuhiro Kosuge</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Fumihito Arai, Tsuyoshi Ueyama, Yasumasa Shoji, Takanori Shibata 외 5명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}, {"years": "1994 — 1998", "id": "III", "title": "Robot · Artificial intelligence의 시기", "body": "그 뒤 1994년부터 1998년까지, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>84편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Mechatronics - \"What Is It, Why, and How?\" An editorial\"</em>이다. T-Mech 1996에 실린 이 글은 지금까지 173회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1995 IROS의 <em>\"Micro manipulation based on micro physics-strategy based on attractive for…\"</em>(147회)이다. 이 시기를 함께 끌어간 축은 <strong>Fumihito Arai</strong>, <strong>Kazuhiro Kosuge</strong>, <strong>Koji Shimojima</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Kazuo Kiguchi, Kosuke Sekiyama, Tomoyuki Kaga, Jun Nakanishi 외 12명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 69%가 이 venue에서 소화되었다."}, {"years": "1999 — 2003", "id": "IV", "title": "Robot · Materials science의 시기", "body": "1999년 무렵부터 2003년에 걸쳐, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>76편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Materials science</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"A new type of fish-like underwater microrobot\"</em>이다. T-Mech 2003에 실린 이 글은 지금까지 381회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2003 T-Mech의 <em>\"An exoskeletal robot for human shoulder joint motion assist\"</em>(191회)이다. 이 시기를 함께 끌어간 축은 <strong>Fumihito Arai</strong>, <strong>Yasuhisa Hasegawa</strong>, <strong>Kazuo Kiguchi</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yasuhisa Hasegawa, Lixin Dong, Masahiro Doi, Imad H. Elhajj 외 8명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 64%가 이 venue에서 소화되었다."}, {"years": "2004 — 2008", "id": "V", "title": "Materials science · Robot의 시기", "body": "2004–2008년으로 이어진 이 시기에, 총 <strong>56편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Materials science</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Fumihito Arai</strong>, <strong>Yasuhisa Hasegawa</strong>, <strong>Takayuki Matsuno</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Tadayoshi Aoyama, Jian Huang, Junji Takahashi, Mohd Ridzuan Ahmad 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2009 — 2013", "id": "VI", "title": "Materials science · Robot의 시기", "body": "2009년을 기점으로 2013년까지의 흐름 속에서, 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>65편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Materials science</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Sliding-Mode Velocity Control of Mobile-Wheeled Inverted-Pendulum Systems\"</em>이다. T-RO 2010에 실린 이 글은 지금까지 240회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2011 T-Mech의 <em>\"Human-Walking-Intention-Based Motion Control of an Omnidirectional-Type Ca…\"</em>(188회)이다. 이 시기를 함께 끌어간 축은 <strong>Masahiro Nakajima</strong>, <strong>Masaru Kojima</strong>, <strong>Kosuke Sekiyama</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Masaru Kojima, Huaping Wang, Masaru Takeuchi, Tao Yue 외 17명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2014 — 2018", "id": "VII", "title": "Materials science · Robot의 시기", "body": "2014년부터 2018년 사이의 5년간, 총 <strong>45편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Materials science</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Reinforcement Learning of Manipulation and Grasping Using Dynamical Movement Primitives f…\"</em>이다. T-Mech 2017에 실린 이 글은 지금까지 195회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Qiang Huang</strong>, <strong>Masahiro Nakajima</strong>, <strong>Yasuhisa Hasegawa</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Xiaoming Liu, Chang Li, Eunhye Kim, Yana Guo 외 4명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2019 — 2023", "id": "VIII", "title": "성숙기의 확장 — Robot · Materials science", "body": "이어진 2019년대 전반, 2019–2023년의 기간 동안 <strong>28편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Materials science</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Qiang Huang</strong>, <strong>Qing Shi</strong>, <strong>Huaping Wang</strong>으로 요약된다. 바로 이 시기에 Fukuda의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jiaxin Liu, Yaozhen Hou, Shihao Zhong, Xie Chen 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2024 — 2025", "id": "IX", "title": "최근의 지형 — Robot · Materials science", "body": "그 뒤 2024년부터 2025년까지, <strong>10편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Materials science</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Qing Shi</strong>, <strong>Qiang Huang</strong>, <strong>Huaping Wang</strong>으로 요약된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "9개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 3.4명에서 후기 7.6명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 79명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {" function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
