 "id": "I", "title": "출발점 — Control theory (sociology) · Controller (irrigation)", "body": "1985년부터 1989년 사이의 5년간, 출판은 6편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>George Anwar</strong>, <strong>Ming-Chang Tsai</strong>, <strong>Tomasz Stepien</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 83%가 이 venue에서 소화되었다."}, {"years": "1990 — 1994", "id": "II", "title": "궤도의 안착 — Controller (irrigation) · Control theory (sociology)", "body": "이어진 1990년대 전반, 1990–1994년의 기간 동안 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Controller (irrigation)</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Plug in repetitive control for industrial robotic manipulators\"</em>이다. ICRA 1990에 실린 이 글은 지금까지 130회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Bin Yao</strong>, <strong>C. Cosner</strong>, <strong>George Anwar</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Bin Yao. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "1995 — 1999", "id": "III", "title": "Control theory (sociology) · Controller (irrigation)의 시기", "body": "그 뒤 1995년부터 1999년까지, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"High-performance robust motion control of machine tools: an adaptive robust control appro…\"</em>이다. T-Mech 1997에 실린 이 글은 지금까지 293회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1996 T-Mech의 <em>\"Mechatronics - \"What Is It, Why, and How?\" An editorial\"</em>(173회)이다. 이 시기를 함께 끌어간 축은 <strong>Bin Yao</strong>, <strong>Naoki Imasaki</strong>, <strong>Prabhakar R. Regilla</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yi Li. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>T-Mech</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2000 — 2004", "id": "IV", "title": "Control theory (sociology) · Controller (irrigation)의 시기", "body": "2000년 무렵부터 2004년에 걸쳐, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Improved track following in magnetic disk drives using a disturbance observer\"</em>이다. T-Mech 2000에 실린 이 글은 지금까지 187회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Enrique J. Bernabeu</strong>, <strong>Josep Tornero</strong>, <strong>Addisu Tesfaye</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Enrique J. Bernabeu. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>T-Mech</span>에 쏠려 있었다 — 이 시기 출판의 71%가 이 venue에서 소화되었다."}, {"years": "2005 — 2009", "id": "V", "title": "Control theory (sociology) · Controller (irrigation)의 시기", "body": "2005–2009년으로 이어진 이 시기에, <strong>18편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Control of Rotary Series Elastic Actuator for Ideal Force-Mode Actuation in Human–Robot I…\"</em>이다. T-Mech 2009에 실린 이 글은 지금까지 428회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2009 T-Mech의 <em>\"A Gait Monitoring System Based on Air Pressure Sensors Embedded in a Shoe\"</em>(295회)이다. 이 시기를 함께 끌어간 축은 <strong>Kyoungchul Kong</strong>, <strong>Shashikanth Suryanarayanan</strong>, <strong>Jihua Huang</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Kyoungchul Kong, Joonbum Bae, Cong Wang, Jihua Huang 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>T-Mech</span>에 쏠려 있었다 — 이 시기 출판의 78%가 이 venue에서 소화되었다."}, {"years": "2010 — 2014", "id": "VI", "title": "Control theory (sociology) · Robot의 시기", "body": "2010년을 기점으로 2014년까지의 흐름 속에서, <strong>21편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"A Compact Rotary Series Elastic Actuator for Human Assistive Systems\"</em>이다. T-Mech 2011에 실린 이 글은 지금까지 322회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Kyoungchul Kong</strong>, <strong>Joonbum Bae</strong>, <strong>Cong Wang</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Wenjie Chen, Kevin Haninger, Wonhee Kim, Wenlong Zhang 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2015 — 2019", "id": "VII", "title": "Artificial intelligence · Robot의 시기", "body": "2015년부터 2019년 사이의 5년간, <strong>28편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Conditional Generative Neural System for Probabilistic Trajectory Prediction\"</em>이다. IROS 2019에 실린 이 글은 지금까지 183회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Yongxiang Fan</strong>, <strong>Te Tang</strong>, <strong>Hsien-Chung Lin</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Liting Sun, Yongxiang Fan, Wei Zhan, Xinghao Zhu 외 17명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 64%가 이 venue에서 소화되었다."}, {"years": "2020 — 2024", "id": "VIII", "title": "성숙기의 확장 — Artificial intelligence · Trajectory", "body": "이어진 2020년대 전반, 2020–2024년의 기간 동안 출판량이 눈에 띄게 불어난다 — 이 시기에 나온 논문이 무려 <strong>89편</strong>에 이른다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Trajectory</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"UrbanLoco: A Full Sensor Suite Dataset for Mapping and Localization in Urban Scenes\"</em>이다. ICRA 2020에 실린 이 글은 지금까지 155회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Wei Zhan</strong>, <strong>Liting Sun</strong>, <strong>Xinghao Zhu</strong>으로 요약된다. 바로 이 시기에 Tomizuka의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Lingfeng Sun, Zheng Wu, Boyuan Liang, Chenran Li 외 20명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2025 — 2025", "id": "IX", "title": "최근의 지형 — Artificial intelligence · Robot", "body": "그 뒤 2025년부터 2025년까지, <strong>15편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Wei Zhan</strong>, <strong>Mingyu Ding</strong>, <strong>Boyuan Liang</strong>으로 요약된다."}], "themes": [{"num": "01", "title": "Control theory (sociology)라는 축은 한 번도 흔들리지 않았다", "text": "9개 5년 구간 중 대부분에서 Control theory (sociology)가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.7명에서 후기 7.3명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 61명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 61명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Liting Sun, Kyoungchul Kong, Yongxiang Fan, Wei Zhan이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 61명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2009, "venue": "T-Mech", "title": "Control of Rotary Series Elastic Actuator for Ideal Force-Mode Actuation in Human–Robot Interaction Applications", "cites": 428}, {"year": 2011, "venue": "T-Mech", "title": "A Compact Rotary Series Elastic Actuator for Human Assistive Systems", "cites": 322}, {"year": 2009, "venue": "T-Mech", "title": "A Gait Monitoring System Based on Air Pressure Sensors Embedded in a Shoe", "cites": 295}, {"year": 1997, "venue": "T-Mech", "title": "High-performance robust motion c function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
