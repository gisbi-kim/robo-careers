<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;

body {

}
.grain {

}
.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 24px; flex-wrap: wrap;

}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;

}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;

  letter-spacing: -0.03em;

}
.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }

.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;

}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding-bottom: 8px;

}
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {

}
.phase-body em {
  font-style: italic;
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px; background: var(--ink); border: 1px solid var(--ink);
}
.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;
  line-height: 1.4; margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(1.2rem, 2.2vw, 1.6rem);
  line-height: 1.5; max-width: 52ch;
  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;
}
.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  margin-right: 8px; padding: 2px 6px;
  background: var(--paper-2);
  border: 1px solid rgba(26, 22, 20, 0.2);

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

/* lineage */
.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }
  .phase { grid-template-columns: 1fr; gap: 8px; }
  .phase-meta { display: flex; align-items: baseline; gap: 12px; }
  .lineage-grid { grid-template-columns: 1fr; gap: 24px; }
}

.foot {
  margin-top: 80px; padding-top: 24px;

  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted);
}
.foot a { color: var(--muted); }

haumette — Nicolas Mansard, Andrew I. Comport, Omar Tahri, Anthony Remazeilles, + 4 more. The transition from solo work to group supervision is visible here."}, {"years": "2006 — 2010", "id": "IV", "title": "Era of Visual Servoing · Spherical Projection", "body": "Then, from 2006 through 2010, <strong>42</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Visual Servoing</span>, <span class='hl'>Spherical Projection</span>, the axis that threads through most of the era's output. Image-Based Visual emerges as a secondary strand. The face of the period is <em>\"Predictive Control for Constrained Image-Based Visual Servoing\"</em> — published in T-RO 2010, accumulating 220 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Task Sequencing for High-Level Sensor-Based Control\"</em> (T-RO 2007, 198 cites). The era's working axis reads <strong>Christophe Collewet</strong>, <strong>Romeo Tatsambon Fomena</strong>, <strong>Anthony Remazeilles</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Chaumette — Romeo Tatsambon Fomena, Olivier Kermorgant, Andrea Cherubini, Mohammed Marey, + 2 more. The transition from solo work to group supervision is visible here."}, {"years": "2011 — 2015", "id": "V", "title": "Era of Visual Servoing · Active Structure Motion", "body": "In the 2011–2015 window, <strong>28</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Visual Servoing</span>, <span class='hl'>Active Structure Motion</span>, the axis that threads through most of the era's output. Visual Navigation emerges as a secondary strand. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Paolo Robuffo Giordano</strong>, <strong>Riccardo Spica</strong>, <strong>Olivier Kermorgant</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Chaumette — Riccardo Spica, Aly Magassouba, Don Joven Agravante, Nicolas Cazy, + 2 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 61% of the period's output."}, {"years": "2016 — 2020", "id": "VI", "title": "Mature expansion — Visual Servoing · Appearance-Based Indoor Navigation", "body": "The 2016–2020 years saw <strong>24</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Visual Servoing</span>, <span class='hl'>Appearance-Based Indoor Navigation</span>, the axis that threads through most of the era's output. Level Difference emerges as a secondary strand. The face of the period is <em>\"Training Deep Neural Networks for Visual Servoing\"</em> — published in ICRA 2018, accumulating 156 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Vision-Based Reactive Planning for Aggressive Target Tracking While Avoidi…\"</em> (RA-L 2018, 111 cites). The era's working axis reads <strong>Paolo Robuffo Giordano</strong>, <strong>Aly Magassouba</strong>, <strong>Nancy Bertin</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Chaumette — Bryan Penin, Alexander Antonio Oliva, Suman Raj Bista, Zane Zake. The transition from solo work to group supervision is visible here."}, {"years": "2021 — 2025", "id": "VII", "title": "Latest terrain — Proximity-Based Control · Visual Servoing", "body": "Between 2021 and 2025, <strong>20</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Proximity-Based Control</span>, <span class='hl'>Visual Servoing</span>, the axis that threads through most of the era's output. Plane-To-Plane Positioning Proximity-Based emerges as a secondary strand. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Éric Marchand</strong>, <strong>John Thomas</strong>, <strong>Alexandre Krupa</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Chaumette — John Thomas, Lev Smolentsev, Thibault Noël, Maxime Robic, + 1 more. The transition from solo work to group supervision is visible here."}], "themes": [{"num": "01", "title": "The Visual Servoing anchor never moved", "text": "Visual Servoing appears among the top topics in most of the 7 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "What time accumulates, one paper at a time", "text": "170 papers, h=40, across 35 years. The headline blockbusters matter, but the real engine under the h-index is the sustained mid-tier output — a long compounding curve rather than a single hit."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 36 likely students by coauthor pattern. Names on that list include Riccardo Spica, Youcef Mezouar, Nicolas Mansard, Romeo Tatsambon Fomena. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "36 students — that's the real body of work.", "highlights": [{"year": 2004, "venue": "T-RO", "title": "Image moments: a general and useful set of features for visual servoing", "cites": 462}, {"year": 2005, "venue": "T-RO", "title": "Point-based and region-based image moments for visual servoing of planar objects", "cites": 333}, {"year": 2010, "venue": "T-RO", "title": "Predictive Control for Constrained Image-Based Visual Servoing", "cites": 220}, {"year": 2007, "venue": "T-RO", "title": "Task Seq "student_first_year": 2007, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 6, "we_last_author_count": 5, "last_copub_year": 2011}, {"name": "Olivier Kermorgant", "student_first_year": 2010, "copubs_in_first_5yr": 5, "total_copubs": 6, "student_first_author_count": 5, "we_last_author_count": 5, "last_copub_year": 2024}, {"name": "Aly Magassouba", "student_first_year": 2015, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 5, "we_last_author_count": 5, "last_copub_year": 2018}, {"name": "Andrew I. Comport", "student_first_year": 2003, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 4, "we_last_author_count": 5, "last_copub_year": 2006}, {"name": "Omar Tahri", "student_first_year": 2003, "copubs_in_first_5yr": 6, "total_copubs": 14, "student_first_author_count": 5, "we_last_author_count": 4, "last_copub_year": 2018}, {"name": "Andrea Cherubini", "student_first_year": 2007, "copubs_in_first_5yr": 6, "total_copubs": 8, "student_first_author_count": 5, "we_last_author_count": 4, "last_copub_year": 2013}, {"name": "Armel Crétual", "student_first_year": 1997, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 5, "we_last_author_count": 4, "last_copub_year": 2001}, {"name": "Mohammed Marey", "student_first_year": 2008, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 4, "we_last_author_count": 4, "last_copub_year": 2010}, {"name": "John Thomas", "student_first_year": 2022, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 4, "we_last_author_count": 4, "last_copub_year": 2025}], "students_rest": 24}, "archetype": "mid-career-peak"}, "ko": {"tagline": "Visual Servoing → Proximity-Based Control", "oneLine": "1991년에 출판을 시작해 35년째 현장에 머물고 있는 연구자. 주제를 크게 옮긴 적이 없다. <em>Visual Servoing</em>라는 축 하나를 35년 내내 파고든 결과가 170편, h=40이라는 숫자다. 공저 패턴으로 추정되는 제자만 36명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1991 — 2025</strong>"], ["논문 수", "170편 · 인용 5,848 · h=40"], ["핵심", "Visual Servoing, Image Moments"], ["대표작", "Image moments: a general and useful set of feat…"], ["스타일", "mid-career-peak · specialist"], ["전환", "Visual Servoing → Proximity-Based Control"]], "phases": [{"years": "1991 — 1995", "id": "I", "title": "출발점 — Visual Servoing · Positioning Respect Object", "body": "1991년부터 1995년 사이의 5년간, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Positioning Respect Object</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Object Tracking Estimating가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Positioning of a robot with respect to an object, tracking it and estimating its velocity…\"</em>이다. ICRA 1991에 실린 이 글은 지금까지 181회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Patrick Rives</strong>, <strong>Bernard Espiau</strong>, <strong>James L. Crowley</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 75%가 이 venue에서 소화되었다."}, {"years": "1996 — 2000", "id": "II", "title": "궤도의 안착 — Visual Servoing · Image Motion", "body": "이어진 1996년대 전반, 1996–2000년의 기간 동안 <strong>16편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Image Motion</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 2D Visual가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Eye-in-Hand/Eye-to-Hand Cooperation for Visual Servoing\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 173회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2000 ICRA의 <em>\"2 1/2 D Visual Servoing: A Possible Solution to Improve Image-Based and Po…\"</em>(115회)이다. 이 시기를 함께 끌어간 축은 <strong>Éric Marchand</strong>, <strong>Ezio Malis</strong>, <strong>Armel Crétual</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Youcef Mezouar, Armel Crétual, Christophe Collewet, Robert E. Mahony 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2001 — 2005", "id": "III", "title": "Visual Servoing · Image Moments의 시기", "body": "그 뒤 2001년부터 2005년까지, 총 <strong>36편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Image Moments</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Image Space가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Image moments: a general and useful set of features for visual servoing\"</em>이다. T-RO 2004에 실린 이 글은 지금까지 462회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2005 T-RO의 <em>\"Point-based and region-based image moments for visual servoing of planar o…\"</em>(333회)이다. 이 시기를 함께 끌어간 축은 <strong>Éric Marchand</strong>, <strong>Youcef Mezouar</strong>, <strong>Christophe Collewet</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Nicolas Mansard, Andrew I. Comport, Omar Tahri, Anthony Remazeilles 외 4명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2006 — 2010", "id": "IV", "title": "Visual Servoing · Spherical Projection의 시기", "body": "2006년 무렵부터 2010년에 걸쳐, 총 <strong>42편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Spherical Projection</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Image-Based Visual가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Predictive Control for Constrained Image-Based Visual Servoing\"</em>이다. T-RO 2010에 실린 이 글은 지금까지 220회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2007 T-RO의 <em>\"Task Sequencing for High-Level Sensor-Based Control\"</em>(198회)이다. 이 시기를 함께 끌어간 축은 <strong>Christophe Collewet</strong>, <strong>Romeo Tatsambon Fomena</strong>, <strong>Anthony Remazeilles</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Romeo Tatsambon Fomena, Olivier Kermorgant, Andrea Cherubini, Mohammed Marey 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2011 — 2015", "id": "V", "title": "Visual Servoing · Active Structure Motion의 시기", "body": "2011–2015년으로 이어진 이 시기에, <strong>28편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Active Structure Motion</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Visual Navigation가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Paolo Robuffo Giordano</strong>, <strong>Riccardo Spica</strong>, <strong>Olivier Kermorgant</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Riccardo Spica, Aly Magassouba, Don Joven Agravante, Nicolas Cazy 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 61%가 이 venue에서 소화되었다."}, {"years": "2016 — 2020", "id": "VI", "title": "성숙기의 확장 — Visual Servoing · Appearance-Based Indoor Navigation", "body": "2016년을 기점으로 2020년까지의 흐름 속에서, <strong>24편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Visual Servoing</span>, <span class='hl'>Appearance-Based Indoor Navigation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Level Difference가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Training Deep Neural Networks for Visual Servoing\"</em>이다. ICRA 2018에 실린 이 글은 지금까지 156회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2018 RA-L의 <em>\"Vision-Based Reactive Planning for Aggressive Target Tracking While Avoidi…\"</em>(111회)이다. 이 시기를 함께 끌어간 축은 <strong>Paolo Robuffo Giordano</strong>, <strong>Aly Magassouba</strong>, <strong>Nancy Bertin</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Bryan Penin, Alexander Antonio Oliva, Suman Raj Bista, Zane Zake. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2021 — 2025", "id": "VII", "title": "최근의 지형 — Proximity-Based Control · Visual Servoing", "body": "2021년부터 2025년 사이의 5년간, <strong>20편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Proximity-Based Control</span>, <span class='hl'>Visual Servoing</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Plane-To-Plane Positioning Proximity-Based가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Éric Marchand</strong>, <strong>John Thomas</strong>, <strong>Alexandre Krupa</strong>으로 요약된다. 바로 이 시기에 Chaumette의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — John Thomas, Lev Smolentsev, Thibault Noël, Maxime Robic 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Visual Servoing라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Visual Servoing가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "35년 동안 총 170편, h=40. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 36명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Riccardo Spica, Youcef Mezouar, Nicolas Mansard, Romeo Tatsambon Fomena이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 36명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2004, "venue": "T-RO", "title": "Image moments: a general and useful set of features for visual servoing", "cites": 462}, {"year": 2005, "venue": "T-RO", "title": "Point-based and region-based image moments for visual servoing of planar objects", "cites": 333}, {"year": 2010, "venue": "T-RO", "title": "Predictive Control for Constrained Image-Based Visual Servoing", "cites": 220}, {"year": 2007, "venue": "T-RO", "title": "Task Sequencing for High-Level Sensor-Based Control", "cites": 198}, {"year": 2009, "venue": "T-RO", "title": "Image-Based Visual Servo Control of the Translation Kinematics of a Quadrotor Aerial Vehicle", "cites": 190}, {"year": 1991, "venue": "ICRA", "title": "Positioning of a robot with respect to an object, tracking it and estimating its velocity by visual servoing", "cites": 181}, {"year": 2000, "venue": "ICRA", "title": "Eye-in-Hand/Eye-to-Hand Cooperation for Visual Servoing", "cites": 173}, {"year": 2018, "venue": "ICRA", "title": "Training Deep Neural Networks for Visual Servoing", "cites": 156}], "lineage": {"advisors": [], "students": [{"name": function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
