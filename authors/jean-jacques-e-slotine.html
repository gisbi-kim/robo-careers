lti-robot deployme…\"</em> — published in IJRR 2011, accumulating 134 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Mac Schwager</strong>, <strong>Daniela Rus</strong>. The publishing venue skews heavily — <span class='hl'>IJRR</span> absorbed 100% of the period's output."}, {"years": "2015 — 2019", "id": "VII", "title": "Era of Marine engineering · Aerospace engineering", "body": "Between 2015 and 2019, the window is a quieter one — 9 papers in total. The center of gravity rests on <span class='hl'>Marine engineering</span>, <span class='hl'>Aerospace engineering</span>, the axis that threads through most of the era's output. The face of the period is <em>\"Robust online motion planning via contraction theory and convex optimization\"</em> — published in ICRA 2017, accumulating 182 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Gabriel D. Bousquet</strong>, <strong>Michael S. Triantafyllou</strong>, <strong>Patrick M. Wensing</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Slotine — Gabriel D. Bousquet, Lukas Huber, Brett T. Lopez. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 56% of the period's output."}, {"years": "2020 — 2024", "id": "VIII", "title": "Mature expansion — Control theory (sociology) · Controller (irrigation)", "body": "Across the 2020–2024 stretch, <strong>11</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Marco Pavone</strong>, <strong>Spencer M. Richards</strong>, <strong>Sumeet Singh</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Slotine — Spencer M. Richards. The transition from solo work to group supervision is visible here."}, {"years": "2025 — 2025", "id": "IX", "title": "Latest terrain — Obstacle · Control (management)", "body": "Over the five years from 2025 to 2025, the window is a quieter one — 1 papers in total. The center of gravity rests on <span class='hl'>Obstacle</span>, <span class='hl'>Control (management)</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Lukas Huber</strong>, <strong>Trinca Thibaud</strong>, <strong>Aude Billard</strong>. The publishing venue skews heavily — <span class='hl'>RA-L</span> absorbed 100% of the period's output."}], "themes": [{"num": "01", "title": "From Control theory (sociology) to Obstacle — the stage changes each decade", "text": "A pivot score of 0.51 places them at the high end of our sample. The name above the papers stayed constant, but the underlying problem was rewritten several times. Early: Control theory (sociology). Now: Obstacle. Tools, benchmarks, and working partners all shifted with each turn. Reinvention is the engine that powered this career."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 2.1 early to 3.3 late — the canonical PI-scaling arc. 10 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 10 likely students by coauthor pattern. Names on that list include Chao Liu, Yu Zhao, Mac Schwager, Keehong Seo. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "Reinvent the tool. Keep the question.", "highlights": [{"year": 2009, "venue": "T-RO", "title": "Cooperative Robot Control and Concurrent Synchronization of Lagrangian Systems", "cites": 549}, {"year": 2004, "venue": "IJRR", "title": "Telemanipulation with Time Delays", "cites": 534}, {"year": 2009, "venue": "IJRR", "title": "Decentralized, Adaptive Coverage Control for Networked Robots", "cites": 452}, {"year": 1998, "venue": "ICRA", "title": "Towards Force-Reflecting Teleoperation Over the Internet", "cites": 354}, {"year": 2006, "venue": "IJRR", "title": "Adaptive Tracking Control for Robots with Unknown Kinematic and Dynamic Properties", "cites": 313}, {"year": 1987, "venue": "ICRA", "title": "Adaptive manipulator control a case study", "cites": 201}, {"year": 2017, "venue": "ICRA", "title": "Robust online motion planning via contraction theory and convex optimization", "cites": 182}, {"year": 1987, "venue": "ICRA", "title": "Adaptive strategies in constrained manipulation", "cites": 156}], "lineage": {"advisors": [], "students": [{"name": "Chao Liu", "student_first_year": 2004, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 2, "we_last_author_count": 6, "last_copub_year": 2007}, {"name": "Yu Zhao", "student_first_year": 2004, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2007}, {"name": "Mac Schwager", "student_first_year": 2006, "copubs_in_first_5yr": 4, "total_copubs": 5, "student_first_author_count": 4, "we_last_author_count": 2, "last_copub_year": 2021}, {"name": "Keehong Seo", "student_first_year": 2007, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2008}, {"name": "Gabriel D. Bousquet", "student_first_year": 2017, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2018}, {"name": "Saing Paul Hou", "student_first_year": 2008, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author rst_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2009}, {"name": "Lukas Huber", "student_first_year": 2019, "copubs_in_first_5yr": 4, "total_copubs": 5, "student_first_author_count": 4, "we_last_author_count": 1, "last_copub_year": 2025}, {"name": "Brett T. Lopez", "student_first_year": 2017, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 1, "last_copub_year": 2021}, {"name": "Spencer M. Richards", "student_first_year": 2021, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 0, "last_copub_year": 2023}], "students_rest": 0}, "archetype": "mid-career-peak-3"}, "ko": {"tagline": "Control theory (sociology) → Robot → Obstacle", "oneLine": "1985년에 출판을 시작해 41년째 현장에 머물고 있는 연구자. 그의 궤적은 Control theory (sociology)에서 Obstacle에 이르는 긴 재창조의 연쇄였다 — 같은 이름으로 서명했지만 실제로 다뤘던 질문은 10년에 한 번씩 크게 갈아엎혔다. 대표작은 2009년 T-RO에 실린 \"Cooperative Robot Control and Concurrent Synchronization of Lagrangia…\" (549회 인용). 이 시기 10명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1985 — 2025</strong>"], ["논문 수", "58편 · 인용 4,714 · h=29"], ["핵심", "Control theory (sociology)"], ["대표작", "Cooperative Robot Control and Concurrent Synchr…"], ["스타일", "mid-career-peak-3 · pivoter"], ["전환", "Control theory (sociology) → Obstacle"]], "phases": [{"years": "1985 — 1989", "id": "I", "title": "출발점 — Control theory (sociology) · Adaptive control", "body": "1985년부터 1989년 사이의 5년간, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Adaptive control</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Adaptive manipulator control a case study\"</em>이다. ICRA 1987에 실린 이 글은 지금까지 201회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1987 ICRA의 <em>\"Adaptive strategies in constrained manipulation\"</em>(156회)이다. 이 시기를 함께 끌어간 축은 <strong>Weiping Li</strong>, <strong>Hideki Hashimoto</strong>, <strong>J. X. Xu</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1990 — 1994", "id": "II", "title": "궤도의 안착 — Control theory (sociology) · Underwater", "body": "이어진 1990년대 전반, 1990–1994년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Underwater</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Dana R. Yoerger</strong>, <strong>Günter Niemeyer</strong>, <strong>Hyun S. Yang</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IJRR</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "1995 — 1999", "id": "III", "title": "Telerobotics · Stability (learning theory)의 시기", "body": "그 뒤 1995년부터 1999년까지, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Telerobotics</span>, <span class='hl'>Stability (learning theory)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Towards Force-Reflecting Teleoperation Over the Internet\"</em>이다. ICRA 1998에 실린 이 글은 지금까지 354회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1997 ICRA의 <em>\"Using wave variables for system analysis and robot control\"</em>(148회)이다. 이 시기를 함께 끌어간 축은 <strong>Günter Niemeyer</strong>, <strong>Hans Jacob S. Feder</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2000 — 2004", "id": "IV", "title": "Kinematics · Control theory (sociology)의 시기", "body": "2000년 무렵부터 2004년에 걸쳐, 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Kinematics</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Trajectory가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Telemanipulation with Time Delays\"</em>이다. IJRR 2004에 실린 이 글은 지금까지 534회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Chien-Chern Cheah</strong>, <strong>Chao Liu</strong>, <strong>Günter Niemeyer</strong>으로 요약된다. 바로 이 시기에 Slotine의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Chao Liu, Yu Zhao. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2005 — 2009", "id": "V", "title": "Robot · Control theory (sociology)의 시기", "body": "2005–2009년으로 이어진 이 시기에, <strong>17편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Control theory (sociology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Kinematics가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Cooperative Robot Control and Concurrent Synchronization of Lagrangian Systems\"</em>이다. T-RO 2009에 실린 이 글은 지금까지 549회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2009 IJRR의 <em>\"Decentralized, Adaptive Coverage Control for Networked Robots\"</em>(452회)이다. 이 시기를 함께 끌어간 축은 <strong>Chien-Chern Cheah</strong>, <strong>Chao Liu</strong>, <strong>Yu Zhao</strong>으로 요약된다. 바로 이 시기에 Slotine의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Mac Schwager, Keehong Seo, Saing Paul Hou, Soon-Jo Chung. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 65%가 이 venue에서 소화되었다."}, {"years": "2010 — 2014", "id": "VI", "title": "Software deployment · Robot의 시기", "body": "2010년을 기점으로 2014년까지의 흐름 속에서, 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Software deployment</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Probabilistic logic가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Unifying geometric, probabilistic, and potential field approaches to multi-robot deployme…\"</em>이다. IJRR 2011에 실린 이 글은 지금까지 134회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Mac Schwager</strong>, <strong>Daniela Rus</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IJRR</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2015 — 2019", "id": "VII", "title": "Marine engineering · Aerospace engineering의 시기", "body": "2015년부터 2019년 사이의 5년간, 출판은 9편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Marine engineering</span>, <span class='hl'>Aerospace engineering</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Robust online motion planning via contraction theory and convex optimization\"</em>이다. ICRA 2017에 실린 이 글은 지금까지 182회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Gabriel D. Bousquet</strong>, <strong>Michael S. Triantafyllou</strong>, <strong>Patrick M. Wensing</strong>으로 요약된다. 바로 이 시기에 Slotine의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Gabriel D. Bousquet, Lukas Huber, Brett T. Lopez. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 56%가 이 venue에서 소화되었다."}, {"years": "2020 — 2024", "id": "VIII", "title": "성숙기의 확장 — Control theory (sociology) · Controller (irrigation)", "body": "이어진 2020년대 전반, 2020–2024년의 기간 동안 <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Controller (irrigation)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Marco Pavone</strong>, <strong>Spencer M. Richards</strong>, <strong>Sumeet Singh</strong>으로 요약된다. 바로 이 시기에 Slotine의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Spencer M. Richards. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2025 — 2025", "id": "IX", "title": "최근의 지형 — Obstacle · Control (management)", "body": "그 뒤 2025년부터 2025년까지, 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Obstacle</span>, <span class='hl'>Control (management)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Lukas Huber</strong>, <strong>Trinca Thibaud</strong>, <strong>Aude Billard</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>RA-L</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Control theory (sociology)에서 Obstacle까지 — 10년마다 무대를 바꾼다", "text": "피벗 점수 0.51는 본 조사 상위권에 해당한다. 같은 이름으로 서명이 이어졌을 뿐, 실제로 다루는 문제는 몇 번이나 통째로 갈렸다. 초기에는 Control theory (sociology), 지금은 Obstacle — 그 사이에 도구, 평가 방법, 함께 일하는 사람까지 이동한다. 재창조의 연쇄가 이 사람의 경력을 지탱하는 엔진이다."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.1명에서 후기 3.3명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 10명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {     rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · 합성점수 순위 #${natural}` : '';
      const forcePart = force ? ` · ★ 큐레이션 포함 (합성점수 기준 컷 아래지만 분야 대표성 확보 위해 포함)` : '';
      return `#${rank}${natPart} · 합성점수 ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "회 인용",
    footData: '데이터: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← 홈으로",
  }
};

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
