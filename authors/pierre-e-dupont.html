r Dupont — Karl Price, Giovanni Pittiglio. The transition from solo work to group supervision is visible here."}, {"years": "2020 — 2024", "id": "VII", "title": "Mature expansion — Robot · Robotics", "body": "Between 2020 and 2024, the window is a quieter one — 8 papers in total. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Robotics</span>, the axis that threads through most of the era's output. Artificial intelligence emerges as a secondary strand. The face of the period is <em>\"A decade retrospective of medical robotics research from 2010 to 2020\"</em> — published in Sci-Rob 2021, accumulating 465 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Margherita Mencattelli</strong>, <strong>Joseph Peine</strong>, <strong>Giovanni Pittiglio</strong>."}, {"years": "2025 — 2025", "id": "VIII", "title": "Latest terrain — Robot · Autonomy", "body": "Across the 2025–2025 stretch, the window is a quieter one — 3 papers in total. The center of gravity rests on <span class='hl'>Robot</span>, <span class='hl'>Autonomy</span>, the axis that threads through most of the era's output. The era's working axis reads <strong>Yuan Wang</strong>, <strong>Alperen Degirmenci</strong>. The publishing venue skews heavily — <span class='hl'>Sci-Rob</span> absorbed 67% of the period's output."}], "themes": [{"num": "01", "title": "From Control theory (sociology) to Computer science — the stage changes each decade", "text": "A pivot score of 0.56 places them at the high end of our sample. The name above the papers stayed constant, but the underlying problem was rewritten several times. Early: Control theory (sociology). Now: Computer science. Tools, benchmarks, and working partners all shifted with each turn. Reinvention is the engine that powered this career."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 1.8 early to 5.7 late — the canonical PI-scaling arc. 13 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 13 likely students by coauthor pattern. Names on that list include Junhyoung Ha, Andrew H. C. Gosline, Jesse Lock, Christos Bergeles. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "Reinvent the tool. Keep the question.", "highlights": [{"year": 2018, "venue": "Sci-Rob", "title": "The grand challenges of Science Robotics", "cites": 1122}, {"year": 2010, "venue": "T-RO", "title": "Design and Control of Concentric-Tube Robots", "cites": 729}, {"year": 2017, "venue": "Sci-Rob", "title": "Medical robotics - Regulatory, ethical, and legal considerations for increasing levels of autonomy", "cites": 662}, {"year": 2021, "venue": "Sci-Rob", "title": "A decade retrospective of medical robotics research from 2010 to 2020", "cites": 465}, {"year": 2006, "venue": "IROS", "title": "A Steerable Needle Technology Using Curved Concentric Tubes", "cites": 266}, {"year": 2011, "venue": "T-RO", "title": "Stiffness Control of Surgical Continuum Manipulators", "cites": 255}, {"year": 2015, "venue": "T-RO", "title": "Concentric Tube Robot Design and Optimization Based on Task and Anatomical Constraints", "cites": 170}, {"year": 2019, "venue": "Sci-Rob", "title": "Autonomous robotic intracardiac catheter navigation using haptic vision", "cites": 156}], "lineage": {"advisors": [], "students": [{"name": "Junhyoung Ha", "student_first_year": 2014, "copubs_in_first_5yr": 8, "total_copubs": 9, "student_first_author_count": 5, "we_last_author_count": 7, "last_copub_year": 2021}, {"name": "Andrew H. C. Gosline", "student_first_year": 2009, "copubs_in_first_5yr": 5, "total_copubs , "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 1, "last_copub_year": 2012}], "students_shown": [{"name": "Junhyoung Ha", "student_first_year": 2014, "copubs_in_first_5yr": 8, "total_copubs": 9, "student_first_author_count": 5, "we_last_author_count": 7, "last_copub_year": 2021}, {"name": "Andrew H. C. Gosline", "student_first_year": 2009, "copubs_in_first_5yr": 5, "total_copubs": 7, "student_first_author_count": 2, "we_last_author_count": 4, "last_copub_year": 2015}, {"name": "Jesse Lock", "student_first_year": 2009, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2012}, {"name": "Christos Bergeles", "student_first_year": 2009, "copubs_in_first_5yr": 3, "total_copubs": 6, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2016}, {"name": "Karl Price", "student_first_year": 2018, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2023}, {"name": "Evan J. Butler", "student_first_year": 2009, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2012}, {"name": "Giovanni Pittiglio", "student_first_year": 2018, "copubs_in_first_5yr": 2, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2024}, {"name": "Patrick Sears", "student_first_year": 2006, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2007}, {"name": "Alina Eqtami", "student_first_year": 2014, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2015}, {"name": "Veaceslav Arabagi", "student_first_year": 2008, "copubs_in_first_5yr": 2, "total_copubs": 3, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2015}, {"name": "Thomas Debus", "student_first_year": 1999, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 5, "we_last_author_count": 1, "last_copub_year": 2004}, {"name": "Jeffrey A. Stoll", "student_first_year": 2006, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 1, "last_copub_year": 2007}], "students_rest": 1}, "archetype": "mid-career-peak-2"}, "ko": {"tagline": "Control theory (sociology) → Robot → Computer science", "oneLine": "1990년에 출판을 시작해 36년째 현장에 머물고 있는 연구자. 그의 궤적은 Control theory (sociology)에서 Computer science에 이르는 긴 재창조의 연쇄였다 — 같은 이름으로 서명했지만 실제로 다뤘던 질문은 10년에 한 번씩 크게 갈아엎혔다. 대표작은 2018년 Sci-Rob에 실린 \"The grand challenges of Science Robotics\" (1,122회 인용). 이 시기 13명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1990 — 2025</strong>"], ["논문 수", "75편 · 인용 6,282 · h=33"], ["핵심", "Robot"], ["대표작", "The grand challenges of Science Robotics"], ["스타일", "mid-career-peak-2 · pivoter"], ["전환", "Control theory (sociology) → Robot"]], "phases": [{"years": "1990 — 1994", "id": "I", "title": "출발점 — Control theory (sociology) · Dynamics (music)", "body": "1990년부터 1994년 사이의 5년간, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Control theory (sociology)</span>, <span class='hl'>Dynamics (music)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Dynamic equation가 보조 줄기로 올라온다. 이 시기를 실질적으로 함께 끌고 간 파트너는 <strong>Serge P. Yamajako</strong>이다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "1995 — 1999", "id": "II", "title": "궤도의 안착 — Identification (biology) · Rigid body", "body": "이어진 1995년대 전반, 1995–1999년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Identification (biology)</span>, <span class='hl'>Rigid body</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Robert D. Howe</strong>, <strong>Serge P. Yamajako</strong>, <strong>Timothy M. Schulteis</strong>으로 요약된다. 바로 이 시기에 Dupont의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Thomas Debus. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2000 — 2004", "id": "III", "title": "Teleoperation · Kinematics의 시기", "body": "그 뒤 2000년부터 2004년까지, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Teleoperation</span>, <span class='hl'>Kinematics</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Thomas Debus</strong>, <strong>Robert D. Howe</strong>, <strong>Tae-Jeong Jang</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "2005 — 2009", "id": "IV", "title": "Concentric · Kinematics의 시기", "body": "2005년 무렵부터 2009년에 걸쳐, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Concentric</span>, <span class='hl'>Kinematics</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Materials science가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A Steerable Needle Technology Using Curved Concentric Tubes\"</em>이다. IROS 2006에 실린 이 글은 지금까지 266회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2005 ICRA의 <em>\"Trajectory Optimization for Dynamic Needle Insertion\"</em>(118회)이다. 이 시기를 함께 끌어간 축은 <strong>Patrick Sears</strong>, <strong>Jeffrey A. Stoll</strong>, <strong>Paul M. Novotny</strong>으로 요약된다. 바로 이 시기에 Dupont의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Andrew H. C. Gosline, Jesse Lock, Christos Bergeles, Evan J. Butler 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 86%가 이 venue에서 소화되었다."}, {"years": "2010 — 2014", "id": "V", "title": "Robot · Concentric의 시기", "body": "2010–2014년으로 이어진 이 시기에, <strong>26편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Concentric</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Design and Control of Concentric-Tube Robots\"</em>이다. T-RO 2010에 실린 이 글은 지금까지 729회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2011 T-RO의 <em>\"Stiffness Control of Surgical Continuum Manipulators\"</em>(255회)이다. 이 시기를 함께 끌어간 축은 <strong>Jesse Lock</strong>, <strong>Andrew H. C. Gosline</strong>, <strong>Evan J. Butler</strong>으로 요약된다. 바로 이 시기에 Dupont의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Junhyoung Ha, Alina Eqtami, Tomer Anor. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2015 — 2019", "id": "VI", "title": "Concentric · Robot의 시기", "body": "2015년을 기점으로 2019년까지의 흐름 속에서, <strong>18편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Concentric</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Kinematics가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"The grand challenges of Science Robotics\"</em>이다. Sci-Rob 2018에 실린 이 글은 지금까지 1,122회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2017 Sci-Rob의 <em>\"Medical robotics - Regulatory, ethical, and legal considerations for incre…\"</em>(662회)이다. 이 시기를 함께 끌어간 축은 <strong>Junhyoung Ha</strong>, <strong>Christos Bergeles</strong>, <strong>Nikolay V. Vasilyev</strong>으로 요약된다. 바로 이 시기에 Dupont의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Karl Price, Giovanni Pittiglio. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2020 — 2024", "id": "VII", "title": "성숙기의 확장 — Robot · Robotics", "body": "2020년부터 2024년 사이의 5년간, 출판은 8편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Robotics</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Artificial intelligence가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A decade retrospective of medical robotics research from 2010 to 2020\"</em>이다. Sci-Rob 2021에 실린 이 글은 지금까지 465회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Margherita Mencattelli</strong>, <strong>Joseph Peine</strong>, <strong>Giovanni Pittiglio</strong>으로 요약된다."}, {"years": "2025 — 2025", "id": "VIII", "title": "최근의 지형 — Robot · Autonomy", "body": "이어진 2025년대 전반, 2025–2025년의 기간 동안 출판은 3편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Autonomy</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Yuan Wang</strong>, <strong>Alperen Degirmenci</stron     advisorMeta: a => `${a.advisor_active_from}~ · last-author on ${a.advisor_last_author_count}/${a.early_copubs_as_our_first_author} of our early 1st-author`,
    studentMeta: s => `${s.student_first_year}~${s.last_copub_year} · last-author on ${s.we_last_author_count}/${s.student_first_author_count}`,
    moreStudents: n => `+ ${n} more`,
    rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · composite rank #${natural}` : '';
      const forcePart = force ? ` · ★ curated (below composite cutoff — included for field coverage)` : '';
      return `#${rank}${natPart} · composite ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "cites",
    footData: 'Data: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← home",
  },
  ko: {
    phasesLabel: "시기별 궤적",
    phasesTitle: "5년 단위로 본 연구 단계.",
    themesLabel: "관통하는 주제",
    themesTitle: "시기를 가로질러 지속되는 테마.",
    hlLabel: "대표작",
    hlTitle: "해당 학회 기준 고인용 앵커 논문.",
    lineageLabel: "계보",
    lineageTitle: "공저 패턴으로 추정한 멘토와 제자.",
    advisorsHeading: "멘토 후보",
    studentsHeading: n => `제자 후보 (${n})`,
    noAdvisor: "멘토 후보 신호 없음 (자체 시작 또는 데이터 부족)",
    noStudent: "제자 후보 신호 없음",
    advisorMeta: a => `${a.advisor_active_from}~ · 본인 초기 1저자 ${a.early_copubs_as_our_first_author}편 중 멘토 마지막저자 ${a.advisor_last_author_count}편`,
    studentMeta: s => `${s.student_first_year}~${s.last_copub_year} · 본인 마지막저자 ${s.we_last_author_count}편 / 학생 1저자 ${s.student_first_author_count}편 중`,
    moreStudents: n => `+ ${n}명 더`,
    rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · 합성점수 순위 #${natural}` : '';
      const forcePart = force ? ` · ★ 큐레이션 포함 (합성점수 기준 컷 아래지만 분야 대표성 확보 위해 포함)` : '';
      return `#${rank}${natPart} · 합성점수 ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "회 인용",
    footData: '데이터: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',
    home: "← 홈으로",
  }
};

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
</body>
</html>
