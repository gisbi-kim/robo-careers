<style>
:root {

  --paper: #f5f1ea;
  --paper-2: #ebe4d7;
  --rule: #1a1614;

  --accent-2: #2d4a3e;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;
  font-size: 16px;
  line-height: 1.65;

}
body {

  padding: 40px 24px 96px;
}
.grain {

}
.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 24px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;
  font-size: clamp(2.4rem, 5vw, 4rem);
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin-bottom: 18px;
}
.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }
.profile-name .family { display: block; }
.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding-bottom: 8px;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  font-family: 'Pretendard', sans-serif;
}
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {

}
.phase-body em {
  font-style: italic;
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px; background: var(--ink); border: 1px solid var(--ink);
}
.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;
  line-height: 1.4; margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(1.2rem, 2.2vw, 1.6rem);
  line-height: 1.5; max-width: 52ch;
  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;
}
.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  margin-right: 8px; padding: 2px 6px;
  background: var(--paper-2);
  border: 1px solid rgba(26, 22, 20, 0.2);
}
.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

/* lineage */
.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }
  .phase { grid-template-columns: 1fr; gap: 8px; }
  .phase-meta { display: flex; align-items: baseline; gap: 12px; }
  .lineage-grid { grid-template-columns: 1fr; gap: 24px; }
}

.foot {
  margin-top: 80px; padding-top: 24px;
  border-top: 1px solid var(--ink);
  display: flex; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted);
}
.foot a { color: var(--muted); }

const DATA = {"meta": {"name": "Frank C. Park", "given": "Frank C.", "family": "Park", "slug": "frank-c-park", "rank": 117, "natural_rank": 417, "force_included": true, "composite": 0.07802783279350418}, "en": {"tagline": "Optimal Kinematic Spherical → Optimal Jumps Biarticular → Learning-Based Detection Collisions", "oneLine": "Began publishing in 1991 and is still active 35 years on. The trajectory runs from <em>Optimal Kinematic Spherical</em> to <em>Learning-Based Detection Collisions</em> — a chain of reinventions. The same name stayed on the papers, but the actual question got rewritten every decade or so. 10 likely junior coauthors began their careers around them.", "facts": [["Period", "<strong>1991 — 2025</strong>"], ["Papers", "40 · 1,638 cites · h=22"], ["Core", "Geometric, Lie Group"], ["Landmark", "A Lie Group Formulation of Robot Dynamics"], ["Style", "early-blockbuster · pivoter"], ["Shift", "Optimal Kinematic Spherical → Learning-Based Detection Collisions"]], "phases": [{"years": "1991 — 1995", "id": "I", "title": "Opening bet — Optimal Kinematic Spherical · Spherical Spatial Mechanisms", "body": "Between 1991 and 1995, the window is a quieter one — 7 papers in total. The center of gravity rests on <span class='hl'>Optimal Kinematic Spherical</span>, <span class='hl'>Spherical Spatial Mechanisms</span>, the axis that threads through most of the era's output. Motion Control Product-Of-Exponentials emerges as a secondary strand. The face of the period is <em>\"A Lie Group Formulation of Robot Dynamics\"</em> — published in IJRR 1995, accumulating 345 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Kinematic Dexterity of Robotic Mechanisms\"</em> (IJRR 1994, 180 cites). The era's working axis reads <strong>James E. Bobrow</strong>, <strong>Roger W. Brockett</strong>, <strong>Daniel J. Pack</strong>. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 71% of the period's output."}, {"years": "1996 — 2000", "id": "II", "title": "Finding the orbit — Coordinate-Free Description Dynamics · Geometric Operational Space", "body": "Across the 1996–2000 stretch, the window is a quieter one — 7 papers in total. The center of gravity rests on <span class='hl'>Coordinate-Free Description Dynamics</span>, <span class='hl'>Geometric Operational Space</span>, the axis that threads through most of the era's output. Manipulability Singularity Geometric emerges as a secondary strand. The face of the period is <em>\"Manipulability and Singularity Analysis of Multiple Robot Systems: a Geometric Approach\"</em> — published in ICRA 1998, accumulating 66 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>James E. Bobrow</strong>, <strong>Jin Wook Kim</strong>, <strong>Munsang Kim</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Jungyun Kim, Jin Wook Kim. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 100% of the period's output."}, {"years": "2001 — 2005", "id": "III", "title": "Era of Eclipse-Ii Parallel Mechanism · Mechanism Enabling Continuous", "body": "Over the five years from 2001 to 2005, the window is a quieter one — 4 papers in total. The center of gravity rests on <span class='hl'>Eclipse-Ii Parallel Mechanism</span>, <span class='hl'>Mechanism Enabling Continuous</span>, the axis that threads through most of the era's output. Continuous 360-Degree Spinning emerges as a secondary strand. The face of the period is <em>\"Movement Primitives, Principal Component Analysis, and the Efficient Generation of Natura…\"</em> — published in ICRA 2005, accumulating 81 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>JongWon Kim</strong>, <strong>Jae-Chul Hwang</strong>, <strong>Jin-Sung Kim</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Bokman Lim. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 75% of the period's output."}, {"years": "2006 — 2010", "id": "IV", "title": "Era of Optimal Jumps Biarticular · Hidden Markov Generate", "body": "Then, from 2006 through 2010, the window is a quieter one — 4 papers in total. The center of gravity rests on <span class='hl'>Optimal Jumps Biarticular</span>, <span class='hl'>Hidden Markov Generate</span>, the axis that threads through most of the era's output. Generate Natural Humanoid emerges as a secondary strand. The face of the period is <em>\"Convex Optimization Algorithms for Active Balancing of Humanoid Robots\"</em> — published in T-RO 2007, accumulating 53 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Junghyun Kwon</strong>, <strong>Juyong Park</strong>, <strong>Jaeyoung Haan</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Junghyun Kwon, Beobkyoon Kim. The transition from solo work to group supervision is visible here."}, {"years": "2011 — 2015", "id": "V", "title": "Era of Tangent Space Rrt · Rrt Randomized Planning", "body": "In the 2011–2015 window, the window is a quieter one — 5 papers in total. The center of gravity rests on <span class='hl'>Tangent Space Rrt</span>, <span class='hl'>Rrt Randomized Planning</span>, the axis that threads through most of the era's output. Humanoid Motion Optimization emerges as a secondary strand. The face of the period is <em>\"Optimizing curvature sensor placement for fast, accurate shape sensing of continuum robots\"</em> — published in ICRA 2014, accumulating 74 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Beobkyoon Kim</strong>, <strong>Chansu Suh</strong>, <strong>Terry Taewoong Um</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Junhyoung Ha. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 80% of the period's output."}, {"years": "2016 — 2020", "id": "VI", "title": "Mature expansion — Natural Adaptive Control · Adaptive Stepsize Rrt", "body": "The 2016–2020 years saw the window is a quieter one — 7 papers in total. The center of gravity rests on <span class='hl'>Natural Adaptive Control</span>, <span class='hl'>Adaptive Stepsize Rrt</span>, the axis that threads through most of the era's output. Rrt Planning Open-Chain emerges as a secondary strand. The face of the period is <em>\"Geometric Robot Dynamic Identification: A Convex Programming Approach\"</em> — published in T-RO 2020, accumulating 59 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Taeyoon Lee</strong>, <strong>Junhyoung Ha</strong>, <strong>Pierre E. Dupont</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Taeyoon Lee, Jaewoon Kwon. The transition from solo work to group supervision is visible here."}, {"years": "2021 — 2025", "id": "VII", "title": "Latest terrain — Learning-Based Detection Collisions · Collisions Without Joint", "body": "Between 2021 and 2025, the window is a quieter one — 6 papers in total. The center of gravity rests on <span class='hl'>Learning-Based Detection Collisions</span>, <span class='hl'>Collisions Without Joint</span>, the axis that threads through most of the era's output. Physically Consistent Lie emerges as a secondary strand. The face of the period is <em>\"Learning-Based Real-Time Detection of Robot Collisions Without Joint Torque Sensors\"</em> — published in RA-L 2021, accumulating 96 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Kyu Min Park</strong>, <strong>Jaewoon Kwon</strong>, <strong>Yonghyeon Lee</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Park — Kyu Min Park, Yonghyeon Lee. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>RA-L</span> absorbed 67% of the period's output."}], "themes": [{"num": "01", "title": "From Optimal Kinematic Spherical to Learning-Based Detection Collisions — the stage changes each decade", "text": "A pivot score of 0.60 places them at the high end of our sample. The name above the papers stayed constant, but the underlying problem was rewritten several times. Early: Optimal Kinematic Spherical. Now: Learning-Based Detection Collisions. Tools, benchmarks, and working partners all shifted with each turn. Reinvention is the engine that powered this career."}, {"num": "02", "title": "What time accumulates, one paper at a time", "text": "40 papers, h=22, across 35 years. The headline blockbusters matter, but the real engine under the h-index is the sustained mid-tier output — a long compounding curve rather than a single hit."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 10 likely students by coauthor pattern. Names on that list include Taeyoon Lee, Jaewoon Kwon, Bokman Lim, Junghyun Kwon. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "Reinvent the tool. Keep the question.", "highlights": [{"year": 1995, "venue": "IJRR", "title": "A Lie Group Formulation of Robot Dynamics", "cites": 345}, {"year": 1994, "venue": "IJRR", "title": "Kinematic Dexterity of Robotic Mechanisms", "cites": 180}, {"year": 2021, "venue": "RA-L", "title": "Learning-Based Real-Time Detection of _first_year": 1999, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 0, "last_copub_year": 2002}, {"name": "Jin Wook Kim", "student_first_year": 1998, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 0, "last_copub_year": 2000}, {"name": "Junhyoung Ha", "student_first_year": 2014, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 0, "last_copub_year": 2017}], "students_rest": 0}, "archetype": "early-blockbuster"}, "ko": {"tagline": "Optimal Kinematic Spherical → Optimal Jumps Biarticular → Learning-Based Detection Collisions", "oneLine": "1991년에 출판을 시작해 35년째 현장에 머물고 있는 연구자. 그의 궤적은 <em>Optimal Kinematic Spherical</em>에서 <em>Learning-Based Detection Collisions</em>에 이르는 긴 재창조의 연쇄였다 — 같은 이름으로 서명했지만 실제로 다뤘던 질문은 10년에 한 번씩 크게 갈아엎혔다. 이 시기 10명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1991 — 2025</strong>"], ["논문 수", "40편 · 인용 1,638 · h=22"], ["핵심", "Geometric, Lie Group"], ["대표작", "A Lie Group Formulation of Robot Dynamics"], ["스타일", "early-blockbuster · pivoter"], ["전환", "Optimal Kinematic Spherical → Learning-Based Detection Collisions"]], "phases": [{"years": "1991 — 1995", "id": "I", "title": "출발점 — Optimal Kinematic Spherical · Spherical Spatial Mechanisms", "body": "1991년부터 1995년 사이의 5년간, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Optimal Kinematic Spherical</span>, <span class='hl'>Spherical Spatial Mechanisms</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Motion Control Product-Of-Exponentials가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A Lie Group Formulation of Robot Dynamics\"</em>이다. IJRR 1995에 실린 이 글은 지금까지 345회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1994 IJRR의 <em>\"Kinematic Dexterity of Robotic Mechanisms\"</em>(180회)이다. 이 시기를 함께 끌어간 축은 <strong>James E. Bobrow</strong>, <strong>Roger W. Brockett</strong>, <strong>Daniel J. Pack</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 71%가 이 venue에서 소화되었다."}, {"years": "1996 — 2000", "id": "II", "title": "궤도의 안착 — Coordinate-Free Description Dynamics · Geometric Operational Space", "body": "이어진 1996년대 전반, 1996–2000년의 기간 동안 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Coordinate-Free Description Dynamics</span>, <span class='hl'>Geometric Operational Space</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Manipulability Singularity Geometric가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Manipulability and Singularity Analysis of Multiple Robot Systems: a Geometric Approach\"</em>이다. ICRA 1998에 실린 이 글은 지금까지 66회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>James E. Bobrow</strong>, <strong>Jin Wook Kim</strong>, <strong>Munsang Kim</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jungyun Kim, Jin Wook Kim. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2001 — 2005", "id": "III", "title": "Eclipse-Ii Parallel Mechanism · Mechanism Enabling Continuous의 시기", "body": "그 뒤 2001년부터 2005년까지, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Eclipse-Ii Parallel Mechanism</span>, <span class='hl'>Mechanism Enabling Continuous</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Continuous 360-Degree Spinning가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Movement Primitives, Principal Component Analysis, and the Efficient Generation of Natura…\"</em>이다. ICRA 2005에 실린 이 글은 지금까지 81회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>JongWon Kim</strong>, <strong>Jae-Chul Hwang</strong>, <strong>Jin-Sung Kim</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Bokman Lim. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 75%가 이 venue에서 소화되었다."}, {"years": "2006 — 2010", "id": "IV", "title": "Optimal Jumps Biarticular · Hidden Markov Generate의 시기", "body": "2006년 무렵부터 2010년에 걸쳐, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Optimal Jumps Biarticular</span>, <span class='hl'>Hidden Markov Generate</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Generate Natural Humanoid가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Convex Optimization Algorithms for Active Balancing of Humanoid Robots\"</em>이다. T-RO 2007에 실린 이 글은 지금까지 53회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Junghyun Kwon</strong>, <strong>Juyong Park</strong>, <strong>Jaeyoung Haan</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Junghyun Kwon, Beobkyoon Kim. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2011 — 2015", "id": "V", "title": "Tangent Space Rrt · Rrt Randomized Planning의 시기", "body": "2011–2015년으로 이어진 이 시기에, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Tangent Space Rrt</span>, <span class='hl'>Rrt Randomized Planning</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Humanoid Motion Optimization가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Optimizing curvature sensor placement for fast, accurate shape sensing of continuum robots\"</em>이다. ICRA 2014에 실린 이 글은 지금까지 74회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Beobkyoon Kim</strong>, <strong>Chansu Suh</strong>, <strong>Terry Taewoong Um</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Junhyoung Ha. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "2016 — 2020", "id": "VI", "title": "성숙기의 확장 — Natural Adaptive Control · Adaptive Stepsize Rrt", "body": "2016년을 기점으로 2020년까지의 흐름 속에서, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Natural Adaptive Control</span>, <span class='hl'>Adaptive Stepsize Rrt</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Rrt Planning Open-Chain가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Geometric Robot Dynamic Identification: A Convex Programming Approach\"</em>이다. T-RO 2020에 실린 이 글은 지금까지 59회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Taeyoon Lee</strong>, <strong>Junhyoung Ha</strong>, <strong>Pierre E. Dupont</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Taeyoon Lee, Jaewoon Kwon. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2021 — 2025", "id": "VII", "title": "최근의 지형 — Learning-Based Detection Collisions · Collisions Without Joint", "body": "2021년부터 2025년 사이의 5년간, 출판은 6편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Learning-Based Detection Collisions</span>, <span class='hl'>Collisions Without Joint</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Physically Consistent Lie가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Learning-Based Real-Time Detection of Robot Collisions Without Joint Torque Sensors\"</em>이다. RA-L 2021에 실린 이 글은 지금까지 96회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Kyu Min Park</strong>, <strong>Jaewoon Kwon</strong>, <strong>Yonghyeon Lee</strong>으로 요약된다. 바로 이 시기에 Park의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Kyu Min Park, Yonghyeon Lee. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>RA-L</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Optimal Kinematic Spherical에서 Learning-Based Detection Collisions까지 — 10년마다 무대를 바꾼다", "text": "피벗 점수 0.60는 본 조사 상위권에 해당한다. 같은 이름으로 서명이 이어졌을 뿐, 실제로 다루는 문제는 몇 번이나 통째로 갈렸다. 초기에는 Optimal Kinematic Spherical, 지금은 Learning-Based Detection Collisions — 그 사이에 도구, 평가 방법, 함께 일하는 사람까지 이동한다. 재창조의 연쇄가 이 사람의 경력을 지탱하는 엔진이다."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "35년 동안 총 40편, h=22. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 10명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Taeyoon Lee, Jaewoon Kwon, Bokman Lim, Junghyun Kwon이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "도구를 갈아엎어라. 질문은 남겨둬라.", "highlights": [{"year": 1995, "venue": "IJRR", "title": "A Lie Group Formulation of Robot Dynamics", "cites": 345}, {"year": 1994, "venue": "IJRR", "titl const I18N = {

    phasesLabel: "BY PERIOD",
    phasesTitle: "Career in 5-year windows.",
    themesLabel: "THROUGH-LINES",
    themesTitle: "Themes that cut across all periods.",
    hlLabel: "KEY WORKS",
    hlTitle: "Highly-cited anchor papers within the covered venues.",
    lineageLabel: "LINEAGE",
    lineageTitle: "Mentors and mentees inferred from coauthor patterns.",
    advisorsHeading: "Likely advisor(s)",
    studentsHeading: n => `Likely students (${n})`,
    noAdvisor: "No mentor signal (self-started or sparse early data)",
    noStudent: "No student signal",
    advisorMeta: a => `${a.advisor_active_from}~ · last-author on ${a.advisor_last_author_count}/${a.early_copubs_as_our_first_author} of our early 1st-author`,
    studentMeta: s => `${s.student_first_year}~${s.last_copub_year} · last-author on ${s.we_last_author_count}/${s.student_first_author_count}`,
    moreStudents: n => `+ ${n} more`,
    rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · composite rank #${natural}` : '';
      const forcePart = force ? ` · ★ curated (below composite cutoff — included for field coverage)` : '';
      return `#${rank}${natPart} · composite ${composite.toFixed(2)} · ${archetype}${forcePart}`;
    },
    citesSuffix: "cites",
    footData: 'Data: <a href="https://gisbi-kim.github.io/robopaper-atlas/" target="_blank">robopaper-atlas</a>',

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
