}

.rank-badge {

.profile-head {

.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }

  display: grid;

.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {

.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;

.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

reless Sensor emerges as a secondary strand. The era's working axis reads <strong>Fernando Caballero</strong>, <strong>Luis Merino</strong>, <strong>Iván Maza</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Ollero — Jose A. Cobano, David Alejo, Jesús Capitán, Antidio Viguria, + 1 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 67% of the period's output."}, {"years": "2012 — 2016", "id": "V", "title": "Era of Aerial · Decentralized Multi-Robot Cooperation", "body": "In the 2012–2016 window, <strong>34</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Aerial</span>, <span class='hl'>Decentralized Multi-Robot Cooperation</span>, the axis that threads through most of the era's output. Cooperation Auctioned Pomdps emerges as a secondary strand. The face of the period is <em>\"Control of an aerial robot with multi-link arm for assembly tasks\"</em> — published in ICRA 2013, accumulating 257 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Control of a multirotor outdoor aerial manipulator\"</em> (IROS 2014, 216 cites). The era's working axis reads <strong>Guillermo Heredia</strong>, <strong>Antidio Viguria</strong>, <strong>Miguel Angel Trujillo</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Ollero — Alejandro Suárez, José Joaquín Acevedo, Felipe R. Fabresse, Santiago Vera, + 6 more. The transition from solo work to group supervision is visible here. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 59% of the period's output."}, {"years": "2017 — 2021", "id": "VI", "title": "Mature expansion — Aerial · Dual Arm", "body": "The 2017–2021 years saw <strong>30</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Aerial</span>, <span class='hl'>Dual Arm</span>, the axis that threads through most of the era's output. Inverse Kinematics Control emerges as a secondary strand. The face of the period is <em>\"Aerial Manipulation: A Literature Review\"</em> — published in RA-L 2018, accumulating 504 citations and becoming a standard reference in the sub-field. Close behind: <em>\"Physical-Virtual Impedance Control in Ultralightweight and Compliant Dual-…\"</em> (RA-L 2018, 111 cites). The era's working axis reads <strong>Guillermo Heredia</strong>, <strong>Alejandro Suárez</strong>, <strong>José Ramiro Martinez de Dios</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Ollero — Raul Tapia, Juan Pablo Rodríguez-Gómez, Augusto Gómez Eguíluz, Vicente Perez-Sanchez, + 9 more. The transition from solo work to group supervision is visible here."}, {"years": "2022 — 2025", "id": "VII", "title": "Latest terrain — Aerial · Riccati Equation", "body": "Between 2022 and 2025, <strong>26</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Aerial</span>, <span class='hl'>Riccati Equation</span>, the axis that threads through most of the era's output. Anthropomorphic Arms emerges as a secondary strand. The face of the period is <em>\"Past, Present, and Future of Aerial Robotic Manipulators\"</em> — published in T-RO 2022, accumulating 430 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Alejandro Suárez</strong>, <strong>Raul Tapia</strong>, <strong>Begoña C. Arrue</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Ollero — Saeed Rafee Nekoo, Fernando Ruiz, Antonio González-Morgado. The transition from solo work to group supervision is visible here."}], "themes": [{"num": "01", "title": "The Aerial anchor never moved", "text": "Aerial appears among the top topics in most of the 7 5-year windows. Adjacent topics drift copub_year": 2013}, {"name": "Vicente Perez-Sanchez", "student_first_year": 2020, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 1, "we_last_author_count": 4, "last_copub_year": 2023}, {"name": "María del Mar Guzmán", "student_first_year": 2020, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 1, "we_last_author_count": 4, "last_copub_year": 2022}, {"name": "Jesús Capitán", "student_first_year": 2009, "copubs_in_first_5yr": 3, "total_copubs": 5, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2021}], "students_rest": 21}, "archetype": "late-bloomer-2"}, "ko": {"tagline": "2D Laser Rangefinder → Distributed Multirobot Task → Aerial", "oneLine": "1992년에 출판을 시작해 34년째 현장에 머물고 있는 연구자. 초기에는 <em>2D Laser Rangefinder</em>를 다루었고, 최근에는 <em>Aerial</em>가 중심으로 올라왔다. 급격한 단절이라기보다는 인접 영역을 꾸준히 밀고 나간 점진적 확장에 가깝다. 대표작은 2018년 RA-L에 실린 \"Aerial Manipulation: A Literature Review\" (504회 인용). 공저 패턴으로 추정되는 제자만 33명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1992 — 2025</strong>"], ["논문 수", "112편 · 인용 4,932 · h=38"], ["핵심", "Aerial, Lightweight Compliant"], ["대표작", "Aerial Manipulation: A Literature Review"], ["스타일", "late-bloomer-2"], ["전환", "2D Laser Rangefinder → Aerial"]], "phases": [{"years": "1992 — 1996", "id": "I", "title": "출발점 — 2D Laser Rangefinder · Iconic Position Estimator", "body": "1992년부터 1996년 사이의 5년간, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>2D Laser Rangefinder</span>, <span class='hl'>Iconic Position Estimator</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Mobile Equipped 2D가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Stability analysis of mobile robot path tracking\"</em>이다. IROS 1995에 실린 이 글은 지금까지 110회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Javier Gonzalez</strong>, <strong>Anthony Stentz</strong>, <strong>Antonio Reina</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 75%가 이 venue에서 소화되었다."}, {"years": "1997 — 2001", "id": "II", "title": "궤도의 안착 — Motion Control Non-Structured · Non-Structured Environments Video", "body": "이어진 1997년대 전반, 1997–2001년의 기간 동안 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Motion Control Non-Structured</span>, <span class='hl'>Non-Structured Environments Video</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Autonomous Mobile Motion가 보조 줄기로 올라온다. 이 시기를 실질적으로 함께 끌고 간 파트너는 <strong>Joaquín Ferruz Melero</strong>이다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2002 — 2006", "id": "III", "title": "Aerial Vehicles · Motion Compensation Object의 시기", "body": "그 뒤 2002년부터 2006년까지, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Aerial Vehicles</span>, <span class='hl'>Motion Compensation Object</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Detection Autonomous Helicopter가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Cooperative Fire Detection using Unmanned Aerial Vehicles\"</em>이다. ICRA 2005에 실린 이 글은 지금까지 132회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Fernando Caballero</strong>, <strong>Luis Merino</strong>, <strong>Joaquin Ferruz</strong>으로 요약된다. 바로 이 시기에 Ollero의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Fernando Caballero, Luis Merino. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2007 — 2011", "id": "IV", "title": "Distributed Multirobot Task · Range-Only Mapping의 시기", "body": "2007년 무렵부터 2011년에 걸쳐, <strong>12편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Distributed Multirobot Task</span>, <span class='hl'>Range-Only Mapping</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Wireless Sensor가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Fernando Caballero</strong>, <strong>Luis Merino</strong>, <strong>Iván Maza</strong>으로 요약된다. 바로 이 시기에 Ollero의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jose A. Cobano, David Alejo, Jesús Capitán, Antidio Viguria 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2012 — 2016", "id": "V", "title": "Aerial · Decentralized Multi-Robot Cooperation의 시기", "body": "2012–2016년으로 이어진 이 시기에, 총 <strong>34편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Aerial</span>, <span class='hl'>Decentralized Multi-Robot Cooperation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Cooperation Auctioned Pomdps가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Control of an aerial robot with multi-link arm for assembly tasks\"</em>이다. ICRA 2013에 실린 이 글은 지금까지 257회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2014 IROS의 <em>\"Control of a multirotor outdoor aerial manipulator\"</em>(216회)이다. 이 시기를 함께 끌어간 축은 <strong>Guillermo Heredia</strong>, <strong>Antidio Viguria</strong>, <strong>Miguel Angel Trujillo</strong>으로 요약된다. 바로 이 시기에 Ollero의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Alejandro Suárez, José Joaquín Acevedo, Felipe R. Fabresse, Santiago Vera 외 6명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 59%가 이 venue에서 소화되었다."}, {"years": "2017 — 2021", "id": "VI", "title": "성숙기의 확장 — Aerial · Dual Arm", "body": "2017년을 기점으로 2021년까지의 흐름 속에서, 총 <strong>30편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Aerial</span>, <span class='hl'>Dual Arm</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Inverse Kinematics Control가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Aerial Manipulation: A Literature Review\"</em>이다. RA-L 2018에 실린 이 글은 지금까지 504회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2018 RA-L의 <em>\"Physical-Virtual Impedance Control in Ultralightweight and Compliant Dual-…\"</em>(111회)이다. 이 시기를 함께 끌어간 축은 <strong>Guillermo Heredia</strong>, <strong>Alejandro Suárez</strong>, <strong>José Ramiro Martinez de Dios</strong>으로 요약된다. 바로 이 시기에 Ollero의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Raul Tapia, Juan Pablo Rodríguez-Gómez, Augusto Gómez Eguíluz, Vicente Perez-Sanchez 외 9명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2022 — 2025", "id": "VII", "title": "최근의 지형 — Aerial · Riccati Equation", "body": "2022년부터 2025년 사이의 5년간, <strong>26편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Aerial</span>, <span class='hl'>Riccati Equation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Anthropomorphic Arms가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Past, Present, and Future of Aerial Robotic Manipulators\"</em>이다. T-RO 2022에 실린 이 글은 지금까지 430회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Alejandro Suárez</strong>, <strong>Raul Tapia</strong>, <strong>Begoña C. Arrue</strong>으로 요약된다. 바로 이 시기에 Ollero의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Saeed Rafee Nekoo, Fernando Ruiz, Antonio González-Morgado. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Aerial라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Aerial가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.8명에서 후기 5.1명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 33명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 33명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Alejandro Suárez, Raul Tapia, Fernando Caballero, Juan Pablo Rodríguez-Gómez이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 33명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2018, "venue": "RA-L", "title": "Aerial Manipulation: A Literature Review", "cites": 504}, {"year": 2022, "venue": "T-RO", "title": "Past, Present, and Future of Aerial Robotic Manipulators", "cites": 430}, {"year": 2013, "venue": "ICRA", "title": "Control of an aerial robot with multi-link arm for assembly tasks", "cites": 257}, {"year": 2014, "venue": "IROS", "title": "Control of a multirotor outdoor aerial manipulator", "cites": 216}, {"year": 2015, "venue": "ICRA", "title": "A multilayer control for m function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
