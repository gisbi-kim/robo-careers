nt": 1, "last_copub_year": 1991}, {"name": "Yeonchool Park", "student_first_year": 2006, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 1, "last_copub_year": 2011}, {"name": "Han-Young Jang", "student_first_year": 2005, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 0, "last_copub_year": 2006}, {"name": "Sang Chul Ahn", "student_first_year": 1997, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 0, "last_copub_year": 1997}], "students_rest": 0}, "archetype": "early-blockbuster"}, "ko": {"tagline": "Computer Control Space-Borne → Structured Light → Bin Packing Reinforcement", "oneLine": "1985년에 출판을 시작해 38년째 현장에 머물고 있는 연구자. 그의 궤적은 <em>Computer Control Space-Borne</em>에서 <em>Bin Packing Reinforcement</em>에 이르는 긴 재창조의 연쇄였다 — 같은 이름으로 서명했지만 실제로 다뤘던 질문은 10년에 한 번씩 크게 갈아엎혔다. 이 시기 12명의 후배가 그의 곁에서 커리어를 시작했다는 신호가 포착된다.", "facts": [["시기", "<strong>1985 — 2022</strong>"], ["논문 수", "93편 · 인용 1,271 · h=21"], ["핵심", "Structured Light, Teleoperator Control"], ["대표작", "Computer control of space-borne teleoperators w…"], ["스타일", "early-blockbuster · pivoter"], ["전환", "Computer Control Space-Borne → Bin Packing Reinforcement"]], "phases": [{"years": "1985 — 1989", "id": "I", "title": "출발점 — Computer Control Space-Borne · Space-Borne Teleoperators Sensory", "body": "1985년부터 1989년 사이의 5년간, 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Computer Control Space-Borne</span>, <span class='hl'>Space-Borne Teleoperators Sensory</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Sensory Feedback가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Computer control of space-borne teleoperators with sensory feedback\"</em>이다. ICRA 1985에 실린 이 글은 지금까지 92회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>George A. Bekey</strong>, <strong>Antal K. Bejczy</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1990 — 1994", "id": "II", "title": "궤도의 안착 — Teleoperator Control · Assembly Planning", "body": "이어진 1990년대 전반, 1990–1994년의 기간 동안 <strong>29편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Teleoperator Control</span>, <span class='hl'>Assembly Planning</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Self-Motion Topology가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Assembly planning based on subassembly extraction\"</em>이다. ICRA 1990에 실린 이 글은 지금까지 88회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Sungbok Kim</strong>, <strong>Hahk Sung Lee</strong>, <strong>Carlos L. Lück</strong>으로 요약된다. 바로 이 시기에 Lee의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Carlos L. Lück, David Chiu, Youngchul Kay. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 62%가 이 venue에서 소화되었다."}, {"years": "1995 — 1999", "id": "III", "title": "Perception Net · Jump Impact Controller의 시기", "body": "그 뒤 1995년부터 1999년까지, 총 <strong>35편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Perception Net</span>, <span class='hl'>Jump Impact Controller</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Depth Magnification Blurring가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Micromachined inertial sensors\"</em>이다. IROS 1999에 실린 이 글은 지금까지 35회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Chunsik Yi</strong>, <strong>Sookwang Ro</strong>, <strong>David Chiu</strong>으로 요약된다. 바로 이 시기에 Lee의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Raúl Suárez, Jae-Won Lee, Woong Kwon, Sang Chul Ahn. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}, {"years": "2000 — 2004", "id": "IV", "title": "State Estimation Nonlinear · Micro Fluid Device의 시기", "body": "2000년 무렵부터 2004년에 걸쳐, 출판은 5편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>State Estimation Nonlinear</span>, <span class='hl'>Micro Fluid Device</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Device Thick Layer가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Jae-Won Lee</strong>, <strong>Jaewoo Chung</strong>, <strong>Seungmo Lim</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 80%가 이 venue에서 소화되었다."}, {"years": "2005 — 2009", "id": "V", "title": "Structured Light · 3D Camera의 시기", "body": "2005–2009년으로 이어진 이 시기에, <strong>14편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Structured Light</span>, <span class='hl'>3D Camera</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Camera Variable Structured가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A real-time 3D workspace modeling with stereo camera\"</em>이다. IROS 2005에 실린 이 글은 지금까지 36회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Jongmoo Choi</strong>, <strong>Eunyoung Kim</strong>, <strong>Seungsub Oh</strong>으로 요약된다. 바로 이 시기에 Lee의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Lam Bui Quang, DaeSik Kim, Yeonchool Park, Han-Young Jang. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 57%가 이 venue에서 소화되었다."}, {"years": "2010 — 2014", "id": "VI", "title": "Coplanar Line · Structured Light의 시기", "body": "2010년을 기점으로 2014년까지의 흐름 속에서, 출판은 6편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Coplanar Line</span>, <span class='hl'>Structured Light</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Line Matching Intersection가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Hyunwoo Kim</strong>, <strong>Lam Bui Quang</strong>, <strong>Yeonchool Park</strong>으로 요약된다. 바로 이 시기에 Lee의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Hyunwoo Kim. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2015 — 2019", "id": "VII", "title": "성숙기의 확장 — Recalibration-Free Indoor Localization · Localization Wi-Fi Fingerprinting", "body": "2015년부터 2019년 사이의 5년간, 출판은 2편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Recalibration-Free Indoor Localization</span>, <span class='hl'>Localization Wi-Fi Fingerprinting</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Fingerprinting Invariant Received가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Mohd Nizam Husen</strong>, <strong>Ahmed M. Naguib</strong>, <strong>Naeem Ul Islam</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2020 — 2022", "id": "VIII", "title": "최근의 지형 — Bin Packing Reinforcement · Reinforcement Learning Buffer", "body": "이어진 2020년대 전반, 2020–2022년의 기간 동안 출판은 1편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Bin Packing Reinforcement</span>, <span class='hl'>Reinforcement Learning Buffer</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 3D Bin가 보조 줄기로 올라온다. 이 시기를 실질적으로 함께 끌고 간 파트너는 <strong>Aaron Valero Puche</strong>이다. 발표 무대는 압도적으로 <span class='hl'>IROS</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Computer Control Space-Borne에서 Bin Packing Reinforcement까지 — 10년마다 무대를 바꾼다", "text": "피벗 점수 0.62는 본 조사 상위권에 해당한다. 같은 이름으로 서명이 이어졌을 뿐, 실제로 다루는 문제는 몇 번이나 통째로 갈렸다. 초기에는 Computer Control Space-Borne, 지금은 Bin Packing Reinforcement — 그 사이에 도구, 평가 방법, 함께 일하는 사람까지 이동한다. 재창조의 연쇄가 이 사람의 경력을 지탱하는 엔진이다."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "38년 동안 총 93편, h=21. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 12명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Carlos L. Lück, David Chiu, Hyunwoo Kim, Lam Bui Quang이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "도구를 갈아엎어라. 질문은 남겨둬라.", "highlights": [{"year": 1985, "venue": "ICRA", "title": "Computer control of space-borne teleoperators with sensory feedback", "cites": 92}, {"year": 1990, "venue": "ICRA", "title": "Assembly planning based on subassembly extraction", "cites": 88}, {"year": 1991, "venue": "ICRA", "title": "Redundant arm kinematic control based on parameterization", "cites": 65}, {"year": 1992, "venue": "ICRA", "title": "Backward assembly planning with assembly cost analysis", "cites": 50}, {"year": 1993, "venue": "ICRA", "title": "Self-Motion Topology for Redundant Manipulators with Joint Limits", "cites": 41}, {"year": 2005, "venue": "IROS", "title": "A real-time 3D workspace modeling with stereo camera", "cites": 36}, {"year": 1999, "venue": "IROS", "title": "Micromachined inertial sensors", "cites": 35}, {"year": 1990, "venue": "ICRA", "title": "An accurate estimation of 3-D position and orientation of a moving object for robot stereo vision: Kalman filter approach", "cites": 33}], "lineage": {"advisors": [], "students": [{"name": "Carlos L. Lück", "student_first_year": 1993, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 4, "we_last_author_count": 4, "last_copub_year": 1995}, {"name": "David Chiu", "student_first_year": 1993, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 1997}, {"name": "Hyunwoo Kim", "student_first_year": 2010, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2011}, {"name": "Lam Bui Quang", "student_first_year": 2009, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2012}, {"name": "Raúl Suárez", "student_first_year": 1997, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 1997}, {"name": "Jae-Won Lee", "student_first_year": 1999, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2000}, {"name": "Woong Kwon", "student_first_year": 1996, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 1, "we_last_author_count": 1, "last_copub_year": 2001}, {"name": "DaeSik Kim", "student_first_year": 2005, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_coun     advisorMeta: a => `${a.advisor_active_from}~ · last-author on ${a.advisor_last_author_count}/${a.early_copubs_as_our_first_author} of our early 1st-author`,

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
