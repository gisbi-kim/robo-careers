* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;

body {

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);

}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;

}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;
  font-size: clamp(2.4rem, 5vw, 4rem);

  letter-spacing: -0.03em;

.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }

.profile-tag {

  font-size: 0.7rem;

}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;

.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;

.phase-body em {

  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;

  font-family: 'Noto Serif KR', 'Fraunces', serif;

.pullquote {

  letter-spacing: -0.01em;

.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;

.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;

.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {

.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;

.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);

}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;

}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;

.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;

.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {

nd becoming a standard reference in the sub-field. The era's working axis reads <strong>Mark Moll</strong>, <strong>Morteza Lahijanian</strong>, <strong>Moshe Y. Vardi</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Kavraki — Juan David Hernández, Neil T. Dantam, Rahul Shome, Zachary Kingston, + 2 more. The transition from solo work to group supervision is visible here."}, {"years": "2018 — 2022", "id": "VI", "title": "Mature expansion — Motion Planning · Task Motion", "body": "The 2018–2022 years saw <strong>33</strong> papers land in this stretch. The center of gravity rests on <span class='hl'>Motion Planning</span>, <span class='hl'>Task Motion</span>, the axis that threads through most of the era's output. Manipulation Domains emerges as a secondary strand. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Constantinos Chamzas</strong>, <strong>Mark Moll</strong>, <strong>Zachary Kingston</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Kavraki — Constantinos Chamzas, Carlos Quintero-Peña, Tianyang Pan, Wil Thomason, + 4 more. The transition from solo work to group supervision is visible here."}, {"years": "2023 — 2025", "id": "VII", "title": "Latest terrain — Motion Planning · Task Motion", "body": "Between 2023 and 2025, <strong>20</strong> papers were produced — a measured pace. The center of gravity rests on <span class='hl'>Motion Planning</span>, <span class='hl'>Task Motion</span>, the axis that threads through most of the era's output. Extracting Generalizable Skills emerges as a secondary strand. No single blockbuster defines this stretch; the citation ledger grows through sustained mid-tier production. The era's working axis reads <strong>Zachary Kingston</strong>, <strong>Wil Thomason</strong>, <strong>Rahul Shome</strong>. The publishing venue skews heavily — <span class='hl'>ICRA</span> absorbed 55% of the period's output."}], "themes": [{"num": "01", "title": "The Motion Planning anchor never moved", "text": "Motion Planning appears among the top topics in most of the 7 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "From solo author to lab head", "text": "Authors per paper grew from 2.7 early to 4.0 late — the canonical PI-scaling arc. 26 likely students underwrite that scale in the coauthor data. A textbook progression from individual contributor to group leader."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 26 likely students by coauthor pattern. Names on that list include Ioan Alexandru Sucan, Andrew M. Ladd, Kostas E. Bekris, Constantinos Chamzas. None have yet re-entered the ranking, but at this volume it reads like a matter of time. The longest-lived legacy of any working scientist is, in the end, the other scientists they trained."}], "pullquote": "26 students — that's the real body of work.", "highlights": [{"year": 2000, "venue": "ICRA", "title": "Path Planning Using Lazy PRM", "cites": 853}, {"year": 1996, "venue": "ICRA", "title": "Analysis of probabilistic roadmaps for path planning", "cites": 417}, {"year": 1994, "venue": "ICRA", "title": "Randomized Preprocessing of Configuration Space for Fast Path Planning", "cites": 412}, {"year": 1997, "venue": "IJRR", "title": "A Random Sampling Scheme for Path Planning", "cites": 276}, {"year": 2004, "venue": "T-RO", "title": "On the feasibility of using wireless ethernet for indoor localization", "cites": 247}, {"year": 2010, "venue": "ICRA", "title": "Sampling-based motion planning with temporal goals", "cites": 243}, {"year": 2006, "venue": "T-RO", "title": "Path planning for deformable li opub_year": 2024}, {"name": "Tianyang Pan", "student_first_year": 2019, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 5, "we_last_author_count": 5, "last_copub_year": 2024}, {"name": "Wil Thomason", "student_first_year": 2022, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 1, "we_last_author_count": 5, "last_copub_year": 2025}, {"name": "Erion Plaku", "student_first_year": 2003, "copubs_in_first_5yr": 7, "total_copubs": 8, "student_first_author_count": 6, "we_last_author_count": 4, "last_copub_year": 2010}, {"name": "Juan David Hernández", "student_first_year": 2015, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 3, "we_last_author_count": 4, "last_copub_year": 2020}, {"name": "Andrew M. Wells", "student_first_year": 2019, "copubs_in_first_5yr": 8, "total_copubs": 8, "student_first_author_count": 2, "we_last_author_count": 4, "last_copub_year": 2024}, {"name": "Neil T. Dantam", "student_first_year": 2016, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 2, "we_last_author_count": 4, "last_copub_year": 2019}, {"name": "Devin K. Grady", "student_first_year": 2012, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2015}], "students_rest": 14}, "archetype": "early-blockbuster"}, "ko": {"tagline": "Randomized Preprocessing Configuration → Task Motion Multigraphs → Motion Planning", "oneLine": "1993년에 출판을 시작해 33년째 현장에 머물고 있는 연구자. 초기에는 <em>Randomized Preprocessing Configuration</em>를 다루었고, 최근에는 <em>Motion Planning</em>가 중심으로 올라왔다. 급격한 단절이라기보다는 인접 영역을 꾸준히 밀고 나간 점진적 확장에 가깝다. 대표작은 2000년 ICRA에 실린 \"Path Planning Using Lazy PRM\" (853회 인용). 공저 패턴으로 추정되는 제자만 26명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1993 — 2025</strong>"], ["논문 수", "130편 · 인용 7,688 · h=47"], ["핵심", "Motion Planning, Task Motion"], ["대표작", "Path Planning Using Lazy PRM"], ["스타일", "early-blockbuster · specialist"], ["전환", "Randomized Preprocessing Configuration → Motion Planning"]], "phases": [{"years": "1993 — 1997", "id": "I", "title": "출발점 — Randomized Preprocessing Configuration · Configuration Space Path", "body": "1993년부터 1997년 사이의 5년간, 출판은 8편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Randomized Preprocessing Configuration</span>, <span class='hl'>Configuration Space Path</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Path Planning가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Analysis of probabilistic roadmaps for path planning\"</em>이다. ICRA 1996에 실린 이 글은 지금까지 417회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 1994 ICRA의 <em>\"Randomized Preprocessing of Configuration Space for Fast Path Planning\"</em>(412회)이다. 이 시기를 함께 끌어간 축은 <strong>Jean-Claude Latombe</strong>, <strong>Achim Schweikard</strong>, <strong>Rhea Tombropoulos</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 62%가 이 venue에서 소화되었다."}, {"years": "1998 — 2002", "id": "II", "title": "궤도의 안착 — Planning Paths · Manipulation Constraints", "body": "이어진 1998년대 전반, 1998–2002년의 기간 동안 <strong>20편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Planning Paths</span>, <span class='hl'>Manipulation Constraints</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Force Field가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Path Planning Using Lazy PRM\"</em>이다. ICRA 2000에 실린 이 글은 지금까지 853회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Florent Lamiraux</strong>, <strong>Christopher Holleman</strong>, <strong>Andrew M. Ladd</strong>으로 요약된다. 바로 이 시기에 Kavraki의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Andrew M. Ladd, Kostas E. Bekris, Mark Moll, Christopher Holleman 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 65%가 이 venue에서 소화되었다."}, {"years": "2003 — 2007", "id": "III", "title": "Curves Constant Length · Sampling-Based Roadmap Trees의 시기", "body": "그 뒤 2003년부터 2007년까지, <strong>18편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Curves Constant Length</span>, <span class='hl'>Sampling-Based Roadmap Trees</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Motion Planning가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"On the feasibility of using wireless ethernet for indoor localization\"</em>이다. T-RO 2004에 실린 이 글은 지금까지 247회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2006 T-RO의 <em>\"Path planning for deformable linear objects\"</em>(203회)이다. 이 시기를 함께 끌어간 축은 <strong>Kostas E. Bekris</strong>, <strong>Andrew M. Ladd</strong>, <strong>Erion Plaku</strong>으로 요약된다. 바로 이 시기에 Kavraki의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Erion Plaku, Konstantinos I. Tsianos. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2008 — 2012", "id": "IV", "title": "Task Motion Multigraphs · Motion Planning의 시기", "body": "2008년 무렵부터 2012년에 걸쳐, <strong>14편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Task Motion Multigraphs</span>, <span class='hl'>Motion Planning</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Sampling-Based Motion가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Sampling-based motion planning with temporal goals\"</em>이다. ICRA 2010에 실린 이 글은 지금까지 243회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2010 T-RO의 <em>\"Motion Planning With Dynamics by a Synergistic Combination of Layers of Pl…\"</em>(166회)이다. 이 시기를 함께 끌어간 축은 <strong>Ioan Alexandru Sucan</strong>, <strong>Moshe Y. Vardi</strong>, <strong>Erion Plaku</strong>으로 요약된다. 바로 이 시기에 Kavraki의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Ioan Alexandru Sucan, Devin K. Grady, Ryan Luna, Morteza Lahijanian 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2013 — 2017", "id": "V", "title": "Motion Planning · Task Motion의 시기", "body": "2013–2017년으로 이어진 이 시기에, <strong>17편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Motion Planning</span>, <span class='hl'>Task Motion</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Resolution Independent Density가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Incremental Task and Motion Planning: A Constraint-Based Approach\"</em>이다. RSS 2016에 실린 이 글은 지금까지 168회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Mark Moll</strong>, <strong>Morteza Lahijanian</strong>, <strong>Moshe Y. Vardi</strong>으로 요약된다. 바로 이 시기에 Kavraki의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Juan David Hernández, Neil T. Dantam, Rahul Shome, Zachary Kingston 외 2명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "VI", "title": "성숙기의 확장 — Motion Planning · Task Motion", "body": "2018년을 기점으로 2022년까지의 흐름 속에서, 총 <strong>33편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Motion Planning</span>, <span class='hl'>Task Motion</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Manipulation Domains가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Constantinos Chamzas</strong>, <strong>Mark Moll</strong>, <strong>Zachary Kingston</strong>으로 요약된다. 바로 이 시기에 Kavraki의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Constantinos Chamzas, Carlos Quintero-Peña, Tianyang Pan, Wil Thomason 외 4명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VII", "title": "최근의 지형 — Motion Planning · Task Motion", "body": "2023년부터 2025년 사이의 5년간, <strong>20편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Motion Planning</span>, <span class='hl'>Task Motion</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Extracting Generalizable Skills가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Zachary Kingston</strong>, <strong>Wil Thomason</strong>, <strong>Rahul Shome</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 55%가 이 venue에서 소화되었다."}], "themes": [{"num": "01", "title": "Motion Planning라는 축은 한 번도 흔들리지 않았다", "text": "7개 5년 구간 중 대부분에서 Motion Planning가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 2.7명에서 후기 4.0명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 26명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 26명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Ioan Alexandru Sucan, Andrew M. Ladd, Kostas E. Bekris, Constantinos Chamzas이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 26명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2000, "venue": "ICRA", "title": "Path Planning Using Lazy PRM", "cites": 853}, {"year": 1996, "venue": "ICRA", "title": "Analysis of probabilistic roadmaps for path planning", "cites": 417}, {"year": 1994, "venue": "ICRA", "title": "Randomized Preprocessing of Configuration Space for Fast Path Planning", "cites": 412}, {"year": 1997, "venue": "IJRR", "title": "A Random Sampling Scheme for Path Planning", "cites": 276}, {"year": 2004, "venue": "T-RO", "title": "On the feasibility of using wireless ethernet for indoor localization", "cites": 247}, {"year": 2010, "venue": "ICRA", "title": "Sampling-based motion planning with temporal goals", "cites": 243}, {"year": 2006, "venue": "T-RO", "title": "Path planning for deformable linear objects", "cites": 203}, {"year": 2005, "venue": "T-RO", "title": "Sampling-Based Roadmap of Trees for Parallel Motion Planning", "cites": 172}], "lineage": {"advisors": [], "students": [{"name": "Ioan Alexandru Sucan", "student_first_year": 2008, "copubs_in_first_5yr": 9, "total_copubs": 9, "student_first_author_count": 7, "we_last_author_count": 9, "last_copub_year": 2013}, {"name": "Andrew M. Ladd", "student_first_year": 2002, "copubs_in_first_5yr": 9, "total_copubs": 9, "student_first_author_count": 6, "we_last_author_count": 9, "last_copub_year": 2005}, {"name": "Kostas E. Bekris", "student_first_year": 2002, "copubs_in_first_5yr": 9, "total_copubs": 11, "student_first_author_count": 5, "we_last_author_count": 9, "last_copub_year": 2019}, {"name": "Constantinos Chamzas", "student_first_year": 2019, "copubs_in_first_5yr": 10, "t function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
