<style>
:root {
  --ink: #1a1614;
  --paper: #f5f1ea;
  --paper-2: #ebe4d7;
  --rule: #1a1614;
  --accent: #c1440e;
  --accent-2: #2d4a3e;
  --muted: #6b6259;
  --highlight: #f4d35e;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Pretendard', 'Noto Serif KR', sans-serif;
  font-size: 16px;
  line-height: 1.65;
  word-break: keep-all;
  -webkit-font-smoothing: antialiased;
}
body {
  background-image:

  padding: 40px 24px 96px;
}
.grain {

}
.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 14px 0 12px; margin-bottom: 32px;
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 24px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.masthead .brand {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.back-link:hover { color: var(--ink); }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;
  text-decoration: none; color: var(--muted);
  border: 1px solid transparent; font-size: 0.66rem;
}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  padding-bottom: 40px;
  margin-bottom: 40px;
  border-bottom: 1px solid var(--ink);
  align-items: start;
}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 500;
  font-size: clamp(2.4rem, 5vw, 4rem);
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin-bottom: 18px;
}
.profile-name .given { display: block; font-weight: 400; font-style: italic; opacity: 0.7; font-size: 0.55em; margin-bottom: 4px; }
.profile-name .family { display: block; }
.profile-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;
  padding-bottom: 8px;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  font-family: 'Pretendard', sans-serif;
}
.profile-facts dd strong { color: var(--accent); font-weight: 700; }

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;
  max-width: 70ch;
}
.phase-body .hl {
  background: linear-gradient(180deg, transparent 60%, var(--highlight) 60%);
  padding: 0 2px; font-weight: 500;
}
.phase-body em {
  font-style: italic;
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1px; background: var(--ink); border: 1px solid var(--ink);
}
.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;
  line-height: 1.4; margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(1.2rem, 2.2vw, 1.6rem);
  line-height: 1.5; max-width: 52ch;
  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;
}
.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);

  background: var(--paper-2);
  border: 1px solid rgba(26, 22, 20, 0.2);

.hl-cites { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.hl-cites strong { color: var(--ink); font-weight: 700; font-size: 0.88rem; }

.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;
}
.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }

  .lineage-grid { grid-template-columns: 1fr; gap: 24px; }
}

.foot {
  margin-top: 80px; padding-top: 24px;

RRT*: Optimal sampling-based path plan…"], ["스타일", "steady-producer · specialist"], ["전환", "Dynamic Contact Manipulation → Topological Braids"]], "phases": [{"years": "2002 — 2006", "id": "I", "title": "출발점 — Dynamic Contact Manipulation · Sensor Coverage Teams", "body": "2002년부터 2006년 사이의 5년간, 출판은 6편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Dynamic Contact Manipulation</span>, <span class='hl'>Sensor Coverage Teams</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Bilateral Time-Scaling Control가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Matthew T. Mason</strong>, <strong>Michael A. Erdmann</strong>, <strong>Christopher R. Baker</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 67%가 이 venue에서 소화되었다."}, {"years": "2007 — 2011", "id": "II", "title": "궤도의 안착 — Manipulation Planning · Object Recognition Full", "body": "이어진 2007년대 전반, 2007–2011년의 기간 동안 <strong>26편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Manipulation Planning</span>, <span class='hl'>Object Recognition Full</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Task Space Regions가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"CHOMP: Gradient optimization techniques for efficient motion planning\"</em>이다. ICRA 2009에 실린 이 글은 지금까지 968회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2009 IROS의 <em>\"Planning-based prediction for pedestrians\"</em>(469회)이다. 이 시기를 함께 끌어간 축은 <strong>Dmitry Berenson</strong>, <strong>Dave Ferguson</strong>, <strong>Alvaro Collet</strong>으로 요약된다. 바로 이 시기에 Srinivasa의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Anca D. Dragan, Alvaro Collet, Nathan D. Ratliff, Dmitry Berenson 외 5명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 58%가 이 venue에서 소화되었다."}, {"years": "2012 — 2016", "id": "III", "title": "Planar Contact Manipulation · Rearrangement Planning의 시기", "body": "그 뒤 2012년부터 2016년까지, 총 <strong>43편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Planar Contact Manipulation</span>, <span class='hl'>Rearrangement Planning</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Manipulation Manifold Particle가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Informed RRT*: Optimal sampling-based path planning focused via direct sampling of an adm…\"</em>이다. IROS 2014에 실린 이 글은 지금까지 1,100회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2013 IJRR의 <em>\"CHOMP: Covariant Hamiltonian optimization for motion planning\"</em>(731회)이다. 이 시기를 함께 끌어간 축은 <strong>Anca D. Dragan</strong>, <strong>Nancy S. Pollard</strong>, <strong>Michael C. Koval</strong>으로 요약된다. 바로 이 시기에 Srinivasa의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Michael C. Koval, Christopher M. Dellin, Shushman Choudhury, Daqing Yi 외 11명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2017 — 2021", "id": "IV", "title": "성숙기의 확장 — Anytime Motion Planning · Food Manipulation", "body": "2017년 무렵부터 2021년에 걸쳐, 총 <strong>35편</strong>의 논문이 쏟아졌다. 연구의 무게 중심은 <span class='hl'>Anytime Motion Planning</span>, <span class='hl'>Food Manipulation</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Monte Carlo가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Yale-CMU-Berkeley dataset for robotic manipulation research\"</em>이다. IJRR 2017에 실린 이 글은 지금까지 369회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Sanjiban Choudhury</strong>, <strong>Tapomayukh Bhattacharjee</strong>, <strong>Oren Salzman</strong>으로 요약된다. 바로 이 시기에 Srinivasa의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Liyiming Ke, Rosario Scalise, Ethan K. Gordon, Patrick E. Lancaster 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2022 — 2024", "id": "V", "title": "최근의 지형 — Topological Braids · Balancing Efficiency Comfort", "body": "2022–2024년으로 이어진 이 시기에, <strong>21편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Topological Braids</span>, <span class='hl'>Balancing Efficiency Comfort</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Comfort Robot-Assisted Bite가 보조 줄기로 올라온다. 이 기간에는 뚜렷한 단일 블록버스터보다는 꾸준한 중간층 생산으로 누적 인용이 쌓여간다. 이 시기를 함께 끌어간 축은 <strong>Christoforos I. Mavrogiannis</strong>, <strong>Brian Hou</strong>, <strong>Liyiming Ke</strong>으로 요약된다. 바로 이 시기에 Srinivasa의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Sidharth Talia, Sriyash Poddar, Abhay Deshpande, Matt Schmittle. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Manipulation라는 축은 한 번도 흔들리지 않았다", "text": "5개 5년 구간 중 대부분에서 Manipulation가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "23년 동안 총 131편, h=43. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": " 본인은 Matthew T. Mason의 네트워크 안에서 경력을 시작한 것으로 보이지만, 지금은 공저 패턴 기준으로 33명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Anca D. Dragan, Michael C. Koval, Christopher M. Dellin, Alvaro Collet이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 33명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2014, "venue": "IROS", "title": "Informed RRT*: Optimal sampling-based path planning focused via direct sampling of an admissible ellipsoidal heuristic", "cites": 1100}, {"year": 2009, "venue": "ICRA", "title": "CHOMP: Gradient optimization techniques for efficient motion planning", "cites": 968}, {"year": 2013, "venue": "IJRR", "title": "CHOMP: Covariant Hamiltonian optimization for motion planning", "cites": 731}, {"year": 2009, "venue": "IROS", "title": "Planning-based prediction for pedestrians", "cites": 469}, {"year": 2011, "venue": "IJRR", "title": "The MOPED framework: Object recognition and pose estimation for manipulation", "cites": 440}, {"year": 2015, "venue": "ICRA", "title": "Batch Informed Trees (BIT*): Sampling-based optimal planning via the heuristically guided search of implicit random geometric graphs", "cites": 381}, {"year": 2013, "venue": "IJRR", "title": "A policy-blending formalism for shared control", "cites": 372}, {"year": 2011, "venue": "IJRR", "title": "Task Spac function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
