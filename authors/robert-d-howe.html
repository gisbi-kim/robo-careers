* { box-sizing: border-box; margin: 0; padding: 0; }

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 2; }

.masthead {

}

  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 900; font-style: italic;
  font-size: 1.4rem; color: var(--ink);
  letter-spacing: -0.02em;
  text-transform: none;
}
.masthead .brand a { color: inherit; text-decoration: none; }
.masthead .brand .amp { color: var(--accent); }
.masthead .right { display: flex; gap: 16px; align-items: baseline; }
.back-link { color: var(--muted); text-decoration: none; border-bottom: 1px dotted currentColor; }

.lang-tabs { display: inline-flex; gap: 2px; align-items: center; }
.lang-tab {
  padding: 2px 8px; cursor: pointer;

}
.lang-tab.active { color: var(--paper); background: var(--ink); border-color: var(--ink); }
.lang-tab:not(.active):hover { color: var(--ink); border-color: var(--muted); }
.lang-sep { color: var(--muted); opacity: 0.35; font-size: 0.6rem; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px;
}

.profile-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;

  margin-bottom: 40px;

}
.profile-name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;

  letter-spacing: -0.03em;

.profile-tag {

  margin-bottom: 20px;
}
.profile-oneline {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-size: 1.15rem; line-height: 1.55;
  letter-spacing: -0.01em;
}
.profile-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  align-self: start;
  border-left: 2px solid var(--ink);
  padding-left: 20px;
}
.profile-facts dt {
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 0.64rem;
  color: var(--muted);
  padding-top: 8px;
}
.profile-facts dd {
  font-size: 0.82rem;

}

.section { margin-bottom: 56px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::before {

}
.section-title {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem; line-height: 1.35;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  max-width: 40ch;
}

/* phases */
.phases { display: grid; gap: 0; border-top: 1px solid var(--ink); }
.phase {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid rgba(26, 22, 20, 0.2);
  transition: background 0.2s;
}
.phase:hover { background: var(--paper-2); }
.phase-meta { font-family: 'JetBrains Mono', monospace; }
.phase-years {
  font-size: 1.2rem; font-weight: 700;
  color: var(--accent); letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.phase-id {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--muted);
}
.phase-body h4 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.2rem;
  line-height: 1.4; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.phase-body p {
  font-size: 0.95rem; line-height: 1.75;

}

}
.phase-body em {

  font-family: 'Fraunces', 'Noto Serif KR', serif;
  color: var(--accent-2);
}
.phase-body strong { color: var(--accent); font-weight: 700; }

/* themes */
.themes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

.theme { background: var(--paper); padding: 28px 24px; }
.theme-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 500;
  color: var(--accent);
  line-height: 1; margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.theme h5 {
  font-family: 'Noto Serif KR', 'Fraunces', serif;
  font-weight: 600; font-size: 1.05rem;

}
.theme p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }

/* pullquote */
.pullquote {
  font-family: 'Noto Serif KR', 'Fraunces', serif;

  margin: 40px auto;
  padding: 36px 24px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  text-align: center; position: relative;
  letter-spacing: -0.01em;
}
.pullquote::before {
  content: '"';
  font-family: 'Fraunces', serif;
  font-size: 4rem; color: var(--accent);
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--paper); padding: 0 12px; line-height: 1;
}

/* highlights */
.highlights { display: grid; grid-template-columns: 1fr; gap: 0; }
.hl-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; padding: 14px 0;
  border-bottom: 1px dotted rgba(26, 22, 20, 0.25);
  align-items: baseline;
}
.hl-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700;
  color: var(--accent); min-width: 60px;

.hl-title { font-family: 'Fraunces', serif; font-size: 1rem; line-height: 1.4; }
.hl-title .venue {

.lineage-grid {
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 40px;

.lineage-block h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  margin-bottom: 12px;
}
.lineage-item {
  padding: 10px 0; border-bottom: 1px dotted rgba(26, 22, 20, 0.2);
  display: flex; justify-content: space-between; gap: 16px;
  align-items: baseline;
}
.lineage-item .name {
  font-family: 'Fraunces', 'Noto Serif KR', serif;
  font-weight: 600; font-size: 0.95rem;
}
.lineage-item a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.lineage-item a:hover { color: var(--accent); }
.lineage-item .sig {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted); white-space: nowrap;
}
.lineage-more { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

@media (max-width: 820px) {
  .profile-head { grid-template-columns: 1fr; gap: 32px; }

}

.foot {

ion of exosuit assistance based on measured muscle dynamics during versatil…\"</em> — published in Sci-Rob 2021, accumulating 142 citations and becoming a standard reference in the sub-field. The era's working axis reads <strong>Yashraj Narang</strong>, <strong>Alperen Degirmenci</strong>, <strong>Joost J. Vlassak</strong>. It is in this window that several junior coauthors appear to have begun their own careers under Howe — Yashraj Narang, Buse Aktas, Richard W. Nuckols. The transition from solo work to group supervision is visible here."}, {"years": "2023 — 2025", "id": "VIII", "title": "Latest terrain — Tension Jamming Deployable · Beyond Coulomb Stochastic", "body": "Across the 2023–2025 stretch, the window is a quieter one — 4 papers in total. The center of gravity rests on <span class='hl'>Tension Jamming Deployable</span>, <span class='hl'>Beyond Coulomb Stochastic</span>, the axis that threads through most of the era's output. Stochastic Friction Practical emerges as a secondary strand. The era's working axis reads <strong>Zixi Liu</strong>, <strong>Daniel Hasegawa</strong>, <strong>Buse Aktas</strong>."}], "themes": [{"num": "01", "title": "The Cardiac Catheters anchor never moved", "text": "Cardiac Catheters appears among the top topics in most of the 8 5-year windows. Adjacent topics drift, tools get replaced generation by generation, but the central axis never yields. A classic artisan's arc — impact achieved through depth, not breadth."}, {"num": "02", "title": "What time accumulates, one paper at a time", "text": "82 papers, h=35, across 38 years. The headline blockbusters matter, but the real engine under the h-index is the sustained mid-tier output — a long compounding curve rather than a single hit."}, {"num": "03", "title": "Students as the real record — mastery measured in people", "text": "this researcher now sits atop an estimated 22 likely students by coauthor pattern. Names on that list include Paul M. Loschak, Samuel B. Kesner, Thomas Debus, : 2004}, {"name": "Alperen Degirmenci", "student_first_year": 2014, "copubs_in_first_5yr": 5, "total_copubs": 6, "student_first_author_count": 2, "we_last_author_count": 4, "last_copub_year": 2020}, {"name": "Aaron M. Dollar", "student_first_year": 2003, "copubs_in_first_5yr": 3, "total_copubs": 7, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2014}, {"name": "Jae S. Son", "student_first_year": 1994, "copubs_in_first_5yr": 4, "total_copubs": 4, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 1996}, {"name": "Shelten G. Yuen", "student_first_year": 2008, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 3, "we_last_author_count": 3, "last_copub_year": 2010}, {"name": "Ryan A. Beasley", "student_first_year": 2002, "copubs_in_first_5yr": 3, "total_copubs": 4, "student_first_author_count": 3, "we_last_author_count": 2, "last_copub_year": 2009}, {"name": "Leif P. Jentoft", "student_first_year": 2011, "copubs_in_first_5yr": 3, "total_copubs": 4, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2017}, {"name": "Ross L. Feller", "student_first_year": 2004, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2006}, {"name": "Eric R. Dunn", "student_first_year": 1994, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 1996}, {"name": "Aram Z. Hajian", "student_first_year": 1997, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 1997}], "students_rest": 10}, "archetype": "mid-career-peak"}, "ko": {"tagline": "Sliding Fingers Combined → Beating Heart → Tension Jamming Deployable", "oneLine": "1988년에 출판을 시작해 38년째 현장에 머물고 있는 연구자. 초기에는 <em>Sliding Fingers Combined</em>를 다루었고, 최근에는 <em>Tension Jamming Deployable</em>가 중심으로 올라왔다. 급격한 단절이라기보다는 인접 영역을 꾸준히 밀고 나간 점진적 확장에 가깝다. 대표작은 2014년 IJRR에 실린 \"A compliant, underactuated hand for robust manipulation\" (593회 인용). 공저 패턴으로 추정되는 제자만 22명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1988 — 2025</strong>"], ["논문 수", "82편 · 인용 5,232 · h=35"], ["핵심", "Cardiac Catheters, Motion Compensation"], ["대표작", "A compliant, underactuated hand for robust mani…"], ["스타일", "mid-career-peak"], ["전환", "Sliding Fingers Combined → Tension Jamming Deployable"]], "phases": [{"years": "1988 — 1992", "id": "I", "title": "출발점 — Sliding Fingers Combined · Combined Torsion Shear", "body": "1988년부터 1992년 사이의 5년간, 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Sliding Fingers Combined</span>, <span class='hl'>Combined Torsion Shear</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Sensing Skin Acceleration가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Sensing skin acceleration for slip and texture perception\"</em>이다. ICRA 1989에 실린 이 글은 지금까지 231회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Mark R. Cutkosky</strong>, <strong>Imin Kao</strong>, <strong>Nicolas Popp</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "1993 — 1997", "id": "II", "title": "궤도의 안착 — Smooth Bipedal Walking · Drum Roll Increasing", "body": "이어진 1993년대 전반, 1993–1997년의 기간 동안 <strong>10편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Smooth Bipedal Walking</span>, <span class='hl'>Drum Roll Increasing</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Increasing Bandwidth Passive가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Practical Force-Motion Models for Sliding Manipulation\"</em>이다. IJRR 1996에 실린 이 글은 지금까지 247회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Jae S. Son</strong>, <strong>Eric R. Dunn</strong>, <strong>Mark R. Cutkosky</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Jae S. Son, Eric R. Dunn, Aram Z. Hajian. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 60%가 이 venue에서 소화되었다."}, {"years": "1998 — 2002", "id": "III", "title": "Automatic Property Identification · Identification Parameterized Constraints의 시기", "body": "그 뒤 1998년부터 2002년까지, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Automatic Property Identification</span>, <span class='hl'>Identification Parameterized Constraints</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Identification Local Geometric가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Vibration Feedback Models for Virtual Environments\"</em>이다. ICRA 1998에 실린 이 글은 지금까지 201회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Thomas Debus</strong>, <strong>Pierre E. Dupont</strong>, <strong>Allison M. Okamura</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Thomas Debus, Ryan A. Beasley, Douglas P. Perrin, Christopher R. Wagner. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 100%가 이 venue에서 소화되었다."}, {"years": "2003 — 2007", "id": "IV", "title": "Grasping Unstructured Environments · Force Feedback의 시기", "body": "2003년 무렵부터 2007년에 걸쳐, <strong>15편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Grasping Unstructured Environments</span>, <span class='hl'>Force Feedback</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Error Correction가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A robust compliant grasper via shape deposition manufacturing\"</em>이다. T-Mech 2006에 실린 이 글은 지금까지 232회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Douglas P. Perrin</strong>, <strong>Pierre E. Dupont</strong>, <strong>Aaron M. Dollar</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Samuel B. Kesner, Aaron M. Dollar, Ross L. Feller, Daniel T. Kettler 외 1명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2008 — 2012", "id": "V", "title": "Beating Heart · Heart Surgery의 시기", "body": "2008–2012년으로 이어진 이 시기에, <strong>17편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Beating Heart</span>, <span class='hl'>Heart Surgery</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Motion Compensation Cardiac가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"The Highly Adaptive SDM Hand: Design and Performance Evaluation\"</em>이다. IJRR 2010에 실린 이 글은 지금까지 520회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2011 T-RO의 <em>\"Position Control of Motion Compensation Cardiac Catheters\"</em>(148회)이다. 이 시기를 함께 끌어간 축은 <strong>Samuel B. Kesner</strong>, <strong>Shelten G. Yuen</strong>, <strong>Frank L. Hammond</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Shelten G. Yuen, Leif P. Jentoft, Qian Wan, Frank L. Hammond. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2013 — 2017", "id": "VI", "title": "Tactile Sensing Grasping · Imaging Catheters의 시기", "body": "2013년을 기점으로 2017년까지의 흐름 속에서, <strong>14편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Tactile Sensing Grasping</span>, <span class='hl'>Imaging Catheters</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Cardiac Catheters가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"A compliant, underactuated hand for robust manipulation\"</em>이다. IJRR 2014에 실린 이 글은 지금까지 593회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2014 IJRR의 <em>\"Robotic catheter cardiac ablation combining ultrasound guidance and force…\"</em>(131회)이다. 이 시기를 함께 끌어간 축은 <strong>Paul M. Loschak</strong>, <strong>Alperen Degirmenci</strong>, <strong>Leif P. Jentoft</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Paul M. Loschak, Alperen Degirmenci, Joshua B. Gafford. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "VII", "title": "성숙기의 확장 — Automated Detection Soleus · Soleus Concentric Contraction", "body": "2018년부터 2022년 사이의 5년간, <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Automated Detection Soleus</span>, <span class='hl'>Soleus Concentric Contraction</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Contraction Variable Gait가 보조 줄기로 올라온다. 이 기간의 얼굴이 된 논문은 <em>\"Individualization of exosuit assistance based on measured muscle dynamics during versatil…\"</em>이다. Sci-Rob 2021에 실린 이 글은 지금까지 142회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Yashraj Narang</strong>, <strong>Alperen Degirmenci</strong>, <strong>Joost J. Vlassak</strong>으로 요약된다. 바로 이 시기에 Howe의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Yashraj Narang, Buse Aktas, Richard W. Nuckols. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VIII", "title": "최근의 지형 — Tension Jamming Deployable · Beyond Coulomb Stochastic", "body": "이어진 2023년대 전반, 2023–2025년의 기간 동안 출판은 4편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Tension Jamming Deployable</span>, <span class='hl'>Beyond Coulomb Stochastic</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 거기에 Stochastic Friction Practical가 보조 줄기로 올라온다. 이 시기를 함께 끌어간 축은 <strong>Zixi Liu</strong>, <strong>Daniel Hasegawa</strong>, <strong>Buse Aktas</strong>으로 요약된다."}], "themes": [{"num": "01", "title": "Cardiac Catheters라는 축은 한 번도 흔들리지 않았다", "text": "8개 5년 구간 중 대부분에서 Cardiac Catheters가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "시간이 누적시킨 것 — 한 편씩", "text": "38년 동안 총 82편, h=35. 소수의 대형 블록버스터도 있지만, 사실 이 h-index를 지탱하는 실체는 꾸준하게 중간층을 채우는 생산성이다. 한 편의 히트가 아니라 긴 복리의 결과로 읽어야 한다."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": "지금은 공저 패턴 기준으로 22명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Paul M. Loschak, Samuel B. Kesner, Thomas Debus, Alperen Degirmenci이 있다. 이 가운데 1명은 본 집계 안에 다시 진입해 있다 — 학파 재생산이 진행 중이라는 뜻. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "도구가 바뀌어도 살아남는 질문을 고르라.", "highlights": [{"year": 2014, "venue": "IJRR", "title": "A compliant, underactuated hand for robust manipulation", "cites": 593}, {"year": 2010, "venue": "IJRR", "title": "The Highly Adaptive SDM Hand: Design and Performance Evaluation", "cites": 520}, {"year": 1996, "venue": "IJRR", "title": "Practical Force-Motion Models for Sliding Manipulation", "cites": 247}, {"year": 2006, "venue": "T-Mech", " function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
