n_first_5yr": 9, "total_copubs": 9, "student_first_author_count": 2, "we_last_author_count": 7, "last_copub_year": 2016}, {"name": "Linda Paternò", "student_first_year": 2018, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 1, "we_last_author_count": 7, "last_copub_year": 2023}, {"name": "Matteo Cianchetti", "student_first_year": 2012, "copubs_in_first_5yr": 7, "total_copubs": 7, "student_first_author_count": 2, "we_last_author_count": 6, "last_copub_year": 2017}, {"name": "Giada Gerboni", "student_first_year": 2013, "copubs_in_first_5yr": 5, "total_copubs": 5, "student_first_author_count": 1, "we_last_author_count": 4, "last_copub_year": 2017}, {"name": "Marco Salerno", "student_first_year": 2012, "copubs_in_first_5yr": 6, "total_copubs": 6, "student_first_author_count": 5, "we_last_author_count": 3, "last_copub_year": 2016}, {"name": "Giovanni Faoro", "student_first_year": 2022, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 3, "last_copub_year": 2024}, {"name": "Stefano Pane", "student_first_year": 2019, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 1, "we_last_author_count": 3, "last_copub_year": 2023}, {"name": "Veronica Iacovacci", "student_first_year": 2014, "copubs_in_first_5yr": 2, "total_copubs": 9, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2024}, {"name": "Canberk Sozer", "student_first_year": 2016, "copubs_in_first_5yr": 2, "total_copubs": 3, "student_first_author_count": 2, "we_last_author_count": 2, "last_copub_year": 2023}, {"name": "Gastone Ciuti", "student_first_year": 2012, "copubs_in_first_5yr": 3, "total_copubs": 5, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2022}, {"name": "Izadyar Tamadon", "student_first_year": 2021, "copubs_in_first_5yr": 3, "total_copubs": 3, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2025}, {"name": "Giada Casagrande", "student_first_year": 2022, "copubs_in_first_5yr": 2, "total_copubs": 2, "student_first_author_count": 1, "we_last_author_count": 2, "last_copub_year": 2023}], "students_rest": 16}, "archetype": "mid-career-peak-2"}, "ko": {"tagline": "Computer science → Actuator", "oneLine": "1998년에 출판을 시작해 28년째 현장에 머물고 있는 연구자. Computer science를 중심축으로 삼아 일관되게 연구를 이어온 유형. 대표작은 2014년 SoRo에 실린 \"Soft Robotics Technologies to Address Shortcomings in Today's Minimal…\" (520회 인용). 공저 패턴으로 추정되는 제자만 28명 — 이 정도 규모에 이르면 개인 생산자가 아니라 학파를 운영하는 그룹 리더로 읽어야 한다.", "facts": [["시기", "<strong>1998 — 2025</strong>"], ["논문 수", "98편 · 인용 6,501 · h=41"], ["핵심", "Robot"], ["대표작", "Soft Robotics Technologies to Address Shortcomi…"], ["스타일", "mid-career-peak-2"], ["전환", "Materials science → Artificial intelligence"]], "phases": [{"years": "1998 — 2002", "id": "I", "title": "출발점 — Materials science · Engineering", "body": "1998년부터 2002년 사이의 5년간, 출판은 7편으로 비교적 조용히 지나간다. 연구의 무게 중심은 <span class='hl'>Materials science</span>, <span class='hl'>Engineering</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Paolo Dario</strong>, <strong>Maria Chiara Carrozza</strong>, <strong>Anna Eisinberg</strong>으로 요약된다. 발표 무대는 압도적으로 <span class='hl'>ICRA</span>에 쏠려 있었다 — 이 시기 출판의 57%가 이 venue에서 소화되었다."}, {"years": "2003 — 2007", "id": "II", "title": "궤도의 안착 — Robot · Biomedical engineering", "body": "이어진 2003년대 전반, 2003–2007년의 기간 동안 <strong>18편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Biomedical engineering</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Paolo Dario</strong>, <strong>Cesare Stefanini</strong>, <strong>Byungkyu Kim</strong>으로 요약된다. 바로 이 시기에 Menciassi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Marco Quirini, Kanako Harada, Dimitris P. Tsakiris, Gianni La Spina. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2008 — 2012", "id": "III", "title": "Robot · Mechanism (biology)의 시기", "body": "그 뒤 2008년부터 2012년까지, <strong>20편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Robot</span>, <span class='hl'>Mechanism (biology)</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"A New Mechanism for Mesoscale Legged Locomotion in Compliant Tubular Environments\"</em>이다. T-RO 2009에 실린 이 글은 지금까지 269회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2010 T-Mech의 <em>\"Design of a Novel Bimanual Robotic System for Single-Port Laparoscopy\"</em>(173회)이다. 이 시기를 함께 끌어간 축은 <strong>Paolo Dario</strong>, <strong>Pietro Valdastri</strong>, <strong>Massimiliano Simi</strong>으로 요약된다. 바로 이 시기에 Menciassi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Tommaso Ranzani, Matteo Cianchetti, Marco Salerno, Gastone Ciuti 외 3명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2013 — 2017", "id": "IV", "title": "Actuator · Computer vision의 시기", "body": "2013년 무렵부터 2017년에 걸쳐, <strong>21편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Actuator</span>, <span class='hl'>Computer vision</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"Soft Robotics Technologies to Address Shortcomings in Today's Minimally Invasive Surgery:…\"</em>이다. SoRo 2014에 실린 이 글은 지금까지 520회 인용되며 이 분야의 표준 참조로 자리 잡았다. 그 뒤를 잇는 것이 2017 Sci-Rob의 <em>\"Biohybrid actuators for robotics: A review of devices actuated by living c…\"</em>(511회)이다. 이 시기를 함께 끌어간 축은 <strong>Tommaso Ranzani</strong>, <strong>Matteo Cianchetti</strong>, <strong>Marco Salerno</strong>으로 요약된다. 바로 이 시기에 Menciassi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Giada Gerboni, Veronica Iacovacci, Canberk Sozer, Tommaso Mazzocchi. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2018 — 2022", "id": "V", "title": "성숙기의 확장 — Actuator · Artificial intelligence", "body": "2018–2022년으로 이어진 이 시기에, <strong>21편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Actuator</span>, <span class='hl'>Artificial intelligence</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 기간의 얼굴이 된 논문은 <em>\"A decade retrospective of medical robotics research from 2010 to 2020\"</em>이다. Sci-Rob 2021에 실린 이 글은 지금까지 465회 인용되며 이 분야의 표준 참조로 자리 잡았다. 이 시기를 함께 끌어간 축은 <strong>Linda Paternò</strong>, <strong>Veronica Iacovacci</strong>, <strong>Giuseppe Tortora</strong>으로 요약된다. 바로 이 시기에 Menciassi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Linda Paternò, Giovanni Faoro, Stefano Pane, Izadyar Tamadon 외 8명. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}, {"years": "2023 — 2025", "id": "VI", "title": "최근의 지형 — Artificial intelligence · Robot", "body": "2023년을 기점으로 2025년까지의 흐름 속에서, <strong>11편</strong>의 논문이 이 기간의 출력물로 남는다. 연구의 무게 중심은 <span class='hl'>Artificial intelligence</span>, <span class='hl'>Robot</span> 위에 놓여 있었고, 이 축은 이 시기 대부분의 성과물을 관통한다. 이 시기를 함께 끌어간 축은 <strong>Veronica Iacovacci</strong>, <strong>Elena De Momi</strong>, <strong>Emmanuel B. Vander Poorten</strong>으로 요약된다. 바로 이 시기에 Menciassi의 지도 아래에서 첫 논문을 낸 것으로 보이는 후배 연구자들이 나타난다 — Angela Peloso. 개인 연구에서 그룹 운영으로의 전환이 이 시기 안에서 관찰된다."}], "themes": [{"num": "01", "title": "Robot라는 축은 한 번도 흔들리지 않았다", "text": "6개 5년 구간 중 대부분에서 Robot가 상위 주제로 반복 등장한다. 주변 토픽은 바뀌고 도구는 세대가 지나면서 교체되었지만, 중심축은 단 한 번도 비켜선 적이 없다. 임팩트를 폭이 아닌 깊이로 만들어낸 전형적인 장인형 경력."}, {"num": "02", "title": "혼자 쓰던 사람에서 랩을 이끄는 사람으로", "text": "논문당 평균 저자수가 초기 4.9명에서 후기 6.4명으로 1명 이상 늘어났다. 팀을 꾸리고 처리량을 늘리는 전형적인 PI 전환 궤적이다. 공저 패턴으로 추정되는 제자 28명이 그 스케일이 실재함을 뒷받침한다. 박사 후반부나 PI 초반의 단독 연구자가 그룹 리더로 성장한 전형적 경로."}, {"num": "03", "title": "논문보다 제자 — 대가의 실체는 사람의 배출", "text": " 본인은 Paolo Dario의 네트워크 안에서 경력을 시작한 것으로 보이지만, 지금은 공저 패턴 기준으로 28명 규모의 제자 후보를 거느린 그룹으로 성장했다. 대표 이름으로는 Tommaso Ranzani, Linda Paternò, Matteo Cianchetti, Giada Gerboni이 있다. top 순위 안에 다시 진입한 제자는 아직 없지만, 규모를 감안하면 시간의 문제에 가깝다. 한 연구자가 주어진 분야에 남기는 것 중 가장 오래 가는 유산은, 결국 자신이 길러낸 또 다른 연구자들이다."}], "pullquote": "제자 28명 — 그게 진짜 연구 업적이다.", "highlights": [{"year": 2014, "venue": "SoRo", "title": "Soft Robotics Technologies to Address Shortcomings in Today's Minimally Invasive Surgery: The STIFF-FLOP Approach", "cites": 520}, {"year": 2017, "venue": "Sci-Rob", "title": "Biohybrid actuators for robotics: A review of devices actua const I18N = {

    phasesLabel: "BY PERIOD",

    themesLabel: "THROUGH-LINES",
    themesTitle: "Themes that cut across all periods.",
    hlLabel: "KEY WORKS",
    hlTitle: "Highly-cited anchor papers within the covered venues.",
    lineageLabel: "LINEAGE",
    lineageTitle: "Mentors and mentees inferred from coauthor patterns.",
    advisorsHeading: "Likely advisor(s)",
    studentsHeading: n => `Likely students (${n})`,
    noAdvisor: "No mentor signal (self-started or sparse early data)",
    noStudent: "No student signal",
    advisorMeta: a => `${a.advisor_active_from}~ · last-author on ${a.advisor_last_author_count}/${a.early_copubs_as_our_first_author} of our early 1st-author`,
    studentMeta: s => `${s.student_first_year}~${s.last_copub_year} · last-author on ${s.we_last_author_count}/${s.student_first_author_count}`,
    moreStudents: n => `+ ${n} more`,
    rankBadge: (rank, natural, composite, archetype, force) => {
      const natPart = (natural && natural !== rank) ? ` · composite rank #${natural}` : '';

      return `#${rank}${natPart} · composite ${composite.toFixed(2)} · ${archetype}${forcePart}`;

function getLang() {
  const h = window.location.hash.replace('#','').toLowerCase();
  if (h === 'ko' || h === 'kor') return 'ko';
  return 'en';
}
let LANG = getLang();

function setLang(l) {
  LANG = l;
  if (l === 'en') history.replaceState(null, '', window.location.pathname + window.location.search);
  else history.replaceState(null, '', '#' + l);
  document.documentElement.lang = l === 'ko' ? 'ko' : 'en';
  render();
}

function safeLink(name) {
  const slug = SLUG_TO_NAME[name];
  if (!slug) return name;
  return `<a href="${slug}.html${LANG === 'ko' ? '#ko' : ''}">${name}</a>`;
}

function render() {
  const d = DATA[LANG];
  const T = I18N[LANG];
  const meta = DATA.meta;

  document.title = `${meta.name} · Robo · Careers`;
  document.getElementById('rankBadge').textContent = T.rankBadge(meta.rank, meta.natural_rank, meta.composite, d.archetype, meta.force_included);
  document.getElementById('tagEl').textContent = d.tagline;
  document.getElementById('nameEl').innerHTML = `<span class="given">${meta.given}</span><span class="family">${meta.family}</span>`;
  document.getElementById('oneLineEl').textContent = d.oneLine;
  document.getElementById('factsEl').innerHTML = d.facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');

  document.getElementById('phasesLabel').textContent = T.phasesLabel;
  document.getElementById('phasesTitle').textContent = T.phasesTitle;
  document.getElementById('phasesEl').innerHTML = d.phases.map(ph => `
    <div class="phase">
      <div class="phase-meta">
        <div class="phase-years">${ph.years}</div>
        <div class="phase-id">${ph.id}</div>
      </div>
      <div class="phase-body">
        <h4>${ph.title}</h4>
        <p>${ph.body}</p>
      </div>
    </div>`).join('');

  document.getElementById('pullquoteEl').textContent = d.pullquote;

  document.getElementById('themesLabel').textContent = T.themesLabel;
  document.getElementById('themesTitle').textContent = T.themesTitle;
  document.getElementById('themesEl').innerHTML = d.themes.map(t => `
    <div class="theme">
      <div class="theme-num">${t.num}</div>
      <h5>${t.title}</h5>
      <p>${t.text}</p>
    </div>`).join('');

  document.getElementById('hlLabel').textContent = T.hlLabel;
  document.getElementById('hlTitle').textContent = T.hlTitle;
  document.getElementById('hlEl').innerHTML = d.highlights.map(h => `
    <div class="hl-item">
      <span class="hl-year">${h.year}</span>
      <span class="hl-title"><span class="venue">${h.venue}</span>${h.title}</span>
      <span class="hl-cites"><strong>${h.cites.toLocaleString()}</strong> ${T.citesSuffix}</span>
    </div>`).join('');

  document.getElementById('lineageLabel').textContent = T.lineageLabel;
  document.getElementById('lineageTitle').textContent = T.lineageTitle;
  const lg = d.lineage;
  const advHTML = lg.advisors && lg.advisors.length
    ? lg.advisors.map(a => `<div class="lineage-item"><span class="name">${safeLink(a.name)}</span><span class="sig">${T.advisorMeta(a)}</span></div>`).join('')
    : `<div class="sig" style="padding:10px 0;">${T.noAdvisor}</div>`;
  const studHTML = lg.students_shown && lg.students_shown.length
    ? lg.students_shown.map(s => `<div class="lineage-item"><span class="name">${safeLink(s.name)}</span><span class="sig">${T.studentMeta(s)}</span></div>`).join('')
      + (lg.students_rest > 0 ? `<div class="lineage-more">${T.moreStudents(lg.students_rest)}</div>` : '')
    : `<div class="sig" style="padding:10px 0;">${T.noStudent}</div>`;
  document.getElementById('lineageEl').innerHTML = `
    <div class="lineage-block">
      <h5>${T.advisorsHeading}</h5>
      ${advHTML}
    </div>
    <div class="lineage-block">
      <h5>${T.studentsHeading((lg.students || []).length)}</h5>
      ${studHTML}
    </div>`;

  document.getElementById('footData').innerHTML = T.footData;
  document.getElementById('backLink').textContent = T.home;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === LANG));
}

document.querySelectorAll('.lang-tab').forEach(t => {
  t.addEventListener('click', e => { e.preventDefault(); setLang(t.dataset.lang); });
});
window.addEventListener('hashchange', () => {
  const l = getLang();
  if (l !== LANG) { LANG = l; render(); }
});
render();
</script>
